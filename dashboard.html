<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Analytics Dashboard</title>
<style>
  :root {
    --bg:#050b18; --card:rgba(255,255,255,0.03); --glass:rgba(255,255,255,0.05);
    --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info:#3498db; --muted:#9fb7bf;
  }
  body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:#fff; overflow-x:hidden; }
  .wrap { max-width:900px; margin:auto; padding:20px; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px; }
  .logo { font-weight:900; font-size:22px; background:linear-gradient(to right, #ff6b6b, #ffd36d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .glass { background:var(--glass); backdrop-filter:blur(20px); border-radius:24px; border:1px solid rgba(255,255,255,0.08); padding:25px; margin-bottom:20px; }
  
  .podium { display:grid; grid-template-columns: 1fr 1.2fr 1fr; gap:12px; align-items:flex-end; margin-bottom:30px; text-align:center; }
  .podium-item { background:rgba(255,255,255,0.02); border-radius:15px; padding:20px 10px; border:1px solid rgba(255,255,255,0.05); }
  .podium-item.first { border-color:var(--gold); box-shadow:0 0 30px rgba(255,211,109,0.15); padding-top:40px; }
  .p-name { font-size:16px; font-weight:900; display:block; margin:8px 0; }
  .p-pts { color:var(--gold); font-weight:700; }

  .control-row { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:10px 20px; border-radius:30px; background:rgba(255,255,255,0.05); font-size:12px; font-weight:800; cursor:pointer; border:1px solid rgba(255,255,255,0.1); }
  .tab.active { background:var(--accent); color:#050b18; }
  
  select { background:#162136 !important; color:#ffffff !important; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); font-weight:600; width:100%; }
  
  .leader-row { display:flex; align-items:center; gap:15px; padding:15px; background:rgba(255,255,255,0.02); border-radius:16px; margin-bottom:10px; }
  .l-name { flex:1; font-weight:700; }
  .trend { font-size: 14px; margin-left: 10px; }
  .bar-bg { flex:1.5; height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--accent); transition: width 0.8s; }
  
  .h2h-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; }
  .h2h-display { margin-top:20px; background:rgba(0,0,0,0.3); border-radius:15px; padding:20px; text-align:center; }
  .del-btn { background:none; border:1px solid var(--danger); color:var(--danger); padding:4px 8px; border-radius:6px; cursor:pointer; font-size:10px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">COMMAND CENTER</div>
    <a href="index.html" style="color:var(--muted); text-decoration:none; font-size:12px; font-weight:800; border:1px solid #ffffff30; padding:5px 10px; border-radius:20px;">🎮 BACK TO PLAY</a>
  </header>

  <div class="control-row">
    <div class="tab active" data-m="UNO" onclick="setMode('UNO', this)">UNO</div>
    <div class="tab" data-m="Bluff" onclick="setMode('Bluff', this)">BLUFF</div>
    <div class="tab" data-m="28" onclick="setMode('28', this)">28 GAME</div>
  </div>

  <div class="glass" style="display:flex; align-items:center; gap:15px;">
    <span style="font-size:12px; font-weight:800; color:var(--muted)">LINEUP:</span>
    <select id="lineupFilter" onchange="renderAll()"></select>
  </div>

  <div class="podium" id="podium"></div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:14px; color:var(--accent)">LIVE LEADERBOARD</h3>
    <div id="leaderboard"></div>
  </div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:14px; color:var(--gold)">⚔️ RIVALRY MATRIX</h3>
    <div class="h2h-grid">
      <select id="rival1" onchange="runRivalry()"></select>
      <select id="rival2" onchange="runRivalry()"></select>
    </div>
    <div id="rival-display" class="h2h-display">Select two players to compare performance</div>
  </div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:14px; color:var(--danger)">MATCH HISTORY</h3>
    <div id="historyLog"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderAll();
};

window.renderAll = () => {
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    const lineups = [...new Set(rawGames.map(g => g.lineupName))].filter(Boolean);
    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">All Combined</option>` + lineups.map(l => `<option value="${l}" ${l===saved?'selected':''}>${l}</option>`).join('');

    const filtered = lSelect.value === 'ALL' ? rawGames : rawGames.filter(g => g.lineupName === lSelect.value);
    const st = {};
    filtered.forEach(g => {
        const pl = g.players || [{name: g.winner, pts:10, rank:1}, {name: g.last, pts:0, rank:0}];
        pl.forEach(p => {
            if(!st[p.name]) st[p.name] = {pts:0, w:0, t:0, h:[]};
            st[p.name].pts += (p.pts || 0); st[p.name].t++; if(p.rank === 1) { st[p.name].w++; st[p.name].h.push(1); } else if(p.rank===0) st[p.name].h.push(0);
        });
    });

    const sorted = Object.keys(st).sort((a,b) => is28 ? st[b].w - st[a].w : st[b].pts - st[a].pts);
    
    // Podium
    const pod = document.getElementById('podium');
    if(sorted.length >= 2) {
        pod.innerHTML = `
            <div class="podium-item"><div>🥈 2nd</div><span class="p-name">${sorted[1]}</span><span class="p-pts">${is28 ? st[sorted[1]].w+'W' : st[sorted[1]].pts+'P'}</span></div>
            <div class="podium-item first"><div>👑 1st</div><span class="p-name">${sorted[0]}</span><span class="p-pts">${is28 ? st[sorted[0]].w+'W' : st[sorted[0]].pts+'P'}</span></div>
            <div class="podium-item"><div>🥉 3rd</div><span class="p-name">${sorted[2]||'—'}</span><span class="p-pts">${sorted[2]? (is28 ? st[sorted[2]].w+'W' : st[sorted[2]].pts+'P') : '0'}</span></div>`;
    }

    // Leaderboard
    document.getElementById('leaderboard').innerHTML = sorted.map((n, i) => {
        const d = st[n]; const trend = d.h.slice(-3).reduce((a,b)=>a+b,0) >= 2 ? '📈' : '📉';
        return `<div class="leader-row"><div>#${i+1}</div><div class="l-name">${n} ${trend}</div><div class="bar-bg"><div class="bar-fill" style="width:${(d.w/d.t)*100}%"></div></div><div style="font-weight:900;">${is28 ? d.w : d.pts}</div></div>`;
    }).join('');

    // Rivalry Selects
    const r1 = document.getElementById('rival1'); const r2 = document.getElementById('rival2');
    const v1 = r1.value; const v2 = r2.value;
    const opts = `<option value="">Select Player</option>` + sorted.map(n => `<option value="${n}">${n}</option>`).join('');
    r1.innerHTML = opts; r2.innerHTML = opts; r1.value = v1; r2.value = v2;

    // History
    document.getElementById('historyLog').innerHTML = filtered.slice(-5).reverse().map(g => `
        <div style="display:flex; justify-content:space-between; font-size:11px; padding:10px 0; border-bottom:1px solid #ffffff10">
            <span>${new Date(g.time).toLocaleDateString()} - 🏆 <b>${g.winner}</b></span>
            <button class="del-btn" onclick="deleteR('${g.time}')">DEL</button>
        </div>`).join('');
};

window.runRivalry = () => {
    const p1 = document.getElementById('rival1').value;
    const p2 = document.getElementById('rival2').value;
    if(!p1 || !p2 || p1 === p2) return;
    const games = allData.filter(g => g.gameType === currentMode);
    let p1w = 0, p2w = 0, p1l = 0, p2l = 0, sh = 0;
    games.forEach(g => {
        const ns = (g.players||[]).map(p=>p.name);
        if(ns.includes(p1) && ns.includes(p2)) {
            sh++; if(g.winner === p1) p1w++; if(g.winner === p2) p2w++;
            if(g.last === p1) p1l++; if(g.last === p2) p2l++;
        }
    });
    document.getElementById('rival-display').innerHTML = `
        <div style="display:flex; justify-content:space-between;">
            <div><b>${p1}</b><br><small>${p1w}W | ${p1l}💩</small></div>
            <div style="font-size:10px; opacity:0.5">VS<br>${sh} Match</div>
            <div><b>${p2}</b><br><small>${p2w}W | ${p2l}💩</small></div>
        </div>`;
};

window.deleteR = async (t) => { if(prompt("Password:") === PASS) { const snap = await getDocs(query(gRef, where("time", "==", t))); snap.forEach(async d => await deleteDoc(d.ref)); } };

onSnapshot(query(gRef, orderBy("time")), snap => {
    allData = snap.docs.map(d => d.data());
    renderAll();
});
</script>
</body>
</html>
