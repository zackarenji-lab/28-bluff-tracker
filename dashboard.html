<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Command Center</title>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 50% 50%, #111122 0%, #050508 100%);
    --panel: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.1);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    /* Clean Gradients for Tiles */
    --grad-purp: linear-gradient(135deg, #480ca8, #7209b7);
    --grad-blue: linear-gradient(135deg, #03045e, #0077b6);
    --grad-dark: linear-gradient(135deg, #1b1b2f, #16213e);
  }
  
  body { 
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); 
    color: var(--text); min-height: 100vh; overflow-x: hidden;
  }
  .wrap { max-width: 900px; margin: auto; padding: 15px; box-sizing: border-box; }
  
  /* SYMMETRICAL TABS */
  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .g-tab { 
    padding: 14px; border-radius: 10px; text-align: center; font-weight: 800; 
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--border); 
    font-size: 11px; background: var(--panel); color: var(--muted); transition: 0.3s;
  }
  .g-tab.active { background: linear-gradient(135deg, var(--violet), var(--blue)); color: white; border-color: #fff; transform: translateY(-2px); }

  /* SELECTOR PANEL */
  .panel { 
    background: var(--panel); border-radius: 15px; padding: 15px; margin-bottom: 20px; 
    border: 1px solid var(--border); backdrop-filter: blur(10px);
  }
  select { 
    background: #0d1117; color: white; border: 1px solid #30363d; padding: 12px; 
    width: 100%; border-radius: 8px; font-weight: 600; font-size: 13px; outline: none;
  }

  /* SYMMETRICAL KPI GRID */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
  @media (max-width: 600px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
  .k-tile { 
    padding: 20px 10px; border-radius: 15px; border: 1px solid var(--border);
    text-align: center; transition: 0.3s;
  }
  /* Alternating Colors for Symmetry */
  .k-tile:nth-child(odd) { background: var(--grad-purp); }
  .k-tile:nth-child(even) { background: var(--grad-blue); }
  .k-tile.special { background: var(--grad-dark); border-color: var(--violet); }
  
  .k-tile small { font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; display: block; margin-bottom: 8px; }
  .k-tile .val { font-size: 14px; font-weight: 900; color: #fff; }
  .k-tile .sub { font-size: 8px; margin-top: 5px; color: var(--accent); font-weight: 700; }

  /* PREMIUM LEADERBOARD DESIGN */
  .section-header { font-weight: 900; font-size: 16px; color: #fff; margin: 30px 0 15px 0; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid var(--violet); padding-left: 10px; }
  
  .rank-list { display: flex; flex-direction: column; gap: 10px; }
  .rank-item { 
    display: flex; align-items: center; background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
    padding: 15px; border-radius: 12px; border: 1px solid var(--border); transition: 0.3s;
  }
  .rank-item:hover { border-color: var(--cyan); background: rgba(255,255,255,0.08); }
  
  .rank-num { width: 40px; font-size: 22px; font-weight: 900; color: var(--muted); font-style: italic; }
  .rank-item:nth-child(1) .rank-num { color: var(--accent); }
  
  .player-core { flex: 1; }
  .player-name { font-weight: 800; font-size: 15px; margin-bottom: 4px; display: block; }
  .player-meta { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .player-meta b { color: var(--cyan); }

  .points-badge { 
    background: #fff; color: #000; padding: 8px 15px; border-radius: 8px; 
    font-weight: 900; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="game-tabs">
    <div class="g-tab active" onclick="setMode('UNO', this)">UNO</div>
    <div class="g-tab" onclick="setMode('Bluff', this)">Bluff</div>
    <div class="g-tab" onclick="setMode('28', this)">28 Card</div>
  </div>

  <div class="panel">
    <select id="lineupFilter" onchange="renderAll()"></select>
    <div id="lineupDesc" style="font-size: 10px; color: var(--cyan); margin-top: 10px; text-align: center; font-style: italic;"></div>
  </div>

  <div class="kpi-grid" id="kpi-container"></div>

  <div class="section-header">Player Rankings</div>
  <div class="rank-list" id="leaderboard"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderAll();
};

window.renderAll = () => {
    if (!allData || allData.length === 0) return;
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    let lineups = {};
    rawGames.forEach(g => {
        const pNames = g.players ? g.players.map(p => p.name).sort() : [];
        if(pNames.length > 0) {
            const key = pNames.join(', ');
            if(!lineups[key]) lineups[key] = { count: pNames.length, names: key };
        }
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">All Global Data</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1} (${lineups[k].count}P) [${lineups[k].names}]</option>`).join('');

    const activeKey = lSelect.value || "ALL";
    const filtered = activeKey === "ALL" ? rawGames : rawGames.filter(g => (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey);
    document.getElementById('lineupDesc').innerText = activeKey === "ALL" ? "Combined historical stats." : "Active Lineup Selected.";

    const stats = {};
    filtered.forEach(g => {
        (g.players || []).forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0, rl:0, history: []};
            stats[p.name].pts += (p.pts || 0); stats[p.name].t++;
            if(p.rank === 1) stats[p.name].r1++;
            if(p.rank === 0) stats[p.name].rl++;
            stats[p.name].history.push(p.rank);
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);

    // KPI TILES
    let hatTrick = '—';
    for(let n in stats) {
        let s = 0, m = 0;
        stats[n].history.forEach(r => { if(r === 1) s++; else s = 0; if(s > m) m = s; });
        if(m >= 3) { hatTrick = n; break; }
    }
    const pred = sorted.length >= 2 ? `${sorted[1]} +${(stats[sorted[0]].pts - stats[sorted[1]].pts) + 1} Pts` : '—';

    document.getElementById('kpi-container').innerHTML = `
        <div class="k-tile"><small>Total Rounds</small><div class="val">${filtered.length}</div></div>
        <div class="k-tile"><small>Points King/Queen</small><div class="val">${sorted[0] || '—'}</div></div>
        <div class="k-tile"><small>Last King/Queen</small><div class="val">${Object.keys(stats).sort((a,b) => stats[b].rl - stats[a].rl)[0] || '—'}</div></div>
        <div class="k-tile"><small>Hat-Trick Hero</small><div class="val">${hatTrick}</div></div>
        <div class="k-tile special"><small>Prediction</small><div class="val">${pred}</div><div class="sub">All the Best!</div></div>
        <div class="k-tile"><small>Win Rate</small><div class="val">${sorted.length ? ((stats[sorted[0]].r1 / stats[sorted[0]].t)*100).toFixed(0)+'%' : '0%'}</div></div>
    `;

    // PREMIER LEADERBOARD
    document.getElementById('leaderboard').innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        return `
        <div class="rank-item">
            <div class="rank-num">${i+1}</div>
            <div class="player-core">
                <span class="player-name">${n}</span>
                <div class="player-meta">Wins: <b>${d.r1}</b> | Last: <b>${d.rl}</b> | Played: <b>${d.t}</b></div>
            </div>
            <div class="points-badge">${d.pts}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => {
    allData = snap.docs.map(d => d.data());
    renderAll();
});
</script>
</body>
</html>
