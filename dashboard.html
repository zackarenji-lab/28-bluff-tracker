<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Elite Command Center</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #0d0d1a 0%, #101026 40%, #05050d 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --neon-green: #3fff3f; --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    --tile-grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
    --gold-bg: linear-gradient(135deg, rgba(255, 211, 109, 0.18) 0%, rgba(212, 175, 55, 0.08) 100%);
    --gold-border: rgba(255, 211, 109, 0.4);
  }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .wrap { max-width: 1200px; margin: auto; padding: 20px; }
  
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .home-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 11px; border: 1px solid var(--gold-border); padding: 10px 20px; border-radius: 30px; background: rgba(255,211,109,0.05); text-transform: uppercase; }
  .share-btn { cursor: pointer; background: rgba(0, 245, 255, 0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 30px; font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }

  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
  .g-tab { padding: 16px; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.05); font-size: 13px; background: rgba(255, 255, 255, 0.05); color: var(--muted); transition: 0.3s; }
  .g-tab.active { background: var(--tile-grad); color: white; border-color: rgba(255,255,255,0.4); box-shadow: 0 10px 20px rgba(61, 61, 255, 0.3); transform: translateY(-4px); }

  .panel { background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 10px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; outline: none; }

  .top-section { display: grid; grid-template-columns: 380px 1fr; gap: 25px; margin-bottom: 40px; align-items: stretch; }
  @media (max-width: 1100px) { .top-section { grid-template-columns: 1fr; } }

  .hof-card { background: linear-gradient(160deg, #111122 0%, #1a1a3a 100%); border-radius: 24px; padding: 30px; border: 1px solid rgba(123, 44, 191, 0.3); text-align: center; display: flex; flex-direction: column; align-items: center; }
  .cup-icon { width: 55px; margin: 0 auto 15px auto; display: block; filter: drop-shadow(0 0 10px rgba(255,211,109,0.3)); }
  
  .hof-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 10px; width: 100%; }
  .hof-rank-lbl { font-weight: 900; font-size: 15px; color: var(--accent); width: 30px; text-align: left; }
  .hof-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--cyan); object-fit: cover; }
  .p-name-cap { text-transform: uppercase; font-size: 14px; font-weight: 900; color: #fff; flex: 1; text-align: left; }
  .p-pts-big { color: var(--accent); font-weight: 900; font-size: 18px; }

  .va-title { color:var(--accent); font-weight:900; font-size:12px; letter-spacing:4px; margin: 25px 0 15px 0; opacity:0.8; text-transform: uppercase; }
  .pred-box { background: var(--gold-bg); border: 1px solid var(--gold-border); border-radius: 16px; padding: 22px; text-align: left; margin-top: auto; width: 85%; }
  .pred-line { font-size: 13px; color: #fff; margin-bottom: 8px; line-height: 1.4; font-style: italic; display: block; }

  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .k-tile { padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); min-height: 115px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
  .k-tile small { font-size: 9px; font-weight: 900; color: #fff; margin-bottom: 8px; text-transform: uppercase; opacity: 0.9; }
  .k-tile .val { font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; max-width: 65%; z-index: 2; }
  .tile-avatar { position: absolute; bottom: 10px; right: 10px; width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; z-index: 1; }

  .c1{background: linear-gradient(135deg, #3d3dff, #a020f0);} .c2{background: linear-gradient(135deg, #00b4d8, #0077b6);} .c3{background: linear-gradient(135deg, #7b2cbf, #5a189a);} .c4{background: linear-gradient(135deg, #ef476f, #d00000);} .c5{background: linear-gradient(135deg, #06d6a0, #00afb9);} .c6{background: linear-gradient(135deg, #ff9f1c, #f3722c);} .c7{background: linear-gradient(135deg, #5e60ce, #480ca8);} .c8{background: linear-gradient(135deg, #212529, #343a40);} .c9{background: linear-gradient(135deg, #4361ee, #3a0ca3);}

  .ranking-header { font-weight: 900; font-size: 18px; color: #fff; margin: 30px 0 20px 0; text-transform: uppercase; display: flex; align-items: center; gap: 15px; }
  .ranking-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--violet), transparent); }
  
  .rank-row { background: rgba(255, 255, 255, 0.03); margin-bottom: 12px; padding: 15px 20px; border-radius: 20px; display: grid; grid-template-columns: 50px 65px 120px 1fr 100px; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
  .num { font-weight: 900; color: var(--cyan); font-size: 24px; }
  .p-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--cyan); background: #161b22; object-fit: cover; }
  .p-name { font-weight: 800; font-size: 17px; color: #fff; text-transform: uppercase; }
  .p-chart-container { height: 34px; background: rgba(255, 255, 255, 0.05); border-radius: 17px; position: relative; overflow: hidden; display: flex; align-items: center; padding: 0 65px 0 0; border: 1px solid rgba(255,255,255,0.1); }
  .p-chart-fill { height: 100%; background: linear-gradient(to right, #bc13fe, #3a86ff); border-radius: 17px; transition: width 1.2s ease; }
  .perc-bubble { position: absolute; right: 4px; background: #00f5ff; color: #000; font-weight: 900; font-size: 13px; padding: 4px 10px; border-radius: 12px; }
  .score-box { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 12px 20px; border-radius: 12px; font-weight: 900; font-size: 22px; text-align: center; }
</style>
</head>
<body id="capture-area">

<div class="wrap">
  <header>
    <a href="index.html" class="home-link">🏠 HOME</a>
    <div class="share-btn" onclick="takeSnapshot()">📸 Share Stats</div>
  </header>

  <div class="game-tabs">
    <div class="g-tab active" id="tab-UNO" onclick="setMode('UNO', this)">Uno Cards</div>
    <div class="g-tab" id="tab-Bluff" onclick="setMode('Bluff', this)">Bluff Game</div>
    <div class="g-tab" id="tab-28" onclick="setMode('28', this)">28 Card</div>
  </div>

  <div class="panel">
    <select id="lineupFilter" onchange="renderAll()"></select>
  </div>

  <div class="top-section">
    <div class="hof-card">
      <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" class="cup-icon">
      <div id="hof-title" style="font-weight:900; color:var(--accent); font-size:18px; margin-bottom:15px;">UNO ELITE HALL</div>
      <div id="podium-list" style="width: 100%;"></div>
      <p class="va-title">VICTORY AWAITS</p>
      <div class="pred-box">
        <div id="predictions-list"></div>
        <span style="color:var(--accent); font-weight:900; font-size:10px; text-transform:uppercase; margin-top:10px; display:block;">ALL THE BEST!</span>
      </div>
    </div>

    <div class="intel-side">
      <div class="kpi-grid" id="kpi-container"></div>
    </div>
  </div>

  <div class="ranking-header">Live Player Rankings</div>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

const getAvatarPath = (name) => {
    if(!name || name === '—' || name.includes('&')) return null;
    return name.charAt(0).toUpperCase() + name.slice(1).toLowerCase() + ".png";
};

window.takeSnapshot = () => {
    html2canvas(document.querySelector("#capture-area"), { backgroundColor: "#0d0d1a", scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = `GZ_Stats_${currentMode}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
};

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('hof-title').innerText = m.toUpperCase() + " ELITE HALL";
    renderAll();
};

window.renderAll = () => {
    if(!allData.length) return;
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    let lineups = {};
    if(is28) {
        rawGames.forEach(g => {
            if(g.teamA && g.teamB) {
                const key = `${g.teamA} vs ${g.teamB}`;
                if(!lineups[key]) lineups[key] = { count: 4, names: key };
            }
        });
    } else {
        rawGames.forEach(g => {
            const pNames = g.players ? g.players.map(p => p.name).sort() : [];
            const key = pNames.join(', ');
            if(key) lineups[key] = { count: pNames.length, names: key };
        });
    }

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Global History Statistics</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1}: ${k}</option>`).join('');

    const activeKey = lSelect.value || "ALL";
    const filtered = activeKey === 'ALL' ? rawGames : rawGames.filter(g => {
        if(is28) return `${g.teamA} vs ${g.teamB}` === activeKey;
        return (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey;
    });

    const stats = {};
    if(is28) {
        filtered.forEach(g => {
            if(!stats[g.winner]) stats[g.winner] = {wins:0, t:0, l:0};
            if(!stats[g.loser]) stats[g.loser] = {wins:0, t:0, l:0};
            stats[g.winner].wins++; stats[g.winner].t++;
            stats[g.loser].l++; stats[g.loser].t++;
        });
    } else {
        filtered.forEach(g => {
            (g.players || []).forEach(p => {
                if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0};
                stats[p.name].pts += (p.pts || 0); stats[p.name].t++;
                if(p.rank === 1) stats[p.name].r1++;
            });
        });
    }

    const sorted = Object.keys(stats).sort((a,b) => is28 ? stats[b].wins - stats[a].wins : stats[b].pts - stats[a].pts);

    document.getElementById('podium-list').innerHTML = sorted.slice(0,3).map((n, i) => {
        const val = is28 ? stats[n].wins + " Wins" : stats[n].pts;
        const avatar = is28 ? '' : `<img class="hof-avatar" src="${getAvatarPath(n)}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">`;
        return `
        <div class="hof-item">
            <span class="hof-rank-lbl">#${i+1}</span>
            ${avatar}
            <b class="p-name-cap">${n}</b>
            <span class="p-pts-big">${val}</span>
        </div>`;
    }).join('');

    if(sorted.length >= 2 && !is28) {
        const champ = sorted[0];
        const challengers = sorted.slice(1, 3);
        let predHtml = challengers.map(p => `<span class="pred-line">${p} needs <b>${stats[champ].pts - stats[p].pts + 1} pts</b> to beat ${champ}</span>`).join('');
        document.getElementById('predictions-list').innerHTML = predHtml;
    } else {
        document.getElementById('predictions-list').innerHTML = is28 ? '<span class="pred-line">Team Battle Active</span>' : '';
    }

    const mkT = (lbl, val, c) => {
        const path = getAvatarPath(val);
        const img = path ? `<img class="tile-avatar" src="${path}" onerror="this.style.display='none'">` : '';
        return `<div class="k-tile ${c}"><small>${lbl}</small><div class="val">${val}</div>${img}</div>`;
    };

    const king = sorted[0] || '—';
    if(is28) {
        document.getElementById('kpi-container').innerHTML = 
            `<div class="k-tile c1"><small>Series Total</small><div class="val">${filtered.length}</div></div>` +
            mkT('Top Team', king, 'c2') + mkT('Last Defeated', Object.keys(stats).sort((a,b)=>stats[b].l-stats[a].l)[0]||'—', 'c3') +
            `<div class="k-tile c4"><small>Win Rate</small><div class="val">${sorted.length ? ((stats[king].wins/stats[king].t)*100).toFixed(0)+'%' : '0%'}</div></div>`;
    } else {
        const finisher = Object.keys(stats).sort((a,b)=>stats[b].r1-stats[a].r1)[0] || '—';
        document.getElementById('kpi-container').innerHTML = 
            `<div class="k-tile c1"><small>Total Rounds</small><div class="val">${filtered.length}</div></div>` +
            mkT('Points King', king, 'c2') + mkT('Top Wins', finisher, 'c4') +
            mkT('Comeback Pro', king, 'c5') + mkT('Consistent', king, 'c6') +
            `<div class="k-tile c9"><small>Peak Rate</small><div class="val">${sorted.length ? ((stats[king].r1/stats[king].t)*100).toFixed(0)+'%' : '0%'}</div></div>`;
    }

    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        const winPercent = is28 ? ((d.wins/d.t)*100).toFixed(0) : ((d.r1/d.t)*100).toFixed(0);
        const val = is28 ? d.wins : d.pts;
        const sub = is28 ? "Wins" : "Pts";
        return `
        <div class="rank-row">
            <div class="num">#${i+1}</div>
            <img class="p-avatar" src="${getAvatarPath(n)}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
            <div class="p-name">${n}</div>
            <div class="p-chart-container"><div class="p-chart-fill" style="width:${winPercent}%"></div><div class="perc-bubble">${winPercent}%</div></div>
            <div class="score-box" style="width:80px;">${val} ${sub}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => { allData = snap.docs.map(d => d.data()); renderAll(); });
</script>
</body>
</html>
