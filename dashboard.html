<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Elite Dashboard</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #0d0d1a 0%, #101026 40%, #05050d 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --neon-green: #3fff3f; --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    --tile-grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
  }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .wrap { max-width: 1200px; margin: auto; padding: 20px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .home-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 11px; border: 1px solid rgba(255,211,109,0.3); padding: 10px 20px; border-radius: 30px; background: rgba(255,211,109,0.05); text-transform: uppercase; }
  .share-btn { cursor: pointer; background: rgba(0, 245, 255, 0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 30px; font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
  .g-tab { padding: 16px; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05); font-size: 13px; background: rgba(255, 255, 255, 0.05); color: var(--muted); }
  .g-tab.active { background: var(--tile-grad); color: white; border-color: rgba(255,255,255,0.4); box-shadow: 0 10px 20px rgba(61, 61, 255, 0.3); }
  .panel { background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 10px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; outline: none; }
  .top-section { display: grid; grid-template-columns: 380px 1fr; gap: 25px; margin-bottom: 40px; align-items: stretch; }
  .hof-card { background: linear-gradient(160deg, #111122 0%, #1a1a3a 100%); border-radius: 24px; padding: 30px; border: 1px solid rgba(123, 44, 191, 0.3); text-align: center; }
  .hof-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 10px; }
  .hof-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--cyan); object-fit: cover; }
  .p-name-cap { text-transform: uppercase; font-size: 15px; font-weight: 900; color: #fff; flex: 1; text-align: left; }
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .k-tile { padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); min-height: 115px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  .k-tile small { font-size: 10px; font-weight: 900; color: #fff; margin-bottom: 8px; text-transform: uppercase; opacity: 0.9; }
  .k-tile .val { font-size: 18px; font-weight: 900; color: #fff; text-transform: uppercase; }
  .tile-avatar { position: absolute; bottom: 10px; right: 10px; width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; }
  .rank-row { background: rgba(255, 255, 255, 0.03); margin-bottom: 12px; padding: 15px 20px; border-radius: 20px; display: grid; grid-template-columns: 50px 65px 120px 1fr 100px; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
  .num { font-weight: 900; color: var(--cyan); font-size: 24px; }
  .p-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; }
  .p-name { font-weight: 800; font-size: 17px; color: #fff; text-transform: uppercase; }
  .p-chart-container { height: 34px; background: rgba(255, 255, 255, 0.05); border-radius: 17px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
  .p-chart-fill { height: 100%; background: linear-gradient(to right, #bc13fe, #3a86ff); border-radius: 17px; }
  .perc-bubble { position: absolute; right: 4px; top: 5px; background: #00f5ff; color: #000; font-weight: 900; font-size: 13px; padding: 4px 10px; border-radius: 12px; }
  .score-box { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 12px 20px; border-radius: 12px; font-weight: 900; font-size: 22px; text-align: center; }
</style>
</head>
<body id="capture-area">

<div class="wrap">
  <header>
    <a href="index.html" class="home-link">🏠 HOME</a>
    <div class="share-btn" onclick="takeSnapshot()">📸 Share Stats</div>
  </header>

  <div class="game-tabs">
    <div class="g-tab" id="tab-UNO" onclick="setMode('UNO', this)">Uno Cards</div>
    <div class="g-tab" id="tab-Bluff" onclick="setMode('Bluff', this)">Bluff Game</div>
    <div class="g-tab" id="tab-28" onclick="window.location.href='dash28.html'">28 Card</div>
  </div>

  <div class="panel"><select id="lineupFilter" onchange="renderAll()"></select></div>

  <div class="top-section">
    <div class="hof-card">
      <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" style="width:55px; margin-bottom:15px;">
      <div id="hof-title" style="font-weight:900; color:var(--accent); font-size:18px; margin-bottom:15px;">ELITE HALL</div>
      <div id="podium-list"></div>
    </div>
    <div class="intel-side"><div class="kpi-grid" id="kpi-container"></div></div>
  </div>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const app = initializeApp({ apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" });
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
const urlParams = new URLSearchParams(window.location.search);
let currentMode = urlParams.get('mode') || 'UNO';

const getAvatarPath = (n) => n.charAt(0).toUpperCase() + n.slice(1).toLowerCase() + ".png";

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderAll();
};

window.renderAll = () => {
    const rawGames = allData.filter(g => g.gameType === currentMode && g.winner);
    let lineups = {};
    rawGames.forEach(g => {
        const pNames = g.players ? g.players.map(p => p.name).sort() : [];
        const key = pNames.join(', ');
        if(key) lineups[key] = { count: pNames.length };
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Total Combined Statistics</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1} (${lineups[k].count}P) [${k}]</option>`).join('');

    const activeKey = lSelect.value || "ALL";
    const filtered = activeKey === 'ALL' ? rawGames : rawGames.filter(g => (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey);

    const stats = {};
    filtered.forEach(g => {
        g.players.forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0, rl:0};
            stats[p.name].pts += p.pts; stats[p.name].t++;
            if(p.rank === 1) stats[p.name].r1++; else if(p.rank === 0) stats[p.name].rl++;
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);

    document.getElementById('podium-list').innerHTML = sorted.slice(0,3).map((n, i) => `
        <div class="hof-item">
            <span style="color:var(--accent); width:30px; font-weight:900;">#${i+1}</span>
            <img class="hof-avatar" src="${getAvatarPath(n)}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
            <b class="p-name-cap">${n}</b>
            <span style="color:var(--cyan); font-weight:900;">${stats[n].pts}</span>
        </div>`).join('');

    const top = sorted[0] || '—';
    const last = Object.keys(stats).sort((a,b)=>stats[b].rl-stats[a].rl)[0] || '—';
    const wins = Object.keys(stats).sort((a,b)=>stats[b].r1-stats[a].r1)[0] || '—';

    document.getElementById('kpi-container').innerHTML = `
        <div class="k-tile" style="background:var(--tile-grad)"><small>Total Rounds</small><div class="val">${filtered.length}</div></div>
        <div class="k-tile" style="background:linear-gradient(135deg,#00b4d8,#0077b6)"><small>Points King</small><div class="val">${top}</div><img class="tile-avatar" src="${getAvatarPath(top)}" onerror="this.style.display='none'"></div>
        <div class="k-tile" style="background:linear-gradient(135deg,#ef476f,#d00000)"><small>Last Place</small><div class="val">${last}</div><img class="tile-avatar" src="${getAvatarPath(last)}" onerror="this.style.display='none'"></div>
    `;

    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n]; const wP = ((d.r1/d.t)*100).toFixed(0);
        return `<div class="rank-row">
            <div class="num">#${i+1}</div>
            <img class="p-avatar" src="${getAvatarPath(n)}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
            <div class="p-name">${n}</div>
            <div class="p-chart-container"><div class="p-chart-fill" style="width:${wP}%"></div><div class="perc-bubble">${wP}%</div></div>
            <div class="score-box">${d.pts}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => { 
    allData = snap.docs.map(d => d.data()); 
    document.querySelectorAll('.g-tab').forEach(t => { t.classList.remove('active'); if(t.innerText.toUpperCase().includes(currentMode.toUpperCase())) t.classList.add('active'); });
    renderAll(); 
});
</script>
</body>
</html>
