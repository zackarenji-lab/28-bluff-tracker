<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Command Center Ultra</title>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #0d0d1a 0%, #101026 40%, #05050d 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
  }
  body { 
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); 
    background-attachment: fixed; color: var(--text); min-height: 100vh;
  }
  .wrap { max-width: 1000px; margin: auto; padding: 20px; }
  
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .home-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 11px; border: 1px solid rgba(255,211,109,0.3); padding: 10px 20px; border-radius: 30px; background: rgba(255,211,109,0.05); text-transform: uppercase; letter-spacing: 1px; }

  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
  .g-tab { 
    padding: 16px; border-radius: 12px; text-align: center; font-weight: 900; 
    cursor: pointer; text-transform: uppercase; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.05); 
    font-size: 13px; background: rgba(255, 255, 255, 0.05); color: var(--muted); transition: 0.3s;
  }
  .g-tab.active { 
    background: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%); color: white; border-color: rgba(255,255,255,0.4);
    box-shadow: 0 10px 20px rgba(61, 61, 255, 0.3); transform: translateY(-4px);
  }

  .panel { background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
  .panel-header { font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 15px; display: block; }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; outline: none; }

  .mid-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 30px; }
  @media (max-width: 850px) { .mid-grid { grid-template-columns: 1fr; } }

  /* HALL OF FAME */
  .hof-card { background: linear-gradient(160deg, #111122 0%, #1a1a3a 100%); border-radius: 24px; padding: 30px; border: 1px solid rgba(123, 44, 191, 0.3); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
  .hof-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .rank-lbl { font-weight: 900; font-size: 20px; color: var(--muted); font-style: italic; }
  .p-name-cap { text-transform: uppercase; font-size: 20px; font-weight: 900; color: #fff; flex: 1; text-align: left; margin-left: 20px; letter-spacing: 1px; }
  .p-pts-big { color: var(--accent); font-weight: 900; font-size: 28px; text-shadow: 0 0 10px rgba(255,211,109,0.3); }

  /* PREDICTION AREA IN HOF */
  .va-title { color:var(--accent); font-weight:900; font-size:13px; letter-spacing:4px; margin: 25px 0 15px 0; opacity:0.8; }
  .pred-text { font-size: 11px; color: var(--text); margin: 5px 0; opacity: 0.9; font-style: italic; }

  /* KPI SECTION */
  .section-header { font-weight: 900; font-size: 18px; color: #fff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
  .section-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--blue), transparent); }

  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 600px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }

  .k-tile { 
    padding: 25px 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
    position: relative; overflow: hidden; min-height: 120px; display: flex; flex-direction: column; justify-content: center;
  }
  /* 9 UNIQUE GRADIENTS */
  .k-tile:nth-child(1) { background: linear-gradient(135deg, #3d3dff, #a020f0); }
  .k-tile:nth-child(2) { background: linear-gradient(135deg, #00b4d8, #0077b6); }
  .k-tile:nth-child(3) { background: linear-gradient(135deg, #7b2cbf, #5a189a); }
  .k-tile:nth-child(4) { background: linear-gradient(135deg, #ef476f, #d00000); }
  .k-tile:nth-child(5) { background: linear-gradient(135deg, #06d6a0, #00afb9); }
  .k-tile:nth-child(6) { background: linear-gradient(135deg, #ff9f1c, #f3722c); }
  .k-tile:nth-child(7) { background: linear-gradient(135deg, #5e60ce, #480ca8); }
  .k-tile:nth-child(8) { background: linear-gradient(135deg, #212529, #343a40); } /* Wooden Spoon */
  .k-tile:nth-child(9) { background: linear-gradient(135deg, #4361ee, #3a0ca3); }

  .k-tile:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .k-tile small { font-size: 9px; font-weight: 900; color: rgba(255,255,255,0.9); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .k-tile .val { font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; }
  
  .tile-bars { position: absolute; bottom: 10px; right: 10px; display: flex; align-items: flex-end; gap: 3px; opacity: 0.3; }
  .t-bar { width: 4px; background: #fff; border-radius: 2px; }

  /* RANKING SECTION */
  .ranking-header { font-weight: 900; font-size: 18px; color: #fff; margin: 40px 0 20px 0; display: flex; align-items: center; gap: 15px; text-transform: uppercase; letter-spacing: 2px; }
  .ranking-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--violet), transparent); }

  .rank-row { background: rgba(255, 255, 255, 0.03); margin-bottom: 12px; padding: 22px; border-radius: 16px; display: flex; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.05); }
  .num { width: 35px; font-weight: 900; color: var(--cyan); font-size: 26px; }
  .p-info { flex: 1; }
  .p-name { font-weight: 800; font-size: 16px; color: #fff; text-transform: uppercase; }
  .p-chart-container { width: 100%; height: 6px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 12px; }
  .p-chart-fill { height: 100%; background: linear-gradient(to right, var(--cyan), var(--blue), var(--violet)); border-radius: 10px; }
  .score-box { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 12px 22px; border-radius: 12px; font-weight: 900; font-size: 18px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <a href="index.html" class="home-link">🏠 HOME</a>
    <div style="font-weight: 900; font-size: 11px; letter-spacing: 2px; color: var(--muted);">ELITE ANALYTICS</div>
  </header>

  <div class="game-tabs">
    <div class="g-tab active" id="tab-UNO" onclick="setMode('UNO', this)">Uno Cards</div>
    <div class="g-tab" id="tab-Bluff" onclick="setMode('Bluff', this)">Bluff Game</div>
    <div class="g-tab" id="tab-28" onclick="setMode('28', this)">28 Card</div>
  </div>

  <div class="panel">
    <span class="panel-header">Group Configuration</span>
    <select id="lineupFilter" onchange="renderAll()"></select>
    <p id="lineupDesc" style="font-size: 10px; color: var(--cyan); margin: 12px 0 0 0; font-style: italic; opacity: 0.9;"></p>
  </div>

  <div class="mid-grid">
    <div class="hof-card">
      <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" style="width:55px; margin-bottom:15px; filter: drop-shadow(0 0 10px rgba(255,211,109,0.3));">
      <h4 id="hof-title" style="margin:0; font-size:18px; letter-spacing:2px; color: var(--accent);">UNO ELITE HALL</h4>
      <div class="hof-list" id="podium-list" style="margin: 15px 0;"></div>
      <div class="va-title">VICTORY AWAITS</div>
      <div id="predictions-list"></div>
    </div>

    <div>
      <div class="section-header">Tournament Intelligence</div>
      <div class="kpi-grid" id="kpi-container"></div>
    </div>
  </div>

  <div class="ranking-header">Player Ranking</div>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('hof-title').innerText = m.toUpperCase() + " ELITE HALL";
    renderAll();
};

window.renderAll = () => {
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    let lineups = {};
    rawGames.forEach(g => {
        const pNames = g.players ? g.players.map(p => p.name).sort() : [];
        const key = pNames.join(', ');
        if(!lineups[key]) lineups[key] = { count: pNames.length, names: key };
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Total Combined Statistics</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1} (${lineups[k].count}P) [${lineups[k].names}]</option>`).join('');

    const activeKey = lSelect.value;
    const filtered = activeKey === 'ALL' ? rawGames : rawGames.filter(g => (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey);
    document.getElementById('lineupDesc').innerText = activeKey === 'ALL' ? "Global data across all player sessions." : "Members: " + activeKey;

    const stats = {};
    filtered.forEach(g => {
        (g.players || []).forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0, r2:0, r3:0, rl:0, history: []};
            stats[p.name].pts += (p.pts || 0); stats[p.name].t++;
            if(p.rank === 1) stats[p.name].r1++;
            else if(p.rank === 2) stats[p.name].r2++;
            else if(p.rank === 3) stats[p.name].r3++;
            else if(p.rank === 0) stats[p.name].rl++;
            stats[p.name].history.push(p.rank);
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);

    document.getElementById('podium-list').innerHTML = sorted.slice(0,3).map((n, i) => `
        <div class="hof-item">
            <span class="rank-lbl">#${i+1}</span>
            <b class="p-name-cap">${n}</b>
            <span class="p-pts-big">${stats[n].pts}</span>
        </div>`).join('');

    // PREDICTIONS BELOW VICTORY AWAITS
    if(sorted.length >= 2) {
        const champ = sorted[0];
        const challengers = sorted.slice(1, 3);
        document.getElementById('predictions-list').innerHTML = challengers.map(p => {
            const diff = stats[champ].pts - stats[p].pts;
            return `<div class="pred-text">${p} needs ${diff + 1} pts to beat ${champ}</div>`;
        }).join('');
    }

    // KPI LOGIC
    let hatTrickHero = '—';
    let spoonKing = '—';
    for(let n in stats) {
        let streakW = 0, maxW = 0, streakL = 0, maxL = 0;
        stats[n].history.forEach(r => { 
            if(r === 1) streakW++; else streakW = 0; 
            if(r === 0) streakL++; else streakL = 0;
            if(streakW > maxW) maxW = streakW;
            if(streakL > maxL) maxL = streakL;
        });
        if(maxW >= 3) hatTrickHero = n;
        if(maxL >= 3) spoonKing = n;
    }

    const mkTile = (lbl, val) => `
        <div class="k-tile">
            <small>${lbl}</small>
            <div class="val">${val}</div>
            <div class="tile-bars">
                <div class="t-bar" style="height:10px"></div><div class="t-bar" style="height:18px"></div>
                <div class="t-bar" style="height:28px"></div><div class="t-bar" style="height:22px"></div>
                <div class="t-bar" style="height:14px"></div>
            </div>
        </div>`;

    document.getElementById('kpi-container').innerHTML = 
        mkTile('Total Rounds', filtered.length) +
        mkTile('Points King/Queen', sorted[0] || '—') +
        mkTile('Last King/Queen', Object.keys(stats).sort((a,b) => stats[b].rl - stats[a].rl)[0] || '—') +
        mkTile('Highest Finisher', Object.keys(stats).sort((a,b) => stats[b].r1 - stats[a].r1)[0] || '—') +
        mkTile('Comeback King/Queen', Object.keys(stats).sort((a,b) => (stats[b].r1/stats[b].t) - (stats[a].r1/stats[a].t))[0] || '—') +
        mkTile('Consistent Pro', Object.keys(stats).sort((a,b) => (stats[b].r2 + stats[b].r3) - (stats[a].r2 + stats[a].r3))[0] || '—') +
        mkTile('Hat-Trick Hero', hatTrickHero) +
        mkTile('Wooden Spoon', spoonKing) + // Spoon King = Hat-trick Loser
        mkTile('Peak Win Rate', sorted.length ? ((stats[sorted[0]].r1 / stats[sorted[0]].t) * 100).toFixed(0) + "%" : "0%");

    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        const winPercent = ((d.r1 / d.t) * 100).toFixed(0);
        return `
        <div class="rank-row">
            <div class="num">#${i+1}</div>
            <div class="p-info">
                <div class="p-name">${n}</div>
                <div class="p-chart-container"><div class="p-chart-fill" style="width: ${winPercent}%"></div></div>
            </div>
            <div class="score-box">${d.pts}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => { allData = snap.docs.map(d => d.data()); renderAll(); });
</script>
</body>
</html>
