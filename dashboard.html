<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Command Center</title>
<style>
  :root { --bg:#050b18; --glass:rgba(255,255,255,0.05); --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info:#3498db; --muted:#9fb7bf; }
  body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:#fff; overflow-x:hidden; }
  .wrap { max-width:900px; margin:auto; padding:20px; }
  header { display:flex; align-items:center; gap:10px; margin-bottom:20px; border-bottom:1px solid #ffffff10; padding-bottom:15px; }
  .logo { font-weight:900; font-size:20px; background:linear-gradient(to right, #ff6b6b, #ffd36d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; flex:1; }
  .glass { background:var(--glass); backdrop-filter:blur(20px); border-radius:24px; border:1px solid rgba(255,255,255,0.08); padding:20px; margin-bottom:15px; }
  
  /* TOP BUTTONS */
  .nav-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:8px 15px; border-radius:20px; font-size:11px; font-weight:800; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:5px; }
  .nav-btn.home { background:var(--info); color:#fff; border:none; }

  .podium { display:grid; grid-template-columns: 1fr 1.2fr 1fr; gap:10px; align-items:flex-end; margin-bottom:20px; text-align:center; }
  .podium-item { background:rgba(255,255,255,0.02); border-radius:15px; padding:15px; border:1px solid rgba(255,255,255,0.05); }
  .podium-item.first { border-color:var(--gold); box-shadow:0 0 30px rgba(255,211,109,0.15); padding-top:30px; }

  .tab-bar { display:flex; gap:8px; margin-bottom:15px; }
  .tab { padding:10px 18px; border-radius:30px; background:rgba(255,255,255,0.05); font-size:11px; font-weight:800; cursor:pointer; }
  .tab.active { background:var(--accent); color:#050b18; }
  
  select { background:#162136 !important; color:#ffffff !important; padding:10px; border-radius:10px; border:1px solid #ffffff30; font-weight:600; width:100%; }
  
  .leader-row { display:flex; align-items:center; gap:12px; padding:12px; background:rgba(255,255,255,0.02); border-radius:15px; margin-bottom:8px; }
  .l-name { flex:1; font-weight:700; font-size:13px; }
  .l-pts { font-weight:900; color:var(--accent); }
  
  .h2h-box { background:rgba(0,0,0,0.3); border-radius:15px; padding:15px; text-align:center; margin-top:10px; border: 1px dashed #ffffff20; }
  .log-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #ffffff05; font-size:11px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">COMMAND CENTER</div>
    <a href="index.html" class="nav-btn home">🏠 Home</a>
    <button class="nav-btn" onclick="share()">📤 Share</button>
  </header>

  <div class="tab-bar">
    <div class="tab active" onclick="setMode('UNO', this)">UNO</div>
    <div class="tab" onclick="setMode('Bluff', this)">BLUFF</div>
  </div>

  <div class="glass" style="display:flex; align-items:center; gap:10px; padding:12px;">
    <span style="font-size:11px; font-weight:800; color:var(--muted)">LINEUP:</span>
    <select id="lineupFilter" onchange="render()"></select>
  </div>

  <div class="podium" id="podium"></div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:13px; color:var(--accent); letter-spacing:1px;">LEADERBOARD</h3>
    <div id="leaderboard"></div>
  </div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:13px; color:var(--gold);">⚔️ RIVALRY MATRIX</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <select id="rival1" onchange="runH2H()"></select>
      <select id="rival2" onchange="runH2H()"></select>
    </div>
    <div id="h2h-res" class="h2h-box">Pick two players...</div>
  </div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:13px; color:var(--danger)">MATCH HISTORY</h3>
    <div id="history"></div>
    <button class="nav-btn" style="width:100%; margin-top:15px; background:var(--danger); border:none;" onclick="resetGame()">⚠️ Wipe Mode Data</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let all = []; let mode = 'UNO';

window.setMode = (m, el) => {
    mode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
};

window.render = () => {
    const raw = all.filter(g => g.gameType === mode && g.winner);
    const lineups = [...new Set(raw.map(g => g.lineupName))].filter(Boolean);
    const lSel = document.getElementById('lineupFilter');
    const curL = lSel.value;
    lSel.innerHTML = `<option value="ALL">All Combined</option>` + lineups.map(l => `<option value="${l}" ${l===curL?'selected':''}>${l}</option>`).join('');

    const filtered = lSel.value === 'ALL' ? raw : raw.filter(g => g.lineupName === lSel.value);
    const st = {};
    filtered.forEach(g => {
        (g.players || []).forEach(p => {
            if(!st[p.name]) st[p.name] = {pts:0, w:0, l:0, t:0};
            st[p.name].pts += (p.pts || 0); st[p.name].t++;
            if(p.rank === 1) st[p.name].w++; if(p.rank === 0) st[p.name].l++;
        });
    });

    const sorted = Object.keys(st).sort((a,b) => st[b].pts - st[a].pts);
    
    // Podium
    const pod = document.getElementById('podium');
    if(sorted.length >= 2) {
        pod.innerHTML = `
            <div class="podium-item"><div>🥈 2nd</div><span style="font-weight:900;">${sorted[1]}</span><br><small>${st[sorted[1]].pts} Pts</small></div>
            <div class="podium-item first"><div>👑 Champion</div><span style="font-weight:900; font-size:18px;">${sorted[0]}</span><br><small>${st[sorted[0]].pts} Pts</small></div>
            <div class="podium-item"><div>🥉 3rd</div><span style="font-weight:900;">${sorted[2]||'—'}</span><br><small>${sorted[2]?st[sorted[2]].pts:0} Pts</small></div>`;
    }

    // Leaderboard
    document.getElementById('leaderboard').innerHTML = sorted.map((n, i) => `
        <div class="leader-row">
            <div style="font-weight:900; color:var(--muted); width:20px;">#${i+1}</div>
            <div class="l-name">${n}</div>
            <div class="l-pts">${st[n].pts} Pts</div>
        </div>`).join('');

    // H2H Selects
    ['rival1', 'rival2'].forEach(id => {
        const s = document.getElementById(id); const val = s.value;
        s.innerHTML = `<option value="">Select Player</option>` + sorted.map(n => `<option value="${n}" ${n===val?'selected':''}>${n}</option>`).join('');
    });

    // History
    document.getElementById('history').innerHTML = filtered.slice(-8).reverse().map(g => `
        <div class="log-item">
            <span>${new Date(g.time).toLocaleDateString()} - 🏆 <b>${g.winner}</b></span>
            <button style="background:none; border:1px solid var(--danger); color:var(--danger); padding:4px 8px; border-radius:6px; cursor:pointer;" onclick="del('${g.time}')">DEL</button>
        </div>`).join('');
};

window.runH2H = () => {
    const p1 = document.getElementById('rival1').value;
    const p2 = document.getElementById('rival2').value;
    if(!p1 || !p2 || p1 === p2) return;
    const games = all.filter(g => g.gameType === mode);
    let p1w = 0, p2w = 0, p1l = 0, p2l = 0, shared = 0;
    games.forEach(g => {
        const ns = (g.players||[]).map(p=>p.name);
        if(ns.includes(p1) && ns.includes(p2)) {
            shared++; if(g.winner === p1) p1w++; if(g.winner === p2) p2w++;
            if(g.last === p1) p1l++; if(g.last === p2) p2l++;
        }
    });
    document.getElementById('h2h-res').innerHTML = `
        <div style="display:flex; justify-content:space-between;">
            <div><b>${p1}</b><br><small>${p1w}W | ${p1l}💩</small></div>
            <div style="font-size:10px; opacity:0.5">VS<br>${shared} Matches</div>
            <div><b>${p2}</b><br><small>${p2w}W | ${p2l}💩</small></div>
        </div>`;
};

window.share = () => {
    const l = document.getElementById('lineupFilter').value;
    let msg = `🏆 ${mode} [${l}] Leaderboard\n\n`;
    document.querySelectorAll('.leader-row').forEach(r => msg += `${r.innerText}\n`);
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
};

window.del = async (t) => { if(prompt("Password:") === PASS) { const s = await getDocs(query(gRef, where("time", "==", t))); s.forEach(async d => await deleteDoc(d.ref)); } };
window.resetGame = async () => { if(prompt("Reset Password:") === PASS) { const s = await getDocs(query(gRef, where("gameType", "==", mode))); s.forEach(async d => await deleteDoc(d.ref)); } };

onSnapshot(query(gRef, orderBy("time")), snap => { all = snap.docs.map(d => d.data()); render(); });
</script>
</body>
</html>
