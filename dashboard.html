<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Command Center Pro</title>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #0d0d1a 0%, #101026 40%, #05050d 100%);
    --glass: rgba(255, 255, 255, 0.05);
    --panel-border: rgba(123, 44, 191, 0.3);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    
    /* Panel Colors (from reference) */
    --p-silver: #a9a9a9; --p-gold: #b8860b; --p-bronze: #8b4513;
    --p-dark-blue: #001a4d; --p-light-blue: #003cb3;
  }
  
  body { 
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); 
    background-attachment: fixed; color: var(--text); min-height: 100vh;
  }
  .wrap { max-width: 1000px; margin: auto; padding: 20px; box-sizing: border-box; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .logo { font-weight:900; font-size:20px; background:linear-gradient(to right, #ff6b6b, #ffd36d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

  /* GAME TABS */
  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
  .g-tab { 
    padding: 18px; border-radius: 12px; text-align: center; font-weight: 900; 
    cursor: pointer; text-transform: uppercase; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.05); 
    font-size: 13px; background: rgba(255, 255, 255, 0.05); color: var(--muted);
  }
  .g-tab.active { 
    background: linear-gradient(135deg, var(--violet), var(--blue));
    color: white; border-color: rgba(255,255,255,0.4);
    box-shadow: 0 10px 20px rgba(123, 44, 191, 0.3);
  }

  /* LINEUP PANEL */
  .panel { 
    background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 25px; 
    border: 1px solid var(--panel-border); backdrop-filter: blur(20px);
  }
  select { 
    background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; 
    width: 100%; border-radius: 12px; font-weight: 600; font-size: 13px; outline: none;
  }

  /* ENHANCED PODIUM (TWO-TONE PANELS) */
  .podium { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; margin-bottom:30px; }
  @media (max-width: 768px) { .podium { grid-template-columns: 1fr; gap: 10px; } }
  .pod-box { display: flex; flex-direction: column; border-radius: 6px; overflow: hidden; border: 1px solid #30363d; }
  .pod-header { padding: 10px; text-align: center; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
  .pod-body { display: flex; height: 100px; }
  .p-name-panel { background: var(--p-dark-blue); flex: 1.5; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; text-transform: uppercase; color: #fff; padding: 10px; text-align: center; }
  .p-pts-panel { background: var(--p-light-blue); flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 32px; color: #ffd36d; }

  /* KPI TILES (BIGGER FONT & KPIS) */
  .section-header { font-weight: 900; font-size: 16px; color: var(--blue); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  @media (max-width: 600px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
  .k-tile { 
    background: rgba(22, 27, 34, 0.5); padding: 25px 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05);
    display: flex; flex-direction: column; justify-content: center; min-height: 110px; text-align: center;
  }
  .k-tile small { font-size: 9px; font-weight: 800; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .k-tile .val { font-size: 16px; font-weight: 900; color: var(--accent); text-transform: uppercase; }
  .k-tile .sub { font-size: 9px; color: var(--blue); margin-top: 8px; font-weight: 700; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; align-self: center; }

  /* LEADERBOARD */
  .rank-row { 
    background: rgba(22, 27, 34, 0.5); margin-bottom: 10px; padding: 20px; 
    border-radius: 16px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.03);
  }
  .num { width: 30px; font-weight: 900; color: var(--cyan); font-size: 22px; }
  .p-info { flex: 1; }
  .p-name { font-weight: 800; font-size: 16px; margin-bottom: 6px; }
  .p-chart-container { width: 100%; height: 5px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 10px; }
  .p-chart-fill { height: 100%; background: linear-gradient(to right, var(--cyan), var(--violet)); border-radius: 10px; }
  .score-box { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 10px 18px; border-radius: 10px; font-weight: 900; font-size: 18px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">COMMAND CENTER Pro</div>
    <a href="index.html" style="color:var(--muted); text-decoration:none; font-size:11px; font-weight:800;">🏠 HOME</a>
  </header>

  <div class="game-tabs">
    <div class="g-tab active" onclick="setMode('UNO', this)">Uno Cards</div>
    <div class="g-tab" onclick="setMode('Bluff', this)">Bluff Game</div>
    <div class="g-tab" onclick="setMode('28', this)">28 Card</div>
  </div>

  <div class="panel">
    <small style="color:var(--muted); font-size:10px; font-weight:800; display:block; margin-bottom:10px; text-transform:uppercase;">Lineup Identification</small>
    <select id="lineupFilter" onchange="renderAll()"></select>
    <div id="lineupDesc" style="font-size: 11px; color: var(--cyan); margin-top: 10px; font-style: italic;"></div>
  </div>

  <div class="podium" id="podium"></div>

  <div class="glass">
    <div class="section-header">Advanced Tournament Intelligence</div>
    <div class="kpi-grid" id="kpi-container"></div>
  </div>

  <div style="font-weight: 900; font-size: 18px; color: #fff; margin: 30px 0 20px 0; text-transform: uppercase;">Live Ranking Feed</div>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderAll();
};

window.renderAll = () => {
    if (!allData || allData.length === 0) return;
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    let lineups = {};
    rawGames.forEach(g => {
        const pNames = g.players ? g.players.map(p => p.name).sort() : [];
        if (pNames.length > 0) {
            const key = pNames.join(', ');
            if(!lineups[key]) lineups[key] = { count: pNames.length, names: key };
        }
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Combined History (All Groups)</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1} (${lineups[k].count}P) [${lineups[k].names}]</option>`).join('');

    const activeKey = lSelect.value || "ALL";
    const filtered = activeKey === "ALL" ? rawGames : rawGames.filter(g => (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey);
    document.getElementById('lineupDesc').innerText = activeKey === "ALL" ? "Aggregate data across all sessions." : "Filtered lineup active.";

    const stats = {};
    filtered.forEach(g => {
        (g.players || []).forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0, r2:0, r3:0, rl:0, history: []};
            stats[p.name].pts += (p.pts || 0); stats[p.name].t++;
            if(p.rank === 1) stats[p.name].r1++;
            else if(p.rank === 2) stats[p.name].r2++;
            else if(p.rank === 3) stats[p.name].r3++;
            else if(p.rank === 0) stats[p.name].rl++;
            stats[p.name].history.push(p.rank);
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);

    // PODIUM (Split-Panel Reference Design)
    const pod = document.getElementById('podium');
    if(sorted.length >= 3) {
        pod.innerHTML = `
            <div class="pod-box">
                <div class="pod-header" style="background:var(--p-silver);">Second</div>
                <div class="pod-body"><div class="p-name-panel">${sorted[1]}</div><div class="p-pts-panel">${stats[sorted[1]].pts}</div></div>
            </div>
            <div class="pod-box">
                <div class="pod-header" style="background:var(--p-gold);">First</div>
                <div class="pod-body"><div class="p-name-panel">${sorted[0]}</div><div class="p-pts-panel">${stats[sorted[0]].pts}</div></div>
            </div>
            <div class="pod-box">
                <div class="pod-header" style="background:var(--p-bronze);">Third</div>
                <div class="pod-body"><div class="p-name-panel">${sorted[2]}</div><div class="p-pts-panel">${stats[sorted[2]].pts}</div></div>
            </div>`;
    }

    // KPIs (BIGGER FONT LOGIC)
    let hatTrickHero = '—';
    for(let n in stats) {
        let streak = 0, max = 0;
        stats[n].history.forEach(r => { if(r === 1) streak++; else streak = 0; if(streak > max) max = streak; });
        if(max >= 3) { hatTrickHero = n; break; }
    }
    const pred = sorted.length >= 2 ? `${sorted[1]} +${(stats[sorted[0]].pts - stats[sorted[1]].pts) + 1} Pts` : '—';
    const king = sorted[0] || '—';
    const finisher = Object.keys(stats).sort((a,b) => stats[b].r1 - stats[a].r1)[0] || '—';
    const last = Object.keys(stats).sort((a,b) => stats[b].rl - stats[a].rl)[0] || '—';
    const cb = Object.keys(stats).sort((a,b) => (stats[b].r1/stats[b].t) - (stats[a].r1/stats[a].t))[0] || '—';

    document.getElementById('kpi-container').innerHTML = `
        <div class="k-tile"><small>Total Rounds</small><div class="val">${filtered.length}</div></div>
        <div class="k-tile"><small>Points King/Queen</small><div class="val">${king}</div></div>
        <div class="k-tile"><small>Last Place King/Queen</small><div class="val" style="color:#ffb3b3">${last}</div></div>
        <div class="k-tile"><small>Highest Finisher</small><div class="val">${finisher}</div></div>
        <div class="k-tile"><small>Comeback K/Q</small><div class="val">${cb}</div></div>
        <div class="k-tile"><small>Hat-Trick Hero</small><div class="val">${hatTrickHero}</div></div>
        <div class="k-tile"><small>Prediction</small><div class="val" style="font-size:11px;">${pred}</div><span class="sub">Next Champion?</span></div>
        <div class="k-tile"><small>Peak Win Rate</small><div class="val">${sorted.length ? ((stats[king].r1 / stats[king].t)*100).toFixed(0)+'%' : '0%'}</div></div>
        <div class="k-tile"><small>Lineups Identified</small><div class="val">${Object.keys(lineups).length}</div></div>
    `;

    // Leaderboard
    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        return `
        <div class="rank-row"><div class="num">${i+1}</div>
        <div class="p-info"><div class="p-name">${n}</div><div class="p-chart-container"><div class="p-chart-fill" style="width:${((d.r1/d.t)*100).toFixed(0)}%"></div></div></div>
        <div class="score-box">${d.pts}</div></div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => { allData = snap.docs.map(d => d.data()); renderAll(); });
</script>
</body>
</html>
