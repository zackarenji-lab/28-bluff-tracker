<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Command Center Pro</title>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #1a1a2e 0%, #16213e 30%, #0f3460 70%, #050b18 100%);
    --tile-gradient: linear-gradient(135deg, rgba(30,30,47,0.8), rgba(17,17,29,0.9));
    --panel: rgba(13, 17, 23, 0.7);
    --accent: #ffd36d; --violet: #7b2cbf; --blue: #3a86ff;
    --text: #e6edf3; --muted: #8b949e;
  }
  body { 
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); 
    background-attachment: fixed; color: var(--text); min-height: 100vh;
  }
  .wrap { max-width: 1000px; margin: auto; padding: 20px; }
  
  /* GAME TABS */
  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 25px; }
  .g-tab { 
    padding: 18px; border-radius: 8px; text-align: center; font-weight: 900; 
    cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; border: 1px solid rgba(255,255,255,0.1); 
    font-size: 14px; transition: 0.3s;
  }
  .t-uno { background: linear-gradient(to bottom, #6a040f, #370617); color: #ff85a1; }
  .t-bluff { background: linear-gradient(to bottom, #03045e, #023e8a); color: #90e0ef; }
  .t-28 { background: linear-gradient(to bottom, #1b4332, #081c15); color: #95d5b2; }
  .g-tab.active { box-shadow: 0 0 20px rgba(123, 44, 191, 0.4); border: 1px solid white; transform: translateY(-2px); }

  .panel { 
    background: var(--panel); border-radius: 16px; padding: 20px; margin-bottom: 25px; 
    border: 1px solid rgba(123, 44, 191, 0.2); backdrop-filter: blur(15px);
  }
  select { 
    background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; 
    width: 100%; border-radius: 10px; font-weight: 600; font-size: 13px; outline: none;
  }

  .mid-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 25px; }
  @media (max-width: 768px) { .mid-grid { grid-template-columns: 1fr; } }

  /* PODIUM / KPI */
  .hof-card { 
    background: linear-gradient(160deg, #161b22 0%, #2d004d 100%); 
    border-radius: 20px; padding: 25px; border: 1px solid rgba(123, 44, 191, 0.4); 
    text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  }
  .hof-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #ffffff10; font-size: 13px; }
  .hof-item b { color: var(--accent); }

  .kpi-title { color: var(--blue); font-weight: 900; font-size: 14px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .k-tile { 
    background: var(--tile-gradient); padding: 15px; border-radius: 14px; 
    border: 1px solid rgba(58, 134, 255, 0.15); display: flex; flex-direction: column; justify-content: center; min-height: 80px;
  }
  .k-tile small { font-size: 7px; font-weight: 800; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }
  .k-tile .val { font-size: 13px; font-weight: 900; color: var(--accent); text-transform: uppercase; }
  .k-tile .sub { font-size: 8px; color: var(--blue); margin-top: 5px; font-weight: 700; }

  /* PLAYER RANKING SECTION */
  .section-header { font-weight: 900; font-size: 18px; color: var(--text); margin: 40px 0 15px 0; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .section-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, rgba(123, 44, 191, 0.5), transparent); }

  .rank-row { 
    background: rgba(22, 27, 34, 0.5); margin-bottom: 12px; padding: 20px; 
    border-radius: 12px; display: flex; align-items: center; gap: 20px;
    border: 1px solid rgba(255,255,255,0.03); position: relative; overflow: hidden;
  }
  .num { width: 30px; font-weight: 900; color: var(--blue); font-size: 20px; text-shadow: 0 0 10px rgba(58, 134, 255, 0.3); }
  .p-info { flex: 1; z-index: 2; }
  .p-name { font-weight: 800; font-size: 16px; color: #fff; margin-bottom: 6px; }
  
  /* THE CHART BAR */
  .p-chart-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin-top: 10px; overflow: hidden; }
  .p-chart-fill { height: 100%; background: linear-gradient(to right, var(--violet), var(--blue)); border-radius: 3px; transition: width 1s ease-in-out; }

  .p-stats { display: flex; gap: 12px; font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
  .score-box { 
    background: linear-gradient(to bottom, #da3633, #8a1d1b); 
    color: white; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 18px; z-index: 2;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="game-tabs">
    <div class="g-tab t-uno active" onclick="setMode('UNO', this)">Uno Cards</div>
    <div class="g-tab t-bluff" onclick="setMode('Bluff', this)">Bluff</div>
    <div class="g-tab t-28" onclick="setMode('28', this)">28 Card</div>
  </div>

  <div class="panel">
    <small>Lineup Identification</small>
    <select id="lineupFilter" onchange="renderAll()"></select>
    <p id="lineupDesc" style="font-size: 11px; color: var(--blue); margin: 12px 0 0 0; font-style: italic;"></p>
  </div>

  <div class="mid-grid">
    <div class="hof-card">
      <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" style="width:60px; margin-bottom:15px; filter: drop-shadow(0 0 10px rgba(255,211,109,0.3));">
      <h4 id="hof-title">UNO Top Elite</h4>
      <div class="hof-list" id="podium-list" style="margin: 15px 0;"></div>
      <p style="color:var(--accent); font-weight:900; font-size:12px; letter-spacing:2px; margin-top: 20px;">CONGRATULATIONS !</p>
    </div>

    <div>
      <div class="kpi-title">Pro Series Analytics</div>
      <div class="kpi-grid" id="kpi-container"></div>
    </div>
  </div>

  <div class="section-header">Player Ranking</div>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('hof-title').innerText = m + " Top Elite";
    renderAll();
};

window.renderAll = () => {
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    let lineups = {};
    rawGames.forEach(g => {
        const pNames = g.players ? g.players.map(p => p.name).sort() : [];
        const key = pNames.join(', ');
        if(!lineups[key]) lineups[key] = { count: pNames.length, names: key };
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Global History (All Groups)</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1} (${lineups[k].count}P) [${lineups[k].names}]</option>`).join('');

    const activeKey = lSelect.value;
    const filtered = activeKey === 'ALL' ? rawGames : rawGames.filter(g => (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey);
    document.getElementById('lineupDesc').innerText = activeKey === 'ALL' ? "Showing all-time aggregate data." : "Currently viewing filtered lineup performance.";

    const stats = {};
    filtered.forEach(g => {
        (g.players || []).forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0, r2:0, r3:0, rl:0, history: []};
            stats[p.name].pts += (p.pts || 0); stats[p.name].t++;
            if(p.rank === 1) stats[p.name].r1++;
            else if(p.rank === 2) stats[p.name].r2++;
            else if(p.rank === 3) stats[p.name].r3++;
            else if(p.rank === 0) stats[p.name].rl++;
            stats[p.name].history.push(p.rank);
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);

    // PODIUM
    document.getElementById('podium-list').innerHTML = sorted.slice(0,3).map((n, i) => `
        <div class="hof-item">
            <span style="color:var(--muted)">RANK #${i+1}</span>
            <b>${n}</b>
            <span>${stats[n].pts}</span>
        </div>`).join('');

    // KPI TILES
    let hatTrickHero = '—';
    for(let n in stats) {
        let streak = 0, max = 0;
        stats[n].history.forEach(r => { if(r === 1) streak++; else streak = 0; if(streak > max) max = streak; });
        if(max >= 3) { hatTrickHero = n; break; }
    }

    let predictionVal = '—';
    if(sorted.length >= 2) {
        const diff = stats[sorted[0]].pts - stats[sorted[1]].pts;
        predictionVal = `${sorted[1]} needs ${diff + 1} Pts`;
    }

    const king = sorted[0] || '—';
    const finisher = Object.keys(stats).sort((a,b) => stats[b].r1 - stats[a].r1)[0] || '—';
    const last = Object.keys(stats).sort((a,b) => stats[b].rl - stats[a].rl)[0] || '—';
    const comeback = Object.keys(stats).sort((a,b) => (stats[b].r1/stats[b].t) - (stats[a].r1/stats[a].t))[0] || '—';
    const consistent = Object.keys(stats).sort((a,b) => (stats[b].r2 + stats[b].r3) - (stats[a].r2 + stats[a].r3))[0] || '—';
    const winRate = sorted.length ? ((stats[king].r1 / stats[king].t) * 100).toFixed(0) + "%" : "0%";

    document.getElementById('kpi-container').innerHTML = `
        <div class="k-tile"><small>Total Rounds</small><div class="val">${filtered.length}</div></div>
        <div class="k-tile"><small>Points King/Queen</small><div class="val">${king}</div></div>
        <div class="k-tile"><small>Last King/Queen</small><div class="val" style="color:var(--danger)">${last}</div></div>
        <div class="k-tile"><small>Highest Finisher</small><div class="val">${finisher}</div></div>
        <div class="k-tile"><small>Comeback King/Queen</small><div class="val">${comeback}</div></div>
        <div class="k-tile"><small>Consistent Performer</small><div class="val">${consistent}</div></div>
        <div class="k-tile"><small>Hat-Trick Hero</small><div class="val">${hatTrickHero}</div><span class="sub">3 Streak Wins</span></div>
        <div class="k-tile"><small>Next Champ Prediction</small><div class="val" style="font-size:9px;">${predictionVal}</div><span class="sub">All the Best!</span></div>
        <div class="k-tile"><small>Peak Win Rate</small><div class="val">${winRate}</div></div>
    `;

    // RANKING LIST WITH GRADIENT BARS
    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        const winPercent = ((d.r1 / d.t) * 100).toFixed(0);
        return `
        <div class="rank-row">
            <div class="num">${i+1}</div>
            <div class="p-info">
                <div class="p-name">${n}</div>
                <div class="p-stats">
                    <span>1st: <b>${d.r1}</b></span>
                    <span>Last: <b>${d.rl}</b></span>
                    <span>Total: <b>${d.t}</b></span>
                </div>
                <div class="p-chart-container">
                    <div class="p-chart-fill" style="width: ${winPercent}%"></div>
                </div>
            </div>
            <div class="score-box">${d.pts}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => {
    allData = snap.docs.map(d => d.data());
    renderAll();
});
</script>
</body>
</html>
