<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Elite Command Center</title>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #0d0d1a 0%, #101026 40%, #05050d 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --neon-green: #3fff3f; --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    --tile-grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
  }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .wrap { max-width: 1100px; margin: auto; padding: 20px; }
  
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .home-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 11px; border: 1px solid rgba(255,211,109,0.3); padding: 10px 20px; border-radius: 30px; background: rgba(255,211,109,0.05); text-transform: uppercase; }

  /* GAME TABS */
  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
  .g-tab { padding: 16px; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.05); font-size: 13px; background: rgba(255, 255, 255, 0.05); color: var(--muted); transition: 0.3s; }
  .g-tab.active { background: var(--tile-grad); color: white; border-color: rgba(255,255,255,0.4); box-shadow: 0 10px 20px rgba(61, 61, 255, 0.3); transform: translateY(-4px); }

  .panel { background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; outline: none; }

  .mid-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 30px; }
  @media (max-width: 900px) { .mid-grid { grid-template-columns: 1fr; } }

  /* HOF CARD */
  .hof-card { background: linear-gradient(160deg, #111122 0%, #1a1a3a 100%); border-radius: 24px; padding: 30px; border: 1px solid rgba(123, 44, 191, 0.3); text-align: center; }
  .hof-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .rank-lbl { font-weight: 900; font-size: 20px; color: var(--muted); font-style: italic; }
  .p-name-cap { text-transform: uppercase; font-size: 20px; font-weight: 900; color: #fff; flex: 1; text-align: left; margin-left: 20px; }
  .p-pts-big { color: var(--accent); font-weight: 900; font-size: 28px; }

  /* KPI TILES */
  .section-header { font-weight: 900; font-size: 18px; color: #fff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
  .section-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--blue), transparent); }
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  .k-tile { padding: 25px 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; min-height: 130px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
  .k-tile small { font-size: 11px; font-weight: 900; color: #fff; margin-bottom: 12px; text-transform: uppercase; }
  .k-tile .val { font-size: 22px; font-weight: 900; color: #fff; }

  .k-tile:nth-child(1) { background: linear-gradient(135deg, #3d3dff, #a020f0); }
  .k-tile:nth-child(2) { background: linear-gradient(135deg, #00b4d8, #0077b6); }
  .k-tile:nth-child(3) { background: linear-gradient(135deg, #7b2cbf, #5a189a); }
  .k-tile:nth-child(4) { background: linear-gradient(135deg, #ef476f, #d00000); }
  .k-tile:nth-child(5) { background: linear-gradient(135deg, #06d6a0, #00afb9); }
  .k-tile:nth-child(6) { background: linear-gradient(135deg, #ff9f1c, #f3722c); }
  .k-tile:nth-child(7) { background: linear-gradient(135deg, #5e60ce, #480ca8); }
  .k-tile:nth-child(8) { background: linear-gradient(135deg, #212529, #343a40); }
  .k-tile:nth-child(9) { background: linear-gradient(135deg, #4361ee, #3a0ca3); }

  /* NEW PLAYER RANKING ROW DESIGN */
  .rank-row { background: rgba(255, 255, 255, 0.03); margin-bottom: 15px; padding: 20px; border-radius: 20px; display: grid; grid-template-columns: 50px 100px 1fr 280px 100px; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
  @media (max-width: 950px) { .rank-row { grid-template-columns: 1fr; } }

  .num { font-weight: 900; color: var(--cyan); font-size: 24px; }
  .p-name { font-weight: 800; font-size: 18px; color: #fff; text-transform: uppercase; }

  /* THE NEW LARGE WIN-RATE BAR */
  .p-chart-container { 
    height: 34px; background: rgba(255, 255, 255, 0.1); border-radius: 17px; 
    position: relative; overflow: hidden; display: flex; align-items: center; padding-right: 4px;
  }
  .p-chart-fill { 
    height: 100%; background: linear-gradient(to right, #bc13fe, #3a86ff); 
    border-radius: 17px; transition: width 1s ease;
  }
  .perc-bubble { 
    position: absolute; right: 4px; background: #00f5ff; color: #000; 
    font-weight: 900; font-size: 14px; padding: 4px 10px; border-radius: 12px; 
    box-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
  }

  .data-table-block { display: flex; gap: 15px; justify-content: center; }
  .data-col { text-align: center; min-width: 35px; }
  .data-col label { display: block; font-size: 9px; font-weight: 900; color: var(--neon-green); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
  .data-col span { font-size: 15px; font-weight: 900; color: #fff; }

  .score-box { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 12px 20px; border-radius: 12px; font-weight: 900; font-size: 22px; text-align: center; }
</style>
</head>
<body>

<div class="wrap">
  <header><a href="index.html" class="home-link">🏠 HOME</a></header>

  <div class="game-tabs">
    <div class="g-tab active" id="tab-UNO" onclick="setMode('UNO', this)">Uno Cards</div>
    <div class="g-tab" id="tab-Bluff" onclick="setMode('Bluff', this)">Bluff Game</div>
    <div class="g-tab" id="tab-28" onclick="setMode('28', this)">28 Card</div>
  </div>

  <div class="panel">
    <select id="lineupFilter" onchange="renderAll()"></select>
  </div>

  <div class="mid-grid">
    <div class="hof-card">
      <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" style="width:55px; margin-bottom:15px;">
      <h4 id="hof-title" style="margin:0; font-size:16px; color: var(--accent);">UNO ELITE HALL</h4>
      <div id="podium-list" style="margin: 15px 0;"></div>
      <p style="color:var(--accent); font-weight:900; font-size:12px; letter-spacing:4px; margin-top: 20px;">VICTORY AWAITS</p>
    </div>

    <div>
      <div class="section-header">Tournament Intelligence</div>
      <div class="kpi-grid" id="kpi-container"></div>
    </div>
  </div>

  <div class="section-header">Live Player Rankings</div>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('hof-title').innerText = m.toUpperCase() + " ELITE HALL";
    renderAll();
};

window.renderAll = () => {
    if(!allData || allData.length === 0) return;
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    let lineups = {};
    rawGames.forEach(g => {
        const pNames = g.players ? g.players.map(p => p.name).sort() : [];
        const key = pNames.join(', ');
        if(key) lineups[key] = { count: pNames.length, names: key };
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Combined History (All Groups)</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1} (${lineups[k].count}P) [${lineups[k].names}]</option>`).join('');

    const activeKey = lSelect.value || "ALL";
    const filtered = activeKey === 'ALL' ? rawGames : rawGames.filter(g => (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey);

    const stats = {};
    filtered.forEach(g => {
        (g.players || []).forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0, r2:0, r3:0, rl:0, history: []};
            stats[p.name].pts += (p.pts || 0); stats[p.name].t++;
            if(p.rank === 1) stats[p.name].r1++;
            else if(p.rank === 2) stats[p.name].r2++;
            else if(p.rank === 3) stats[p.name].r3++;
            else if(p.rank === 0) stats[p.name].rl++;
            stats[p.name].history.push(p.rank);
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);

    document.getElementById('podium-list').innerHTML = sorted.length ? sorted.slice(0,3).map((n, i) => `
        <div class="hof-item"><span class="rank-lbl">#${i+1}</span><b class="p-name-cap">${n}</b><span class="p-pts-big">${stats[n].pts}</span></div>`).join('') : "<p>No data</p>";

    // KPI logic
    let htw = '—', htl = '—';
    for(let n in stats) {
        let sw = 0, mw = 0, sl = 0, ml = 0;
        stats[n].history.forEach(r => {
            if(r===1) {sw++; sl=0;} else if(r===0) {sl++; sw=0;} else {sw=0; sl=0;}
            if(sw > mw) mw = sw; if(sl > ml) ml = sl;
        });
        if(mw >= 3) htw = n; if(ml >= 3) htl = n;
    }

    const mk = (lbl, val) => `<div class="k-tile"><small>${lbl}</small><div class="val">${val}</div></div>`;
    const king = sorted[0] || '—';
    document.getElementById('kpi-container').innerHTML = 
        mk('Total Rounds', filtered.length) +
        mk('Points King', king) +
        mk('Last King', Object.keys(stats).sort((a,b)=>stats[b].rl-stats[a].rl)[0] || '—') +
        mk('Most Wins', Object.keys(stats).sort((a,b)=>stats[b].r1-stats[a].r1)[0] || '—') +
        mk('Efficiency', Object.keys(stats).sort((a,b)=>(stats[b].r1/stats[b].t)-(stats[a].r1/stats[a].t))[0] || '—') +
        mk('Consistent', Object.keys(stats).sort((a,b)=>(stats[b].r2+stats[b].r3)-(stats[a].r2+stats[a].r3))[0] || '—') +
        mk('Hat-Trick', htw) +
        mk('The Spoon', htl) +
        mk('Win Rate', sorted.length ? ((stats[king].r1/stats[king].t)*100).toFixed(0)+'%' : '0%');

    // LEADERBOARD WITH NEW LARGE BARS
    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        const diff = i === 0 ? 0 : stats[sorted[i-1]].pts - d.pts;
        const wr = ((d.r1/d.t)*100).toFixed(0);
        return `
        <div class="rank-row">
            <div class="num">#${i+1}</div>
            <div class="p-name">${n}</div>
            <div class="p-chart-container">
                <div class="p-chart-fill" style="width: ${wr}%"></div>
                <div class="perc-bubble">${wr}%</div>
            </div>
            <div class="data-table-block">
                <div class="data-col"><label>Diff</label><span>${diff.toString().padStart(2, '0')}</span></div>
                <div class="data-col"><label>1st</label><span>${d.r1.toString().padStart(2, '0')}</span></div>
                <div class="data-col"><label>2nd</label><span>${d.r2.toString().padStart(2, '0')}</span></div>
                <div class="data-col"><label>3rd</label><span>${d.r3.toString().padStart(2, '0')}</span></div>
                <div class="data-col"><label>Lost</label><span>${d.rl.toString().padStart(2, '0')}</span></div>
            </div>
            <div class="score-box">${d.pts}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => { allData = snap.docs.map(d => d.data()); renderAll(); });
</script>
</body>
</html>
