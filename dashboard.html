<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Command Center Premium</title>
<style>
  :root {
    --bg:#0b0e14; --panel:#161b22; --card:#21262d;
    --uno:#4a152c; --bluff:#2c3e8c; --card28:#2d6a4f;
    --accent:#ffd36d; --text:#e6edf3; --muted:#8b949e;
  }
  body { margin:0; font-family:'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); }
  .wrap { max-width:1000px; margin:auto; padding:15px; }
  
  /* TOP NAV TABS */
  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .g-tab { padding: 15px; border-radius: 4px; text-align: center; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; border: none; font-size: 14px; }
  .t-uno { background: var(--uno); color: #ff4d6d; }
  .t-bluff { background: var(--bluff); color: #70d6ff; }
  .t-28 { background: var(--card28); color: #99ffaa; }
  .g-tab.active { outline: 2px solid white; outline-offset: -4px; }

  /* SELECTOR PANEL */
  .panel { background: var(--panel); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #30363d; }
  .panel small { color: var(--muted); font-size: 10px; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 8px; }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 12px; width: 100%; border-radius: 8px; font-weight: 600; }

  /* MIDDLE SECTION: LEADERBOARD + KPI */
  .mid-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 768px) { .mid-grid { grid-template-columns: 1fr; } }

  /* LEFT: PODIUM CARD */
  .hof-card { background: linear-gradient(135deg, #1f132e 0%, #0d1117 100%); border-radius: 16px; padding: 20px; border: 1px solid #3e2e5e; position: relative; text-align: center; }
  .hof-card h4 { color: var(--accent); margin: 0; font-size: 14px; }
  .hof-list { margin-top: 20px; text-align: left; }
  .hof-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #ffffff10; font-size: 13px; }
  .hof-item span { font-weight: 900; }
  .trophy { width: 60px; margin-bottom: 10px; }

  /* RIGHT: KPI TILES */
  .kpi-title { color: #58a6ff; font-weight: 900; font-size: 14px; margin-bottom: 15px; text-transform: uppercase; }
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (max-width: 500px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
  .k-tile { background: var(--panel); padding: 15px; border-radius: 10px; border: 1px solid #30363d; }
  .k-tile small { font-size: 8px; font-weight: 800; color: var(--muted); display: block; margin-bottom: 10px; text-transform: uppercase; }
  .k-tile .val { font-size: 18px; font-weight: 900; color: var(--accent); }
  .k-tile .sub { font-size: 8px; color: #238636; margin-top: 5px; display: block; }

  /* BOTTOM: DETAILED TABLE */
  .rank-row { background: var(--panel); margin-bottom: 8px; padding: 15px; border-radius: 8px; display: flex; align-items: center; border: 1px solid #30363d; transition: 0.2s; }
  .rank-row:hover { border-color: #58a6ff; }
  .num { width: 30px; font-weight: 900; color: var(--muted); }
  .p-info { flex: 1; display: flex; align-items: center; gap: 15px; }
  .p-name { font-weight: 700; font-size: 14px; }
  .p-stats { display: flex; gap: 15px; font-size: 11px; color: var(--muted); }
  .p-stats b { color: var(--text); }
  .score-box { background: #da3633; color: white; padding: 5px 12px; border-radius: 6px; font-weight: 900; font-size: 14px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="game-tabs">
    <button class="g-tab t-uno active" onclick="setMode('UNO', this)">Uno Cards</button>
    <button class="g-tab t-bluff" onclick="setMode('Bluff', this)">Bluff</button>
    <button class="g-tab t-28" onclick="setMode('28', this)">28 Card</button>
  </div>

  <div class="panel">
    <small>Select Lineup</small>
    <select id="lineupFilter" onchange="renderAll()"></select>
    <p id="lineupDesc" style="font-size: 11px; color: #58a6ff; margin: 10px 0 0 0;"></p>
  </div>

  <div class="mid-grid">
    <div class="hof-card">
      <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" class="trophy" alt="trophy">
      <h4 id="hof-title">UNO Leaderboard</h4>
      <p style="font-size:10px; color:var(--muted)">Best players of the game</p>
      <div class="hof-list" id="podium-list"></div>
      <p style="color:var(--accent); font-weight:900; font-size:12px; margin-top:15px;">CONGRATULATIONS !</p>
    </div>

    <div>
      <div class="kpi-title">Key Statistics</div>
      <div class="kpi-grid" id="kpi-container"></div>
    </div>
  </div>

  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('hof-title').innerText = m + " Leaderboard";
    renderAll();
};

window.renderAll = () => {
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    let lineups = {};
    rawGames.forEach(g => {
        const pNames = g.players ? g.players.map(p => p.name).sort() : [];
        const key = pNames.join(', ');
        if(!lineups[key]) lineups[key] = { count: pNames.length, names: key };
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Combined Stats</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1} (${lineups[k].count}P) [${lineups[k].names}]</option>`).join('');

    const activeKey = lSelect.value;
    const filtered = activeKey === 'ALL' ? rawGames : rawGames.filter(g => (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey);
    document.getElementById('lineupDesc').innerText = activeKey === 'ALL' ? "Aggregate of all matches." : "Current Lineup active.";

    const stats = {};
    filtered.forEach(g => {
        (g.players || []).forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0, r2:0, r3:0, rl:0};
            stats[p.name].pts += (p.pts || 0); stats[p.name].t++;
            if(p.rank === 1) stats[p.name].r1++;
            else if(p.rank === 2) stats[p.name].r2++;
            else if(p.rank === 3) stats[p.name].r3++;
            else if(p.rank === 0) stats[p.name].rl++;
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);

    // PODIUM LIST (LEFT CARD)
    document.getElementById('podium-list').innerHTML = sorted.slice(0,3).map((n, i) => `
        <div class="hof-item">
            <span style="color:var(--muted)">#${i+1} ${n}</span>
            <span>${stats[n].pts} pts</span>
        </div>`).join('');

    // KPI TILES
    const king = sorted[0] || '—';
    const finisher = Object.keys(stats).sort((a,b) => stats[b].r1 - stats[a].r1)[0] || '—';
    const last = Object.keys(stats).sort((a,b) => stats[b].rl - stats[a].rl)[0] || '—';
    const cb = Object.keys(stats).sort((a,b) => (stats[b].r1/stats[b].t) - (stats[a].r1/stats[a].t))[0] || '—';

    document.getElementById('kpi-container').innerHTML = `
        <div class="k-tile"><small>Total Rounds</small><div class="val">${filtered.length}</div><span class="sub">Active</span></div>
        <div class="k-tile"><small>Points King/Queen</small><div class="val">${king}</div><span class="sub">Active</span></div>
        <div class="k-tile"><small>Last Place King/Queen</small><div class="val">${last}</div><span class="sub" style="color:var(--danger)">At Risk</span></div>
        <div class="k-tile"><small>Highest Finisher</small><div class="val">${finisher}</div><span class="sub">Active</span></div>
        <div class="k-tile"><small>Comeback King/Queen</small><div class="val">${cb}</div><span class="sub">Active</span></div>
        <div class="k-tile"><small>Active Lineups</small><div class="val">${Object.keys(lineups).length}</div><span class="sub">Active</span></div>
    `;

    // DETAILED LIST
    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        return `
        <div class="rank-row">
            <div class="num">${i+1}</div>
            <div class="p-info">
                <div class="p-name">${n}</div>
                <div class="p-stats">
                    <span>Wins: <b>${d.r1}</b></span>
                    <span>Last: <b>${d.rl}</b></span>
                    <span>Played: <b>${d.t}</b></span>
                </div>
            </div>
            <div class="score-box">${d.pts}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => {
    allData = snap.docs.map(d => d.data());
    renderAll();
});
</script>
</body>
</html>
