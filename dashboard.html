<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Analytics Command Center</title>
<style>
  :root {
    --bg:#050b18; --card:rgba(255,255,255,0.03); --glass:rgba(255,255,255,0.05);
    --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info:#3498db; --muted:#9fb7bf;
  }
  body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:#fff; overflow-x:hidden; }
  .wrap { max-width:900px; margin:auto; padding:20px; }
  
  /* HEADER */
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px; }
  .logo { font-weight:900; font-size:22px; background:linear-gradient(to right, #ff6b6b, #ffd36d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  
  /* GLASS CARDS */
  .glass { background:var(--glass); backdrop-filter:blur(20px); border-radius:24px; border:1px solid rgba(255,255,255,0.08); padding:25px; margin-bottom:20px; }
  
  /* PODIUM SECTION */
  .podium { display:grid; grid-template-columns: 1fr 1.2fr 1fr; gap:12px; align-items:flex-end; margin-bottom:30px; text-align:center; }
  .podium-item { background:rgba(255,255,255,0.02); border-radius:15px; padding:20px 10px; border:1px solid rgba(255,255,255,0.05); position:relative; }
  .podium-item.first { border-color:var(--gold); box-shadow:0 0 30px rgba(255,211,109,0.15); padding-top:40px; }
  .p-rank { font-size:10px; color:var(--muted); font-weight:800; letter-spacing:1px; }
  .p-name { font-size:16px; font-weight:900; display:block; margin:8px 0; color:#fff; }
  .p-pts { font-size:12px; color:var(--gold); font-weight:700; }

  /* TABS & FILTERS */
  .control-row { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:10px 20px; border-radius:30px; background:rgba(255,255,255,0.05); font-size:12px; font-weight:800; cursor:pointer; border:1px solid rgba(255,255,255,0.1); transition: 0.3s; }
  .tab.active { background:var(--accent); color:#050b18; border-color:var(--accent); }
  
  /* FIXED DROPDOWN VISIBILITY */
  select { 
    background:#162136 !important; /* Dark background */
    color:#ffffff !important;      /* White text */
    padding:12px; 
    border-radius:12px; 
    border:1px solid rgba(255,255,255,0.2); 
    font-weight:600; 
    cursor:pointer;
    min-width: 150px;
  }
  option { background:#162136; color:#ffffff; }

  /* LEADERBOARD LIST */
  .leader-row { display:flex; align-items:center; gap:15px; padding:15px; background:rgba(255,255,255,0.02); border-radius:16px; margin-bottom:10px; }
  .l-rank { font-weight:900; color:var(--muted); width:20px; }
  .l-name { flex:1; font-weight:700; }
  .l-pts { font-weight:900; color:var(--accent); font-size:15px; }
  .bar-bg { flex:1.5; height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--accent); transition: width 0.8s ease-out; }

  /* H2H SECTION */
  .h2h-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; }
  .h2h-display { margin-top:20px; background:rgba(0,0,0,0.3); border-radius:15px; padding:20px; text-align:center; }

  /* UTILS */
  .btn-danger { background:none; border:1px solid var(--danger); color:var(--danger); padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:700; font-size:11px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">COMMAND CENTER</div>
    <div style="font-size:10px; color:var(--muted);">REAL-TIME ANALYTICS</div>
  </header>

  <div class="control-row">
    <div class="tab active" data-m="UNO" onclick="setMode('UNO', this)">UNO</div>
    <div class="tab" data-m="Bluff" onclick="setMode('Bluff', this)">BLUFF</div>
    <div class="tab" data-m="28" onclick="setMode('28', this)">28 GAME</div>
  </div>

  <div class="glass" style="padding:15px; display:flex; align-items:center; gap:15px;">
    <span style="font-size:12px; font-weight:800; color:var(--muted)">LINEUP:</span>
    <select id="lineupFilter" onchange="renderAll()"></select>
  </div>

  <div class="podium" id="podium"></div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:14px; letter-spacing:1px; color:var(--accent)">LEADERBOARD</h3>
    <div id="leaderboard"></div>
  </div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:14px; letter-spacing:1px; color:var(--gold)">⚔️ RIVALRY MATRIX</h3>
    <div class="h2h-grid">
      <select id="rival1" onchange="runRivalry()"></select>
      <select id="rival2" onchange="runRivalry()"></select>
    </div>
    <div id="rival-display" class="h2h-display">Select two players to compare performance</div>
  </div>

  <div class="glass">
    <h3 style="margin-top:0; font-size:14px; color:var(--danger)">MATCH HISTORY</h3>
    <div id="historyLog"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderAll();
};

window.renderAll = () => {
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    // Update Lineup Dropdown
    const lineups = [...new Set(rawGames.map(g => g.lineupName))].filter(Boolean);
    const lSelect = document.getElementById('lineupFilter');
    const savedLineup = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Combined Stats</option>` + lineups.map(l => `<option value="${l}" ${l===savedLineup?'selected':''}>${l}</option>`).join('');

    const filteredGames = lSelect.value === 'ALL' ? rawGames : rawGames.filter(g => g.lineupName === lSelect.value);

    const stats = {};
    filteredGames.forEach(g => {
        const players = g.players || [{name: g.winner, pts:10, rank:1}, {name: g.last, pts:0, rank:0}];
        players.forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, w:0, l:0, t:0};
            stats[p.name].pts += (p.pts || 0);
            stats[p.name].t++;
            if(p.rank === 1) stats[p.name].w++;
            if(p.rank === 0) stats[p.name].l++;
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => is28 ? stats[b].w - stats[a].w : stats[b].pts - stats[a].pts);
    
    // RENDER PODIUM
    const pod = document.getElementById('podium');
    if(sorted.length >= 2) {
        pod.innerHTML = `
            <div class="podium-item">
                <div class="p-rank">🥈 SECOND</div>
                <span class="p-name">${sorted[1]}</span>
                <span class="p-pts">${is28 ? stats[sorted[1]].w+' Wins' : stats[sorted[1]].pts+' Pts'}</span>
            </div>
            <div class="podium-item first">
                <div class="p-rank">👑 CHAMPION</div>
                <span class="p-name">${sorted[0]}</span>
                <span class="p-pts">${is28 ? stats[sorted[0]].w+' Wins' : stats[sorted[0]].pts+' Pts'}</span>
            </div>
            <div class="podium-item">
                <div class="p-rank">🥉 THIRD</div>
                <span class="p-name">${sorted[2]||'—'}</span>
                <span class="p-pts">${sorted[2] ? (is28 ? stats[sorted[2]].w+' Wins' : stats[sorted[2]].pts+' Pts') : '0'}</span>
            </div>`;
    } else { pod.innerHTML = "<p style='grid-column:span 3; opacity:0.5'>Need at least 2 players for podium</p>"; }

    // RENDER LEADERBOARD
    const lb = document.getElementById('leaderboard');
    lb.innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        const winRate = (d.w / d.t) * 100;
        return `
            <div class="leader-row">
                <div class="l-rank">#${i+1}</div>
                <div class="l-name">${n}</div>
                <div class="bar-bg"><div class="bar-fill" style="width:${winRate}%"></div></div>
                <div class="l-pts">${is28 ? d.w : d.pts}</div>
            </div>`;
    }).join('');

    // UPDATE RIVALRY SELECTS
    const r1 = document.getElementById('rival1'); const r2 = document.getElementById('rival2');
    const v1 = r1.value; const v2 = r2.value;
    const optHtml = `<option value="">Select Player</option>` + sorted.map(n => `<option value="${n}">${n}</option>`).join('');
    r1.innerHTML = optHtml; r2.innerHTML = optHtml;
    r1.value = v1; r2.value = v2;

    // HISTORY
    document.getElementById('historyLog').innerHTML = filteredGames.slice(-5).reverse().map(g => `
        <div style="display:flex; justify-content:space-between; font-size:11px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05)">
            <span>${new Date(g.time).toLocaleDateString()} - 🏆 <b>${g.winner}</b></span>
            <button class="btn-danger" onclick="deleteRound('${g.time}')">DELETE</button>
        </div>`).join('');
};

window.runRivalry = () => {
    const p1 = document.getElementById('rival1').value;
    const p2 = document.getElementById('rival2').value;
    if(!p1 || !p2 || p1 === p2) return;
    const is28 = currentMode === '28';
    const games = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode));
    let p1w = 0, p2w = 0, p1l = 0, p2l = 0, shared = 0;
    games.forEach(g => {
        const ns = (g.players||[]).map(p=>p.name);
        if(ns.includes(p1) && ns.includes(p2)) {
            shared++;
            if(g.winner === p1) p1w++; if(g.winner === p2) p2w++;
            if(g.last === p1) p1l++; if(g.last === p2) p2l++;
        }
    });
    document.getElementById('rival-display').innerHTML = `
        <div style="display:flex; justify-content:space-between;">
            <div><b>${p1}</b><br><small>${p1w} Wins | ${p1l} 💩</small></div>
            <div style="font-size:10px; opacity:0.5">VS<br>${shared} Matches</div>
            <div><b>${p2}</b><br><small>${p2w} Wins | ${p2l} 💩</small></div>
        </div>`;
};

window.deleteRound = async (t) => {
    if(prompt("Enter Password:") !== PASS) return;
    const snap = await getDocs(query(gRef, where("time", "==", t)));
    snap.forEach(async d => await deleteDoc(d.ref));
};

onSnapshot(query(gRef, orderBy("time")), snap => {
    allData = snap.docs.map(d => d.data());
    renderAll();
});
</script>
</body>
</html>
