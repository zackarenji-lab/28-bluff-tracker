<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Elite Command Center</title>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #0d0d1a 0%, #101026 40%, #05050d 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    --grad1: linear-gradient(135deg, #6247aa, #a06ee1);
    --grad2: linear-gradient(135deg, #1d3557, #457b9d);
    --grad3: linear-gradient(135deg, #2d004d, #7b2cbf);
  }
  body { 
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); 
    background-attachment: fixed; color: var(--text); min-height: 100vh;
  }
  .wrap { max-width: 1000px; margin: auto; padding: 20px; }
  
  /* HEADER & HOME BUTTON */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .home-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 11px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,211,109,0.3); padding: 10px 20px; border-radius: 30px; background: rgba(255,211,109,0.05); text-transform: uppercase; letter-spacing: 1px; }

  /* GRADIENT TOP TABS */
  .game-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
  .g-tab { 
    padding: 16px; border-radius: 12px; text-align: center; font-weight: 900; 
    cursor: pointer; text-transform: uppercase; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.05); 
    font-size: 13px; transition: 0.3s; background: rgba(255, 255, 255, 0.05); color: var(--muted);
  }
  .g-tab.active { 
    background: linear-gradient(135deg, var(--violet), var(--blue));
    color: white; border-color: rgba(255,255,255,0.4);
    box-shadow: 0 10px 20px rgba(123, 44, 191, 0.3);
    transform: translateY(-4px);
  }

  /* GROUP CONFIG PANEL */
  .panel { 
    background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 30px; 
    border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px);
  }
  .panel-header { font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 15px; display: block; }
  select { 
    background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; 
    width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; outline: none;
  }

  .mid-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 30px; }
  @media (max-width: 850px) { .mid-grid { grid-template-columns: 1fr; } }

  /* HALL OF FAME - UPDATED SIZES */
  .hof-card { 
    background: linear-gradient(160deg, #111122 0%, #1a1a3a 100%); 
    border-radius: 24px; padding: 30px; border: 1px solid rgba(123, 44, 191, 0.3); 
    text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }
  .hof-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
  .rank-lbl { font-weight: 900; font-size: 18px; color: var(--muted); font-style: italic; }
  .p-name-cap { text-transform: uppercase; font-size: 20px; font-weight: 900; color: #fff; flex: 1; text-align: left; margin-left: 20px; letter-spacing: 1px; }
  .p-pts-big { color: var(--accent); font-weight: 900; font-size: 26px; text-shadow: 0 0 10px rgba(255,211,109,0.3); }

  /* KPI TILES - INCREASED FONT */
  .section-header { font-weight: 900; font-size: 18px; color: #fff; margin: 40px 0 20px 0; display: flex; align-items: center; gap: 15px; text-transform: uppercase; letter-spacing: 2px; }
  .section-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--violet), transparent); }
  .kpi-title-header { font-weight: 900; font-size: 18px; color: #fff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
  .kpi-title-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--blue), transparent); }

  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  .k-tile { 
    padding: 25px 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column; justify-content: center; min-height: 120px; transition: 0.3s;
  }
  .k-tile:nth-child(1), .k-tile:nth-child(4), .k-tile:nth-child(7) { background: var(--grad1); }
  .k-tile:nth-child(2), .k-tile:nth-child(5), .k-tile:nth-child(8) { background: var(--grad2); }
  .k-tile:nth-child(3), .k-tile:nth-child(6), .k-tile:nth-child(9) { background: var(--grad3); }
  
  .k-tile small { font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.9); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .k-tile .val { font-size: 20px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); text-transform: uppercase; }
  .k-tile .sub { font-size: 10px; color: #fff; margin-top: 8px; font-weight: 800; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 6px; align-self: flex-start; }

  /* RANKING ROWS */
  .rank-row { background: rgba(255, 255, 255, 0.03); margin-bottom: 12px; padding: 22px; border-radius: 16px; display: flex; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.05); }
  .num { width: 35px; font-weight: 900; color: var(--cyan); font-size: 26px; }
  .p-chart-container { width: 100%; height: 6px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 12px; }
  .p-chart-fill { height: 100%; background: linear-gradient(to right, var(--cyan), var(--blue), var(--violet)); border-radius: 10px; }
  .score-box { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 12px 22px; border-radius: 12px; font-weight: 900; font-size: 20px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <a href="index.html" class="home-link">🏠 HOME</a>
    <div style="font-weight: 900; font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase;">Command Center Pro</div>
  </header>

  <div class="game-tabs">
    <div class="g-tab active" id="tab-UNO" onclick="setMode('UNO', this)">Uno Cards</div>
    <div class="g-tab" id="tab-Bluff" onclick="setMode('Bluff', this)">Bluff Game</div>
    <div class="g-tab" id="tab-28" onclick="setMode('28', this)">28 Card</div>
  </div>

  <div class="panel">
    <span class="panel-header">Group Configuration</span>
    <select id="lineupFilter" onchange="renderAll()"></select>
    <p id="lineupDesc" style="font-size: 11px; color: var(--cyan); margin: 12px 0 0 0; font-style: italic; opacity: 0.9;"></p>
  </div>

  <div class="mid-grid">
    <div class="hof-card">
      <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" style="width:60px; margin-bottom:20px; filter: drop-shadow(0 0 15px rgba(255,211,109,0.5));">
      <h4 id="hof-title" style="margin:0; font-size:18px; letter-spacing:2px; color: var(--accent);">UNO ELITE HALL</h4>
      <div class="hof-list" id="podium-list" style="margin: 20px 0;"></div>
      <p style="color:var(--accent); font-weight:900; font-size:13px; letter-spacing:4px; margin-top: 25px; opacity:0.8;">VICTORY AWAITS</p>
    </div>

    <div>
      <div class="kpi-title-header">Tournament Intelligence</div>
      <div class="kpi-grid" id="kpi-container"></div>
    </div>
  </div>

  <div class="section-header">Live Player Rankings</div>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let currentMode = 'UNO';

window.setMode = (m, el) => {
    currentMode = m;
    document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('hof-title').innerText = m.toUpperCase() + " ELITE HALL";
    renderAll();
};

window.renderAll = () => {
    const is28 = currentMode === '28';
    const rawGames = allData.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === currentMode) && g.winner);
    
    let lineups = {};
    rawGames.forEach(g => {
        const pNames = g.players ? g.players.map(p => p.name).sort() : [];
        const key = pNames.join(', ');
        if(!lineups[key]) lineups[key] = { count: pNames.length, names: key };
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">Global History (All Groups)</option>` + 
        Object.keys(lineups).map((k, i) => `<option value="${k}" ${k===saved?'selected':''}>Lineup ${i+1} (${lineups[k].count}P) [${lineups[k].names}]</option>`).join('');

    const activeKey = lSelect.value;
    const filtered = activeKey === 'ALL' ? rawGames : rawGames.filter(g => (g.players?g.players.map(p=>p.name).sort().join(', '):'') === activeKey);
    document.getElementById('lineupDesc').innerText = activeKey === 'ALL' ? "Global data across all player sessions." : "Members: " + activeKey;

    const stats = {};
    filtered.forEach(g => {
        (g.players || []).forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, t:0, r1:0, r2:0, r3:0, rl:0, history: []};
            stats[p.name].pts += (p.pts || 0); stats[p.name].t++;
            if(p.rank === 1) stats[p.name].r1++;
            else if(p.rank === 2) stats[p.name].r2++;
            else if(p.rank === 3) stats[p.name].r3++;
            else if(p.rank === 0) stats[p.name].rl++;
            stats[p.name].history.push(p.rank);
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);

    // PODIUM (TOP 3) - CAPITALIZED & BOLD
    document.getElementById('podium-list').innerHTML = sorted.slice(0,3).map((n, i) => `
        <div class="hof-item">
            <span class="rank-lbl">#${i+1}</span>
            <b class="p-name-cap">${n}</b>
            <span class="p-pts-big">${stats[n].pts}</span>
        </div>`).join('');

    // HAT TRICK
    let hatTrickHero = '—';
    for(let n in stats) {
        let streak = 0, max = 0;
        stats[n].history.forEach(r => { if(r === 1) streak++; else streak = 0; if(streak > max) max = streak; });
        if(max >= 3) { hatTrickHero = n; break; }
    }

    // ADVANCED PREDICTION (10 PT RULE)
    let predictionVal = 'Stable Rank';
    let predSub = 'No threat in range';
    if(sorted.length >= 2) {
        const champ = sorted[0];
        // Check anyone within 10 pts of champ
        const threat = sorted.slice(1).find(p => (stats[champ].pts - stats[p].pts) <= 10);
        if(threat) {
            const diff = stats[champ].pts - stats[threat].pts;
            predictionVal = `${threat} needs ${diff + 1} pts to beat ${champ}`;
            predSub = 'All the Best!';
        }
    }

    const king = sorted[0] || '—';
    const last = Object.keys(stats).sort((a,b) => stats[b].rl - stats[a].rl)[0] || '—';
    const finisher = Object.keys(stats).sort((a,b) => stats[b].r1 - stats[a].r1)[0] || '—';
    const comeback = Object.keys(stats).sort((a,b) => (stats[b].r1/stats[b].t) - (stats[a].r1/stats[a].t))[0] || '—';
    const consistent = Object.keys(stats).sort((a,b) => (stats[b].r2 + stats[b].r3) - (stats[a].r2 + stats[a].r3))[0] || '—';
    const winRate = sorted.length ? ((stats[king].r1 / stats[king].t) * 100).toFixed(0) + "%" : "0%";

    document.getElementById('kpi-container').innerHTML = `
        <div class="k-tile"><small>Total Rounds</small><div class="val">${filtered.length}</div></div>
        <div class="k-tile"><small>Points King/Queen</small><div class="val">${king}</div></div>
        <div class="k-tile"><small>Last King/Queen</small><div class="val" style="color:#ffb3b3">${last}</div></div>
        <div class="k-tile"><small>Highest Finisher</small><div class="val">${finisher}</div></div>
        <div class="k-tile"><small>Comeback K/Q</small><div class="val">${comeback}</div></div>
        <div class="k-tile"><small>Consistent Pro</small><div class="val">${consistent}</div></div>
        <div class="k-tile"><small>Hat-Trick Hero</small><div class="val">${hatTrickHero}</div><span class="sub">Streak Active</span></div>
        <div class="k-tile"><small>Next Champ Prediction</small><div class="val" style="font-size:11px;">${predictionVal}</div><span class="sub">${predSub}</span></div>
        <div class="k-tile"><small>Peak Win Rate</small><div class="val">${winRate}</div></div>
    `;

    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n];
        const winPercent = ((d.r1 / d.t) * 100).toFixed(0);
        return `
        <div class="rank-row">
            <div class="num">#${i+1}</div>
            <div class="p-info">
                <div class="p-name">${n}</div>
                <div class="p-stats">
                    <span>Wins: <b>${d.r1}</b></span>
                    <span>Last: <b>${d.rl}</b></span>
                    <span>Efficiency: <b>${winPercent}%</b></span>
                </div>
                <div class="p-chart-container"><div class="p-chart-fill" style="width: ${winPercent}%"></div></div>
            </div>
            <div class="score-box">${d.pts}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => {
    allData = snap.docs.map(d => d.data());
    renderAll();
});
</script>
</body>
</html>
