<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:15px auto;padding:15px;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:15px}
  .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;}
  h1{margin:0;font-size:16px;flex:1}
  
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:15px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 15px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .game-box { aspect-ratio: 1/1; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
  .game-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
  .game-name-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); color: #fff; font-size: 8px; font-weight: 800; padding: 4px 0; text-transform: uppercase; text-align: center; }

  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:8px 12px; color:#e6eef3; font-weight:700; cursor:pointer; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  .neu-btn.danger { color: var(--danger); border: 1px solid rgba(255,107,107,0.2); }
  .neu-btn.small { padding: 4px 8px; font-size: 9px; }

  select, input { background: #fff !important; color: #000 !important; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; border: none; font-size: 13px; box-sizing: border-box; }
  .score-val { font-size: 24px; font-weight: 800; color: var(--gold); }
  
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
  .modal-box { background: #0b1622; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
  
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
  
  .analytics-row { margin-bottom: 10px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; }
  .bar-container { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; display: flex; margin-top: 5px; }
  .b-win { height: 100%; background: var(--accent); }
  .b-last { height: 100%; background: var(--danger); }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <h1>Gaming Zone</h1>
    <button id="btn-overall" class="neu-btn small" onclick="switchView('OVERALL')">📊 Overall Stat</button>
    <button id="btn-home" class="neu-btn small" style="display:none" onclick="location.reload()">🏠 Home</button>
  </header>

  <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img"/>

  <section id="view-HOME">
    <div class="card">
      <h2 style="margin:0 0 10px 0; font-size:12px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')"><img src="28 button.png" alt="28"><div class="game-name-overlay">28 Game</div></div>
        <div class="game-box" onclick="launchGame('Bluff')"><img src="bluff button.png" alt="Bluff"><div class="game-name-overlay">Bluff</div></div>
        <div class="game-box" onclick="launchGame('UNO')"><img src="uno button.png" alt="UNO"><div class="game-name-overlay">UNO</div></div>
      </div>
    </div>
  </section>

  <section id="view-28" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size:16px;">Active Series</h2>
        <button class="neu-btn small" onclick="openStats('28')">📊 Stats</button>
      </div>
      <div id="list-28"></div>
      <button class="neu-btn primary" style="width:100%; margin-top:10px;" onclick="newSeries28()">➕ Start New Series</button>
    </div>
  </section>

  <section id="view-INDIV" style="display:none;">
    <div class="card" id="pane-setup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="indiv-title" style="margin:0; font-size:16px;">Setup</h3>
            <button class="neu-btn small" onclick="openStats(window.activeMode)">📊 Stats</button>
        </div>
        <label style="font-size:11px; color:var(--muted)">How many players? (3-10)</label>
        <input type="number" id="pCnt" min="3" max="10" placeholder="Enter count..." oninput="drawInputs()">
        <div id="pInputs" style="margin-top:15px"></div>
        <button id="btn-start" class="neu-btn primary" style="width:100%; display:none; margin-top:10px" onclick="goScoring()">Start Playing</button>
    </div>
    <div class="card" id="pane-play" style="display:none;">
        <h3 style="font-size:16px; margin-bottom:10px;">Live Scoring</h3>
        <table><thead><tr><th>Player</th><th>Win 🏆</th><th>Last 💩</th></tr></thead><tbody id="table-score"></tbody></table>
        <button class="neu-btn primary" style="width:100%; margin-top:15px" onclick="saveIndiv()">Save Result</button>
    </div>
  </section>

  <section id="view-OVERALL" style="display:none;">
    <div class="card">
        <h2 style="margin:0 0 15px 0; font-size:16px; text-align:center;">Gaming Analytics</h2>
        <div id="summary-tiles"></div>
        <button class="neu-btn danger" style="width:100%; margin-top:15px" onclick="resetAllData()">⚠️ Emergency Reset</button>
    </div>
  </section>
</div>

<div id="modal-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const PLAYER_NAMES = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];
const TEAM_NAMES = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gamesRef = collection(db, "games");
let allData = [];
window.activeMode = '';

// VIEW CONTROL
window.switchView = (v) => {
    ['HOME','28','INDIV','OVERALL'].forEach(id => document.getElementById('view-'+id).style.display = (id === v ? 'block' : 'none'));
    document.getElementById('btn-home').style.display = (v === 'HOME' ? 'none' : 'block');
    document.getElementById('btn-overall').style.display = (v === 'HOME' ? 'block' : 'none');
    if(v === 'OVERALL') renderGlobalTiles();
};

window.launchGame = (m) => { window.activeMode = m; switchView(m==='28'?'28':'INDIV'); if(m!=='28') resetSetup(); };

function resetSetup() {
    document.getElementById('indiv-title').innerText = window.activeMode + ' Setup';
    document.getElementById('pCnt').value = ""; document.getElementById('pInputs').innerHTML = "";
    document.getElementById('btn-start').style.display = "none";
    document.getElementById('pane-setup').style.display = "block";
    document.getElementById('pane-play').style.display = "none";
}

// INDIV (BLUFF/UNO) LOGIC
window.drawInputs = () => {
    const val = document.getElementById('pCnt').value;
    const cnt = parseInt(val);
    const container = document.getElementById('pInputs'); container.innerHTML = "";
    if(!val || cnt < 3 || cnt > 10) { document.getElementById('btn-start').style.display="none"; return; }
    
    for(let i=0; i<cnt; i++) {
        container.innerHTML += `<select id="s${i}" onchange="checkCustom(${i})">
            <option value="" disabled selected>Player ${i+1}</option>
            ${PLAYER_NAMES.map(p=>`<option value="${p}">${p}</option>`).join('')}
            <option value="Custom">Custom Name</option>
        </select>
        <input type="text" id="o${i}" style="display:none" placeholder="Enter Name...">`;
    }
    document.getElementById('btn-start').style.display="block";
};

window.checkCustom = (i) => {
    const s = document.getElementById(`s${i}`).value;
    document.getElementById(`o${i}`).style.display = (s === 'Custom' ? 'block' : 'none');
};

window.goScoring = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const body = document.getElementById('table-score'); body.innerHTML = "";
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`s${i}`).value;
        const name = (sel === 'Custom' ? document.getElementById(`o${i}`).value : sel);
        if(!name) return alert("Please fill all player names");
        body.innerHTML += `<tr><td><b>${name}</b></td><td><input type="radio" name="win" value="${name}"></td><td><input type="radio" name="lost" value="${name}"></td></tr>`;
    }
    document.getElementById('pane-setup').style.display="none"; document.getElementById('pane-play').style.display="block";
};

window.saveIndiv = async () => {
    const w = document.querySelector('input[name="win"]:checked')?.value;
    const l = document.querySelector('input[name="lost"]:checked')?.value;
    if(!w || !l || w===l) return alert("Select Winner & Last!");
    const run = []; document.querySelectorAll('#table-score tr').forEach(r => {
        const n = r.cells[0].innerText; if(n!==w && n!==l) run.push(n);
    });
    await addDoc(gamesRef, { gameType: activeMode, winner: w, last: l, runnersUp: run, time: new Date().toISOString(), secret: PASS });
    location.reload();
};

// 28 GAME LOGIC
window.newSeries28 = () => {
    const o = TEAM_NAMES.map(t => `<option value="${t}">${t}</option>`).join("");
    const h = `<div class="modal-box"><h3>New Series</h3>
        <select id="mTarget"><option value="5">First to 5</option><option value="10">First to 10</option></select>
        <select id="mT1" onchange="filterTeams()"><option value="" selected disabled>Team 1</option>${o}</select>
        <select id="mT2"><option value="" selected disabled>Team 2</option>${o}</select>
        <button class="neu-btn primary" style="width:100%; margin-top:10px" onclick="confirm28()">Start</button>
        <button class="neu-btn" style="width:100%; margin-top:10px" onclick="closeModal()">Close</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
};

window.filterTeams = () => {
    const t1 = document.getElementById('mT1').value;
    const t2 = document.getElementById('mT2');
    const members = t1.split(' & ');
    Array.from(t2.options).forEach(opt => {
        if(!opt.value) return;
        opt.style.display = members.some(m => opt.value.includes(m)) ? 'none' : 'block';
    });
};

window.confirm28 = async () => {
    const t1 = document.getElementById('mT1').value, t2 = document.getElementById('mT2').value, target = document.getElementById('mTarget').value;
    if(!t1 || !t2) return alert("Select both teams");
    await addDoc(gamesRef, { seriesId: "s_"+Date.now(), isInit: true, teamA: t1, teamB: t2, seriesTarget: parseInt(target), time: new Date().toISOString(), secret: PASS });
    closeModal();
};

window.renderActive28 = () => {
    const series = {};
    allData.filter(g => !g.gameType || g.gameType === '28').forEach(g => {
        if (!series[g.seriesId]) series[g.seriesId] = { id: g.seriesId, target: g.seriesTarget || 5, wins: {}, teamA: g.teamA, teamB: g.teamB, stop: false };
        if (g.isInit) { series[g.seriesId].teamA = g.teamA; series[g.seriesId].teamB = g.teamB; series[g.seriesId].target = g.seriesTarget || 5; }
        else if (g.manualEnd) series[g.seriesId].stop = true;
        else if (g.winner) series[g.seriesId].wins[g.winner] = (series[g.seriesId].wins[g.winner] || 0) + 1;
    });
    const active = Object.values(series).filter(s => !s.stop && !Object.values(s.wins).some(w => w >= s.target));
    const list = document.getElementById('list-28'); if(!list) return; list.innerHTML = "";
    active.forEach(s => {
        const wA = s.wins[s.teamA] || 0, wB = s.wins[s.teamB] || 0;
        list.innerHTML += `<div class="card"><div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <div><b>${s.teamA}</b><div class="score-val">${wA}</div></div><div><b>${s.teamB}</b><div class="score-val">${wB}</div></div></div>
            <div style="display:flex; gap:8px;"><button class="neu-btn primary" onclick="addWin28('${s.id}','${s.teamA}','${s.teamB}')">Win ${s.teamA.split(' ')[0]}</button>
            <button class="neu-btn primary" style="background:var(--gold)" onclick="addWin28('${s.id}','${s.teamB}','${s.teamA}')">Win ${s.teamB.split(' ')[0]}</button>
            <button class="neu-btn danger small" onclick="stop28('${s.id}')">STOP</button></div></div>`;
    });
};

window.addWin28 = async (id, w, l) => { await addDoc(gamesRef, { seriesId: id, winner: w, loser: l, time: new Date().toISOString(), secret: PASS }); };
window.stop28 = async (id) => { if(prompt("Password:")===PASS) await addDoc(gamesRef, { seriesId: id, manualEnd: true, time: new Date().toISOString(), secret: PASS }); };

// GLOBAL STATS
window.openStats = (m) => {
    const data = allData.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner);
    const st = {};
    data.forEach(g => {
        const w = g.winner, l = g.last || g.loser;
        [w, l, ...(g.runnersUp || [])].forEach(p => { if(!st[p]) st[p] = {w:0, l:0, t:0} });
        st[w].w++; st[l].l++; st[w].t++; st[l].t++; (g.runnersUp || []).forEach(p => st[p].t++);
    });
    let h = `<div class="modal-box"><h3>${m} Analysis</h3>`;
    Object.entries(st).sort((a,b)=>b[1].w-a[1].w).forEach(([n, d]) => {
        h += `<div class="analytics-row"><div style="display:flex; justify-content:space-between; font-size:11px"><b>${n}</b><span>${d.w} Wins</span></div>
              <div class="bar-container"><div class="b-win" style="width:${(d.w/d.t)*100}%"></div><div class="b-last" style="width:${(d.l/d.t)*100}%"></div></div></div>`;
    });
    h += `<h4 style="margin:15px 0 5px 0">History</h4>`;
    data.slice(-10).reverse().forEach(g => h += `<div style="font-size:10px; padding:5px 0; border-bottom:1px solid #ffffff10">🏆 ${g.winner} | 💩 ${g.last||g.loser}</div>`);
    h += `<button class="neu-btn primary" style="width:100%; margin-top:15px" onclick="closeModal()">Close</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
};

window.renderGlobalTiles = () => {
    const f = (m) => allData.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner).length;
    document.getElementById('summary-tiles').innerHTML = `
        <div class="card" onclick="openStats('28')">🏏 <b>28</b> - ${f('28')} Series Logged</div>
        <div class="card" onclick="openStats('Bluff')">🃏 <b>Bluff</b> - ${f('Bluff')} Rounds Won</div>
        <div class="card" onclick="openStats('UNO')">🌈 <b>UNO</b> - ${f('UNO')} Rounds Won</div>`;
};

window.closeModal = () => document.getElementById('modal-container').innerHTML = "";

onSnapshot(query(gamesRef, orderBy("time")), snap => {
    allData = snap.docs.map(d => d.data());
    renderActive28();
    if(document.getElementById('view-OVERALL').style.display === 'block') renderGlobalTiles();
});

window.resetAllData = async () => { if(prompt("Reset All?")===PASS) { const s = await getDocs(gamesRef); s.forEach(d => deleteDoc(d.ref)); location.reload(); } };
</script>
</body>
</html>
