<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:15px auto;padding:15px;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:15px}
  .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;}
  h1{margin:0;font-size:16px;flex:1}
  .dash-link { font-size: 10px; font-weight: 800; color: var(--gold); text-decoration: none; text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(255, 211, 109, 0.3); padding: 6px 12px; border-radius: 20px; background: rgba(255, 255, 255, 0.05); margin-right: 5px; }
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:15px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 15px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .game-box { aspect-ratio: 1/1; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
  .game-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
  .game-name-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); color: #fff; font-size: 8px; font-weight: 800; padding: 4px 0; text-transform: uppercase; text-align: center; }
  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:8px 12px; color:#e6eef3; font-weight:700; cursor:pointer; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  .neu-btn.danger { color: var(--danger); border: 1px solid rgba(255,107,107,0.2); }
  .neu-btn.small { padding: 4px 8px; font-size: 9px; }
  select, input { background: #fff !important; color: #000 !important; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; border: none; font-size: 13px; box-sizing: border-box; }
  .score-val { font-size: 24px; font-weight: 800; color: var(--gold); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(12px); }
  .modal-box { background: #0b1622; padding: 20px; border-radius: 20px; width: 92%; max-width: 400px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
  .streak-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
  .btn-streak { font-size: 8px !important; padding: 4px !important; opacity: 0.8; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <h1>Gaming Zone</h1>
    <a href="dashboard.html" class="dash-link">📊 Dashboard</a>
    <button class="neu-btn small" onclick="switchView('OVERALL')">📊 Overall Stat</button>
    <button id="btn-home" class="neu-btn small" style="display:none" onclick="location.reload()">🏠 Home</button>
  </header>

  <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img"/>

  <section id="view-HOME">
    <div class="card">
      <h2 style="margin:0 0 10px 0; font-size:12px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')"><img src="28 button.png" alt="28"><div class="game-name-overlay">28 Game</div></div>
        <div class="game-box" onclick="launchGame('Bluff')"><img src="bluff button.png" alt="Bluff"><div class="game-name-overlay">Bluff</div></div>
        <div class="game-box" onclick="launchGame('UNO')"><img src="uno button.png" alt="UNO"><div class="game-name-overlay">UNO</div></div>
      </div>
    </div>
  </section>

  <section id="view-28" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size:16px;">Active Series</h2>
        <button class="neu-btn small" onclick="window.location.href='dash28.html'">📊 Stats</button>
      </div>
      <div id="list-28"></div>
      <button class="neu-btn primary" style="width:100%; margin-top:10px;" onclick="newSeries28()">➕ New Series</button>
    </div>
  </section>

  <section id="view-INDIV" style="display:none;">
    <div class="card" id="pane-setup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="indiv-title" style="margin:0; font-size:16px;">Setup</h3>
            <button class="neu-btn small" onclick="window.location.href='dashboard.html'">📊 Stats</button>
        </div>
        <input type="number" id="pCnt" min="3" max="10" placeholder="Players (3-10)" oninput="drawInputs()">
        <div id="pInputs"></div>
        <button id="btn-start" class="neu-btn primary" style="width:100%; display:none; margin-top:10px" onclick="goScoring()">Enter Tournament</button>
    </div>
    <div class="card" id="pane-play" style="display:none;">
        <h3 id="play-subtitle" style="font-size:14px; margin-bottom:10px;">Tournament Rankings</h3>
        <table><thead><tr><th>Player</th><th>Position</th></tr></thead><tbody id="table-score-body"></tbody></table>
        <button class="neu-btn primary" style="width:100%; margin-top:15px" onclick="saveWeightedResult()">Finish Match</button>
    </div>
  </section>

  <section id="view-OVERALL" style="display:none;">
    <div class="card">
        <h2 style="margin:0 0 15px 0; font-size:16px; text-align:center;">Analytics Hub</h2>
        <div id="summary-tiles"></div>
        <button class="neu-btn danger" style="width:100%; margin-top:15px" onclick="resetSystem('ALL')">⚠️ Emergency Reset All Data</button>
    </div>
  </section>
</div>

<div id="modal-container"></div>

<script>
  // CONFIG
  const firebaseConfig = { 
    apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", 
    authDomain: "bluff-tracker-7542e.firebaseapp.com", 
    projectId: "bluff-tracker-7542e", 
    storageBucket: "bluff-tracker-7542e.appspot.com", 
    messagingSenderId: "280965687037", 
    appId: "1:280965687037:web:be0b05da36ef653ab68094" 
  };

  const PASS = "zachariahrenji";
  const PLRS = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];
  const TMS = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  let allG = [];
  window.activeMode = '';

  window.switchView = (v) => {
    ['HOME','28','INDIV','OVERALL'].forEach(x => { if(document.getElementById('view-'+x)) document.getElementById('view-'+x).style.display = (x===v?'block':'none'); });
    document.getElementById('btn-home').style.display = (v === 'HOME' ? 'none' : 'block');
    if(v === 'OVERALL') renderGlobalTiles();
  };

  window.launchGame = (m) => { window.activeMode = m; switchView(m==='28'?'28':'INDIV'); if(m!=='28') resetSetup(); };

  function resetSetup() {
    document.getElementById('indiv-title').innerText = window.activeMode + ' Setup';
    document.getElementById('pCnt').value = ""; document.getElementById('pInputs').innerHTML = "";
    document.getElementById('btn-start').style.display = "none";
    document.getElementById('pane-setup').style.display = "block";
    document.getElementById('pane-play').style.display = "none";
  }

  window.drawInputs = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const container = document.getElementById('pInputs'); container.innerHTML = "";
    if(isNaN(cnt) || cnt < 3 || cnt > 10) { document.getElementById('btn-start').style.display="none"; return; }
    for(let i=0; i<cnt; i++) {
        container.innerHTML += `<select id="ps-${i}" onchange="refreshExclusion()"><option value="" selected disabled>Player ${i+1}</option>${PLRS.map(p=>`<option value="${p}">${p}</option>`).join('')}<option value="C">Custom</option></select><input type="text" id="pc-${i}" style="display:none" placeholder="Enter Name">`;
    }
    document.getElementById('btn-start').style.display="block";
  };

  window.refreshExclusion = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const used = [];
    for(let i=0; i<cnt; i++) {
        const v = document.getElementById(`ps-${i}`).value; if(v && v !== "C") used.push(v);
        document.getElementById(`pc-${i}`).style.display = (v === "C" ? "block" : "none");
    }
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`ps-${i}`);
        Array.from(sel.options).forEach(opt => { if(opt.value && opt.value !== "C") opt.disabled = used.includes(opt.value) && sel.value !== opt.value; });
    }
  };

  window.goScoring = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    document.getElementById('play-subtitle').innerText = `${cnt} Player ${activeMode} Tournament`;
    const body = document.getElementById('table-score-body'); body.innerHTML = "";
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`ps-${i}`).value;
        const name = (sel === 'C' ? document.getElementById(`pc-${i}`).value : sel);
        if(!name) return alert("Fill all names");
        body.innerHTML += `<tr><td><b>${name}</b></td><td><select class="rank-sel" data-player="${name}">
            <option value="99" selected>Other (1 Pt)</option>
            <option value="1">1st (10 Pts)</option>
            <option value="2">2nd (5 Pts)</option>
            ${cnt > 3 ? '<option value="3">3rd (3 Pts)</option>' : ''}
            <option value="0">Last (0 Pts)</option>
        </select></td></tr>`;
    }
    document.getElementById('pane-setup').style.display="none"; document.getElementById('pane-play').style.display="block";
  };

  window.saveWeightedResult = async () => {
    const results = [];
    let win = '', lost = '';
    document.querySelectorAll('.rank-sel').forEach(sel => {
        const rank = parseInt(sel.value);
        const name = sel.getAttribute('data-player');
        let pts = 1;
        if(rank === 1) { pts = 10; win = name; }
        else if(rank === 2) pts = 5;
        else if(rank === 3) pts = 3;
        else if(rank === 0) { pts = 0; lost = name; }
        results.push({ name, rank, pts });
    });
    if(!win || !lost) return alert("Identify 1st and Last!");
    await db.collection("games").add({ gameType: activeMode, players: results, winner: win, last: lost, time: new Date().toISOString(), secret: PASS });
    resetSetup();
  };

  window.newSeries28 = () => {
    const o = TMS.map(t => `<option value="${t}">${t}</option>`).join("");
    const h = `<div class="modal-box"><h3>28 Setup</h3>
        <select id="mTarget"><option value="5">First to 5</option><option value="10">First to 10</option></select>
        <select id="mT1" onchange="filterTMS()"><option value="" selected disabled>Team 1</option>${o}</select>
        <select id="mT2"><option value="" selected disabled>Team 2</option>${o}</select>
        <button class="neu-btn primary" style="width:100%; margin-top:10px" onclick="conf28()">Start</button>
        <button class="neu-btn" style="width:100%; margin-top:10px" onclick="closeM()">Close</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
  };

  window.filterTMS = () => {
    const t1 = document.getElementById('mT1').value;
    Array.from(document.getElementById('mT2').options).forEach(o => { if(o.value) o.disabled = t1.split(' & ').some(m => o.value.includes(m)); });
  };

  window.conf28 = async () => {
    const t1 = document.getElementById('mT1').value, t2 = document.getElementById('mT2').value, target = document.getElementById('mTarget').value;
    await db.collection("games").add({ seriesId: "s_"+Date.now(), isInit: true, teamA: t1, teamB: t2, seriesTarget: parseInt(target), time: new Date().toISOString(), secret: PASS, gameType: '28' });
    closeM();
  };

  window.render28 = () => {
    const seriesMap = {};
    allG.filter(g => !g.gameType || g.gameType === '28').forEach(g => {
        if (!seriesMap[g.seriesId]) seriesMap[g.seriesId] = { id: g.seriesId, target: 5, wins: {}, teamA: '', teamB: '', stop: false };
        const s = seriesMap[g.seriesId];
        if (g.isInit) { s.teamA = g.teamA; s.teamB = g.teamB; s.target = g.seriesTarget; }
        else if (g.manualEnd) s.stop = true;
        else if (g.winner) s.wins[g.winner] = (s.wins[g.winner] || 0) + 1;
    });
    const list = document.getElementById('list-28'); if(!list) return; list.innerHTML = "";
    Object.values(seriesMap).filter(s => s.teamA && !s.stop && !Object.values(s.wins).some(w => w >= s.target)).forEach(s => {
        const wA = s.wins[s.teamA] || 0, wB = s.wins[s.teamB] || 0;
        list.innerHTML += `<div class="card"><div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
            <div style="text-align:center; flex:1"><b>${s.teamA}</b><div class="score-val">${wA}</div>
                <div class="streak-row">
                    <button class="neu-btn small btn-streak" onclick="score28('${s.id}','${s.teamA}','${s.teamB}','master')">M (+3)</button>
                    <button class="neu-btn small btn-streak" onclick="score28('${s.id}','${s.teamA}','${s.teamB}','lucky')">L (+2)</button>
                </div>
            </div>
            <div style="font-weight:900; color:var(--muted)">VS</div>
            <div style="text-align:center; flex:1"><b>${s.teamB}</b><div class="score-val">${wB}</div>
                <div class="streak-row">
                    <button class="neu-btn small btn-streak" onclick="score28('${s.id}','${s.teamB}','${s.teamA}','master')">M (+3)</button>
                    <button class="neu-btn small btn-streak" onclick="score28('${s.id}','${s.teamB}','${s.teamA}','lucky')">L (+2)</button>
                </div>
            </div></div>
            <div style="display:flex; gap:8px;">
                <button class="neu-btn primary" style="flex:1" onclick="score28('${s.id}','${s.teamA}','${s.teamB}')">Win ${s.teamA.split(' ')[0]}</button>
                <button class="neu-btn primary" style="flex:1; background:var(--gold)" onclick="score28('${s.id}','${s.teamB}','${s.teamA}')">Win ${s.teamB.split(' ')[0]}</button>
                <button class="neu-btn danger" onclick="finalize28('${s.id}', ${wA}, ${wB})">STOP</button>
            </div></div>`;
    });
  };

  window.score28 = async (id, w, l, type = 'standard') => { 
    let pts = 1; if(type === 'master') pts = 4; if(type === 'lucky') pts = 3;
    await db.collection("games").add({ seriesId: id, winner: w, loser: l, points: pts, streakType: type, time: new Date().toISOString(), secret: PASS, gameType: '28' }); 
  };

  window.finalize28 = async (id, wA, wB) => {
    if(!confirm("End series and record as tournament?")) return;
    const tType = Math.max(wA, wB) >= 10 ? 10 : 5;
    await db.collection("games").add({ seriesId: id, manualEnd: true, finalized: true, tourneyType: tType, time: new Date().toISOString(), secret: PASS, gameType: '28' });
  };

  window.renderGlobalTiles = () => {
    const f = (m) => allG.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner).length;
    document.getElementById('summary-tiles').innerHTML = `
        <div class="card" onclick="window.location.href='dash28.html'">🏏 <b>28</b> - ${f('28')} Series</div>
        <div class="card" onclick="window.location.href='dashboard.html?mode=Bluff'">🃏 <b>Bluff</b> - ${f('Bluff')} Rounds</div>
        <div class="card" onclick="window.location.href='dashboard.html'">🌈 <b>UNO</b> - ${f('UNO')} Rounds</div>`;
  };

  window.resetSystem = async (type, id) => {
    if(prompt(`Password:`) !== PASS) return;
    const snap = await db.collection("games").where(type === 'ALL' ? "secret" : "seriesId", "==", type === 'ALL' ? PASS : id).get();
    const ops = []; snap.forEach(d => ops.push(d.ref.delete())); await Promise.all(ops);
    location.reload();
  };

  window.closeM = () => document.getElementById('modal-container').innerHTML = "";

  db.collection("games").orderBy("time").onSnapshot(snap => {
    allG = snap.docs.map(d => d.data());
    render28();
  });
</script>
</body>
</html>
