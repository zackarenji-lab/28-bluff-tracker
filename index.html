<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Game Night Hub</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:22px auto;padding:20px;}
  header{display:flex;align-items:center;gap:15px;margin-bottom:18px}
  .logo{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;box-shadow:0 8px 28px rgba(0,0,0,0.6)}
  h1{margin:0;font-size:22px}
  
  /* GRID FOR SQUARE BOXES */
  .game-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
    gap: 15px; 
    margin-top: 20px; 
  }
  
  .game-box {
    aspect-ratio: 1 / 1;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    padding: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }
  
  .game-box:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    background: rgba(46, 204, 113, 0.05);
  }

  .game-icon { font-size: 32px; margin-bottom: 10px; }
  .game-name { font-weight: 700; font-size: 14px; color: #fff; }

  /* COMMON UI */
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:20px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 20px;}
  .neu-btn { background:var(--accent); border-radius:8px; border:none; padding:12px; color:#061226; font-weight:700; cursor:pointer; width: 100%; margin-top: 15px;}
  select, input { background: #fff; color: #000; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; border:none; font-weight: 600;}
  
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }

  @media (max-width: 400px) {
    .game-grid { grid-template-columns: 1fr 1fr; } /* Force 2 columns on tiny screens */
  }
</style>
</head>
<body>

<div class="wrap">
  <header id="mainHeader">
    <div class="logo">G</div>
    <div>
      <h1 id="topTitle">Game Night</h1>
      <div id="topSubtitle" style="color:var(--muted); font-size:11px;">Track your victories</div>
    </div>
    <div style="flex:1"></div>
    <button id="homeBtn" class="game-box" style="width:40px; height:40px; aspect-ratio:auto; border-radius:10px; display:none;" onclick="location.reload()">🏠</button>
  </header>

  <section id="homeHub">
    <div class="card">
      <h2 style="margin:0; font-size:18px; text-align:center;">Choose Your Game</h2>
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')">
          <div class="game-icon">🏏</div>
          <div class="game-name">28 Game</div>
        </div>
        <div class="game-box" onclick="launchGame('Bluff')">
          <div class="game-icon">🃏</div>
          <div class="game-name">Bluff Game</div>
        </div>
        <div class="game-box" onclick="launchGame('UNO')">
          <div class="game-icon">🌈</div>
          <div class="game-name">UNO Game</div>
        </div>
      </div>
    </div>
  </section>

  <section id="gameArea" style="display:none;">
      </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = {
  apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc",
  authDomain: "bluff-tracker-7542e.firebaseapp.com",
  projectId: "bluff-tracker-7542e",
  storageBucket: "bluff-tracker-7542e.appspot.com",
  messagingSenderId: "280965687037",
  appId: "1:280965687037:web:be0b05da36ef653ab68094"
};
const SECRET_KEY = "zachariahrenji";
const PLAYERS = ["Rohan", "Roopa", "Annu", "Zach", "Rikku", "Megha", "Other"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gamesRef = collection(db, "games");

let currentMode = '';

window.launchGame = (mode) => {
    currentMode = mode;
    document.getElementById('homeHub').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('homeBtn').style.display = 'flex';
    document.getElementById('topTitle').innerText = mode + " Mode";
    
    if(mode === '28') {
        render28Module();
    } else {
        renderIndivSetup();
    }
}

function render28Module() {
    document.getElementById('gameArea').innerHTML = `
        <div class="card">
            <h3>28 Game Tracker</h3>
            <p style="color:var(--muted); font-size:13px;">Your series logic will be active here.</p>
            <button class="neu-btn" onclick="alert('Starting 28 series...')">New Series</button>
        </div>`;
}

function renderIndivSetup() {
    document.getElementById('gameArea').innerHTML = `
        <div class="card">
            <h3>${currentMode} Setup</h3>
            <label>Players Count</label>
            <select id="pCount" onchange="updatePlayerInputs()">
                <option value="2">2</option><option value="3">3</option>
                <option value="4" selected>4</option><option value="5">5</option>
            </select>
            <div id="pNamesList"></div>
            <button class="neu-btn" onclick="startPlay()">Start Playing</button>
        </div>`;
    updatePlayerInputs();
}

window.updatePlayerInputs = () => {
    const count = document.getElementById('pCount').value;
    const container = document.getElementById('pNamesList');
    container.innerHTML = '';
    for(let i=0; i<count; i++) {
        container.innerHTML += `
            <div style="display:flex; gap:10px;">
                <select id="sel${i}" onchange="checkOther(${i})">
                    ${PLAYERS.map(p => `<option value="${p}">${p}</option>`).join('')}
                </select>
                <input type="text" id="oth${i}" style="display:none" placeholder="Name">
            </div>`;
    }
}

window.checkOther = (i) => {
    const val = document.getElementById(`sel${i}`).value;
    document.getElementById(`oth${i}`).style.display = (val === 'Other') ? 'block' : 'none';
}

window.startPlay = () => {
    const count = document.getElementById('pCount').value;
    let players = [];
    for(let i=0; i<count; i++) {
        const sel = document.getElementById(`sel${i}`).value;
        const name = (sel === 'Other') ? document.getElementById(`oth${i}`).value : sel;
        players.push(name || "Player " + (i+1));
    }
    
    document.getElementById('gameArea').innerHTML = `
        <div class="card">
            <h3>${currentMode} Scoring</h3>
            <table>
                <thead><tr><th>Player</th><th>Win</th><th>Last</th></tr></thead>
                <tbody>
                    ${players.map(p => `
                        <tr>
                            <td><b>${p}</b></td>
                            <td><input type="radio" name="winner" value="${p}"></td>
                            <td><input type="radio" name="loser" value="${p}"></td>
                        </tr>`).join('')}
                </tbody>
            </table>
            <button class="neu-btn" onclick="submitGame('${players.join(',')}')">Save Result</button>
        </div>`;
}

window.submitGame = async (playerList) => {
    const winner = document.querySelector('input[name="winner"]:checked')?.value;
    const loser = document.querySelector('input[name="loser"]:checked')?.value;
    
    if(!winner || !loser) return alert("Select winner and last!");
    
    await addDoc(gamesRef, {
        gameType: currentMode,
        winner: winner,
        last: loser,
        time: new Date().toISOString(),
        secret: SECRET_KEY
    });
    alert("Saved! Winner: " + winner);
    location.reload();
}
</script>
</body>
</html>
