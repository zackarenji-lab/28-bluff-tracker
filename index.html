<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:15px auto;padding:15px;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:15px}
  .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;}
  h1{margin:0;font-size:16px;flex:1}
  
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:15px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 15px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  /* DASHBOARD TILES */
  .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
  .tile { background: var(--card); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; text-align: center; }
  .tile small { display: block; color: var(--muted); font-size: 8px; text-transform: uppercase; margin-bottom: 4px; }
  .tile .val { font-size: 14px; font-weight: 800; color: var(--gold); }

  /* ANALYTICS HEATMAP */
  .analytics-row { margin-bottom: 12px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; }
  .analytics-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
  .bar-container { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; display: flex; }
  .b-win { height: 100%; background: var(--accent); }
  .b-run { height: 100%; background: var(--info); }
  .b-last { height: 100%; background: var(--danger); }

  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .game-box { aspect-ratio: 1/1; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
  .game-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
  .game-name-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); color: #fff; font-size: 8px; font-weight: 800; padding: 4px 0; text-transform: uppercase; text-align: center; }

  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:8px 12px; color:#e6eef3; font-weight:700; cursor:pointer; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  .neu-btn.danger { color: var(--danger); border: 1px solid rgba(255,107,107,0.2); }
  .neu-btn.small { padding: 4px 8px; font-size: 9px; }

  select, input { background: #fff !important; color: #000 !important; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; border: none; font-size: 13px; box-sizing: border-box; }
  .score-val { font-size: 24px; font-weight: 800; color: var(--gold); }
  
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(12px); }
  .modal-box { background: #0b1622; padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
  
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <h1>Gaming Zone</h1>
    <button id="btn-overall" class="neu-btn small" onclick="switchView('OVERALL')">📊 Overall Stat</button>
    <button id="btn-home" class="neu-btn small" style="display:none" onclick="location.reload()">🏠 Home</button>
  </header>

  <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img"/>

  <section id="view-HOME">
    <div class="card">
      <h2 style="margin:0 0 10px 0; font-size:12px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')"><img src="28 button.png" alt="28"><div class="game-name-overlay">28 Game</div></div>
        <div class="game-box" onclick="launchGame('Bluff')"><img src="bluff button.png" alt="Bluff"><div class="game-name-overlay">Bluff</div></div>
        <div class="game-box" onclick="launchGame('UNO')"><img src="uno button.png" alt="UNO"><div class="game-name-overlay">UNO</div></div>
      </div>
    </div>
  </section>

  <section id="view-28" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size:16px;">Active Series</h2>
        <button class="neu-btn small" onclick="openDeepStats('28')">📊 Stats</button>
      </div>
      <div id="list-28"></div>
      <button class="neu-btn primary" style="width:100%; margin-top:10px;" onclick="newSeries28()">➕ New Series</button>
    </div>
  </section>

  <section id="view-INDIV" style="display:none;">
    <div class="card" id="pane-setup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="indiv-title" style="margin:0; font-size:16px;">Setup</h3>
            <button class="neu-btn small" onclick="openDeepStats(window.activeMode)">📊 Stats</button>
        </div>
        <input type="number" id="pCnt" min="3" max="10" placeholder="Number of players (3-10)" oninput="drawPlayerInputs()">
        <div id="pInputs"></div>
        <button id="btn-start" class="neu-btn primary" style="width:100%; display:none; margin-top:10px" onclick="goScoring()">Start Playing</button>
    </div>
    <div class="card" id="pane-play" style="display:none;">
        <h3 style="font-size:16px; margin-bottom:10px;">Live Scoring</h3>
        <table><thead><tr><th>Player</th><th>Win 🏆</th><th>Last 💩</th></tr></thead><tbody id="table-score"></tbody></table>
        <button class="neu-btn primary" style="width:100%; margin-top:15px" onclick="saveIndiv()">Save Result</button>
    </div>
  </section>

  <section id="view-OVERALL" style="display:none;">
    <div class="card">
        <h2 style="margin:0 0 15px 0; font-size:16px; text-align:center;">Analytics Hub</h2>
        <div id="summary-tiles"></div>
        <button class="neu-btn danger" style="width:100%; margin-top:15px" onclick="resetAllData()">⚠️ Emergency Reset</button>
    </div>
  </section>
</div>

<div id="modal-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const PLRS = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];
const TMS = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gRef = collection(db, "games");
let allG = [];
window.activeMode = '';

window.switchView = (v) => {
    ['HOME','28','INDIV','OVERALL'].forEach(id => document.getElementById('view-'+id).style.display = (id === v ? 'block' : 'none'));
    document.getElementById('btn-home').style.display = (v === 'HOME' ? 'none' : 'block');
    document.getElementById('btn-overall').style.display = (v === 'HOME' ? 'block' : 'none');
    if(v === 'OVERALL') renderGlobalTiles();
};

window.launchGame = (m) => { window.activeMode = m; switchView(m==='28'?'28':'INDIV'); if(m!=='28') resetSetup(); };

function resetSetup() {
    document.getElementById('indiv-title').innerText = window.activeMode + ' Setup';
    document.getElementById('pCnt').value = ""; document.getElementById('pInputs').innerHTML = "";
    document.getElementById('btn-start').style.display = "none";
    document.getElementById('pane-setup').style.display = "block";
    document.getElementById('pane-play').style.display = "none";
}

// UNO / BLUFF PLAYER SELECTION (EXCLUSION LOGIC)
window.drawPlayerInputs = () => {
    const val = document.getElementById('pCnt').value;
    const cnt = parseInt(val);
    const container = document.getElementById('pInputs');
    container.innerHTML = "";
    if(!val || cnt < 3 || cnt > 10) { document.getElementById('btn-start').style.display="none"; return; }
    for(let i=0; i<cnt; i++) {
        container.innerHTML += `<select id="s${i}" onchange="refreshExclusion()"><option value="" selected disabled>Select Player ${i+1}</option>${PLRS.map(p=>`<option value="${p}">${p}</option>`).join('')}<option value="Custom">Custom Name</option></select><input type="text" id="cust-${i}" style="display:none" placeholder="Enter Name...">`;
    }
    document.getElementById('btn-start').style.display="block";
};

window.refreshExclusion = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const used = [];
    for(let i=0; i<cnt; i++) {
        const v = document.getElementById(`s${i}`).value;
        if(v && v !== "Custom") used.push(v);
        document.getElementById(`cust-${i}`).style.display = (v === "Custom" ? "block" : "none");
    }
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`s${i}`);
        const current = sel.value;
        Array.from(sel.options).forEach(opt => {
            if(opt.value && opt.value !== "Custom") opt.disabled = used.includes(opt.value) && current !== opt.value;
        });
    }
};

window.goScoring = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const body = document.getElementById('table-score'); body.innerHTML = "";
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`s${i}`).value;
        const name = (sel === 'Custom' ? document.getElementById(`cust-${i}`).value : sel);
        if(!name) return alert("Fill all names");
        body.innerHTML += `<tr><td><b>${name}</b></td><td><input type="radio" name="win" value="${name}"></td><td><input type="radio" name="lost" value="${name}"></td></tr>`;
    }
    document.getElementById('pane-setup').style.display="none"; document.getElementById('pane-play').style.display="block";
};

window.saveIndiv = async () => {
    const w = document.querySelector('input[name="win"]:checked')?.value;
    const l = document.querySelector('input[name="lost"]:checked')?.value;
    if(!w || !l || w===l) return alert("Select unique Win & Last");
    const run = []; document.querySelectorAll('#table-score tr').forEach(r => {
        const n = r.cells[0].innerText; if(n!==w && n!==l) run.push(n);
    });
    await addDoc(gRef, { gameType: activeMode, winner: w, last: l, runnersUp: run, time: new Date().toISOString(), secret: PASS });
    location.reload();
};

// 28 SERIES
window.newSeries28 = () => {
    const o = TMS.map(t => `<option value="${t}">${t}</option>`).join("");
    const h = `<div class="modal-box"><h3>28 Setup</h3>
        <select id="mTarget"><option value="5">First to 5</option><option value="10">First to 10</option></select>
        <select id="mT1" onchange="filterT2()"><option value="" selected disabled>Team 1</option>${o}</select>
        <select id="mT2"><option value="" selected disabled>Team 2</option>${o}</select>
        <button class="neu-btn primary" style="width:100%; margin-top:10px" onclick="confirm28()">Start</button>
        <button class="neu-btn" style="width:100%; margin-top:10px" onclick="closeModal()">Close</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
};

window.filterT2 = () => {
    const t1 = document.getElementById('mT1').value;
    const t2Sel = document.getElementById('mT2');
    const members = t1.split(' & ');
    Array.from(t2Sel.options).forEach(opt => {
        if(!opt.value) return;
        opt.disabled = members.some(m => opt.value.includes(m));
    });
};

window.confirm28 = async () => {
    const t1 = document.getElementById('mT1').value, t2 = document.getElementById('mT2').value, target = document.getElementById('mTarget').value;
    if(!t1 || !t2) return alert("Select teams");
    await addDoc(gRef, { seriesId: "s_"+Date.now(), isInit: true, teamA: t1, teamB: t2, seriesTarget: parseInt(target), time: new Date().toISOString(), secret: PASS });
    closeModal();
};

window.render28 = () => {
    const seriesMap = {};
    allG.filter(g => !g.gameType || g.gameType === '28').forEach(g => {
        if (!seriesMap[g.seriesId]) seriesMap[g.seriesId] = { id: g.seriesId, target: 5, wins: {}, teamA: '', teamB: '', stop: false };
        const s = seriesMap[g.seriesId];
        if (g.isInit) { s.teamA = g.teamA; s.teamB = g.teamB; s.target = g.seriesTarget || 5; }
        else if (g.manualEnd) s.stop = true;
        else if (g.winner) s.wins[g.winner] = (s.wins[g.winner] || 0) + 1;
    });
    const active = Object.values(seriesMap).filter(s => s.teamA && !s.stop && !Object.values(s.wins).some(w => w >= s.target));
    const list = document.getElementById('list-28'); if(!list) return; list.innerHTML = "";
    active.forEach(s => {
        const wA = s.wins[s.teamA] || 0, wB = s.wins[s.teamB] || 0;
        list.innerHTML += `<div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
                <div style="text-align:center; flex:1"><b>${s.teamA}</b><div class="score-val">${wA}</div></div>
                <div style="font-weight:900; color:var(--muted); padding:0 10px;">VS</div>
                <div style="text-align:center; flex:1"><b>${s.teamB}</b><div class="score-val">${wB}</div></div>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="neu-btn primary" style="flex:1" onclick="score28('${s.id}','${s.teamA}','${s.teamB}')">Win ${s.teamA.split(' ')[0]}</button>
                <button class="neu-btn primary" style="flex:1; background:var(--gold)" onclick="score28('${s.id}','${s.teamB}','${s.teamA}')">Win ${s.teamB.split(' ')[0]}</button>
                <button class="neu-btn danger" onclick="stop28('${s.id}')">STOP</button>
            </div></div>`;
    });
};

window.score28 = async (id, w, l) => { await addDoc(gRef, { seriesId: id, winner: w, loser: l, time: new Date().toISOString(), secret: PASS }); };
window.stop28 = async (id) => { if(prompt("Password:")===PASS) await addDoc(gRef, { seriesId: id, manualEnd: true, time: new Date().toISOString(), secret: PASS }); };

// POWER BI STYLE STATS
window.openStats = (m) => {
    const data = allG.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner);
    const st = {};
    data.forEach(g => {
        const win = g.winner; const lost = g.last || g.loser;
        [win, lost, ...(g.runnersUp || [])].forEach(p => { if(!st[p]) st[p] = {w:0, l:0, r:0, t:0} });
        st[win].w++; st[lost].l++; st[win].t++; st[lost].t++; (g.runnersUp || []).forEach(p => { st[p].r++; st[p].t++; });
    });

    const mvp = Object.keys(st).sort((a,b) => st[b].w - st[a].w)[0] || '—';
    const target = Object.keys(st).sort((a,b) => st[b].l - st[a].l)[0] || '—';
    const ghost = Object.keys(st).sort((a,b) => st[b].r - st[a].r)[0] || '—';

    let h = `<div class="modal-box"><h3>${m} Dashboard</h3>
        <div class="dash-grid">
            <div class="tile"><small>🥇 WIN KING</small><div class="val">${mvp}</div></div>
            <div class="tile"><small>💩 LAST KING</small><div class="val">${target}</div></div>
            <div class="tile"><small>👻 THE GHOST</small><div class="val">${ghost}</div></div>
            <div class="tile"><small>🎮 TOTAL</small><div class="val">${data.length}</div></div>
        </div>
        <h4>Performance Bars</h4>`;
    
    Object.entries(st).sort((a,b) => b[1].w - a[1].w).forEach(([n, d]) => {
        const wP = (d.w/d.t)*100, rP = (d.r/d.t)*100, lP = (d.l/d.t)*100;
        h += `<div class="analytics-row">
            <div class="analytics-meta"><span><b>${n}</b></span><span>${Math.round(wP)}% Win Rate</span></div>
            <div class="bar-container"><div class="b-win" style="width:${wP}%"></div><div class="b-run" style="width:${rP}%"></div><div class="b-last" style="width:${lP}%"></div></div>
        </div>`;
    });
    
    h += `<h4 style="margin-top:20px;">History</h4>`;
    data.slice(-8).reverse().forEach(g => h += `<div style="font-size:10px; padding:6px 0; border-bottom:1px solid #ffffff10">🏆 ${g.winner} | 💩 ${g.last||g.loser}</div>`);
    h += `<button class="neu-btn primary" style="width:100%; margin-top:20px" onclick="closeModal()">Close</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
};

window.renderGlobalTiles = () => {
    const f = (m) => allG.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner).length;
    document.getElementById('summary-tiles').innerHTML = `
        <div class="stats-tile" onclick="openStats('28')">🏏 <b>28</b> - ${f('28')} Series</div>
        <div class="stats-tile" onclick="openStats('Bluff')">🃏 <b>Bluff</b> - ${f('Bluff')} Rounds</div>
        <div class="stats-tile" onclick="openStats('UNO')">🌈 <b>UNO</b> - ${f('UNO')} Rounds</div>`;
};

window.closeModal = () => document.getElementById('modal-container').innerHTML = "";

onSnapshot(query(gRef, orderBy("time")), snap => {
    allG = snap.docs.map(d => d.data());
    render28();
    if(document.getElementById('view-OVERALL').style.display === 'block') renderGlobalTiles();
});

window.resetAllData = async () => { if(prompt("Reset?")===PASS) { const s = await getDocs(gRef); s.forEach(d => deleteDoc(d.ref)); location.reload(); } };
</script>
</body>
</html>
