<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:22px auto;padding:20px;}
  
  header{display:flex;align-items:center;gap:15px;margin-bottom:18px}
  .logo{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;box-shadow:0 8px 28px rgba(0,0,0,0.6)}
  h1{margin:0;font-size:22px}
  .subtitle{color:var(--muted);font-size:11px;margin-top:2px}

  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:20px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 20px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

  /* GAME GRID & BOXES (HORIZONTAL 3 SQUARES) */
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
  .game-box {
    aspect-ratio: 1 / 1;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    padding: 8px;
  }
  .game-box:hover { transform: translateY(-3px); border-color: var(--accent); background: rgba(46, 204, 113, 0.05); }
  .game-icon { font-size: 26px; margin-bottom: 6px; }
  .game-name { font-weight: 700; font-size: 11px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }

  /* UI HELPERS */
  .neu-btn { background:var(--accent); border-radius:8px; border:none; padding:12px; color:#061226; font-weight:700; cursor:pointer; width: 100%; margin-top: 15px;}
  select, input { background: #fff !important; color: #000 !important; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; border:none; font-weight: 600;}
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }

  @media (max-width: 450px) {
    .game-icon { font-size: 22px; }
    .game-name { font-size: 9px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <div>
      <h1 id="topTitle">Gaming Zone</h1>
      <div id="topSubtitle" style="color:var(--muted); font-size:11px;">Elite Victory Tracking</div>
    </div>
    <div style="flex:1"></div>
    <button id="homeBtn" style="background:none; border:none; color:white; font-size:24px; cursor:pointer; display:none;" onclick="location.reload()">🏠</button>
  </header>

  <section id="homeHub">
    <div class="card">
      <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img" onerror="this.style.display='none'"/>
      
      <h2 style="margin:0; font-size:16px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')">
          <div class="game-icon">🏏</div>
          <div class="game-name">28 Game</div>
        </div>
        <div class="game-box" onclick="launchGame('Bluff')">
          <div class="game-icon">🃏</div>
          <div class="game-name">Bluff</div>
        </div>
        <div class="game-box" onclick="launchGame('UNO')">
          <div class="game-icon">🌈</div>
          <div class="game-name">UNO</div>
        </div>
      </div>
    </div>
  </section>

  <section id="gameArea" style="display:none;"></section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = {
  apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc",
  authDomain: "bluff-tracker-7542e.firebaseapp.com",
  projectId: "bluff-tracker-7542e",
  storageBucket: "bluff-tracker-7542e.appspot.com",
  messagingSenderId: "280965687037",
  appId: "1:280965687037:web:be0b05da36ef653ab68094"
};
const SECRET_KEY = "zachariahrenji";
const PLAYER_NAMES = ["Rohan", "Roopa", "Annu", "Zach", "Rikku", "Megha", "Other"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gamesRef = collection(db, "games");

let currentMode = '';

window.launchGame = (mode) => {
    currentMode = mode;
    document.getElementById('homeHub').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('homeBtn').style.display = 'block';
    document.getElementById('topTitle').innerText = mode + " Zone";
    
    if(mode === '28') {
        render28Module();
    } else {
        renderIndivSetup();
    }
}

function render28Module() {
    document.getElementById('gameArea').innerHTML = `
        <div class="card">
            <h3>28 Game Tracker</h3>
            <p style="color:var(--muted); font-size:13px;">Team Series logic is live.</p>
            <button class="neu-btn" onclick="alert('Proceeding to 28 Series...')">Open Series List</button>
        </div>`;
}

function renderIndivSetup() {
    document.getElementById('gameArea').innerHTML = `
        <div class="card">
            <h3>${currentMode} Setup</h3>
            <label>Players Count</label>
            <select id="pCount" onchange="updateInputs()">
                <option value="2">2</option><option value="3">3</option>
                <option value="4" selected>4</option><option value="5">5</option>
                <option value="6">6</option>
            </select>
            <div id="pNamesList"></div>
            <button class="neu-btn" onclick="startPlay()">Start Playing</button>
        </div>`;
    updateInputs();
}

window.updateInputs = () => {
    const count = document.getElementById('pCount').value;
    const container = document.getElementById('pNamesList');
    container.innerHTML = '';
    for(let i=0; i<count; i++) {
        container.innerHTML += `
            <div style="display:flex; gap:10px; margin-top:5px;">
                <select id="sel${i}" onchange="checkOther(${i})">
                    ${PLAYER_NAMES.map(p => `<option value="${p}">${p}</option>`).join('')}
                </select>
                <input type="text" id="oth${i}" style="display:none" placeholder="Name">
            </div>`;
    }
}

window.checkOther = (i) => {
    const val = document.getElementById(`sel${i}`).value;
    document.getElementById(`oth${i}`).style.display = (val === 'Other') ? 'block' : 'none';
}

window.startPlay = () => {
    const count = document.getElementById('pCount').value;
    let players = [];
    for(let i=0; i<count; i++) {
        const sel = document.getElementById(`sel${i}`).value;
        const name = (sel === 'Other') ? document.getElementById(`oth${i}`).value : sel;
        players.push(name || "Player " + (i+1));
    }
    
    document.getElementById('gameArea').innerHTML = `
        <div class="card">
            <h3>${currentMode} Scoring</h3>
            <table>
                <thead><tr><th>Player</th><th>Win</th><th>Last</th></tr></thead>
                <tbody>
                    ${players.map(p => `
                        <tr>
                            <td><b>${p}</b></td>
                            <td><input type="radio" name="winner" value="${p}"></td>
                            <td><input type="radio" name="loser" value="${p}"></td>
                        </tr>`).join('')}
                </tbody>
            </table>
            <button class="neu-btn" onclick="submitGame()">Save Result</button>
        </div>`;
}

window.submitGame = async () => {
    const win = document.querySelector('input[name="winner"]:checked')?.value;
    const lost = document.querySelector('input[name="loser"]:checked')?.value;
    if(!win || !lost) return alert("Select winner and last!");
    
    await addDoc(gamesRef, {
        gameType: currentMode,
        winner: win,
        last: lost,
        time: new Date().toISOString(),
        secret: SECRET_KEY
    });
    alert("Saved!");
    location.reload();
}
</script>
</body>
</html>
