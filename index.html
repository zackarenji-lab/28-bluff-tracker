<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone - Command Center</title>
<style>
  :root {
    --bg:#050b18; --card:rgba(255,255,255,0.03); --glass:rgba(255,255,255,0.05);
    --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info:#3498db; --muted:#9fb7bf;
  }
  body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:#fff; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  .wrap { max-width:900px; margin:auto; padding:15px; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .logo { font-weight:900; font-size:20px; letter-spacing:-1px; background:linear-gradient(to right, #ff6b6b, #ffd36d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  
  /* GLASS CARDS */
  .glass { background:var(--glass); backdrop-filter:blur(15px); border-radius:20px; border:1px solid rgba(255,255,255,0.08); padding:20px; margin-bottom:15px; box-shadow:0 10px 30px rgba(0,0,0,0.4); }
  
  /* PODIUM */
  .podium { display:grid; grid-template-columns: 1fr 1.2fr 1fr; gap:10px; align-items:flex-end; margin-bottom:25px; text-align:center; }
  .podium-item { background:var(--card); border-radius:15px; padding:15px 5px; border:1px solid rgba(255,255,255,0.05); }
  .podium-item.first { border-color:var(--gold); box-shadow:0 0 20px rgba(255,211,109,0.1); padding-top:25px; }
  .p-rank { font-size:10px; color:var(--muted); text-transform:uppercase; font-weight:800; }
  .p-name { font-size:14px; font-weight:900; display:block; margin:5px 0; color:var(--gold); }
  .p-pts { font-size:11px; font-weight:700; opacity:0.8; }

  /* TABS */
  .tab-bar { display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px; }
  .tab { padding:8px 15px; border-radius:20px; background:rgba(255,255,255,0.05); font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; border:1px solid transparent; }
  .tab.active { background:var(--accent); color:#000; }

  /* LEADERBOARD */
  .leader-row { display:flex; align-items:center; gap:12px; padding:12px; background:rgba(255,255,255,0.02); border-radius:12px; margin-bottom:8px; }
  .l-rank { font-weight:900; color:var(--muted); font-size:12px; width:15px; }
  .l-name { flex:1; font-weight:700; font-size:13px; }
  .l-pts { font-weight:800; color:var(--accent); font-size:13px; }
  .progress { flex:1; height:4px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.5s; }

  /* H2H RIVALRY */
  .h2h { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px; }
  .h2h-res { grid-column: span 2; background:rgba(0,0,0,0.2); padding:15px; border-radius:12px; margin-top:10px; text-align:center; }
  
  /* BUTTONS */
  .btn { padding:10px 15px; border-radius:12px; border:none; font-weight:800; font-size:11px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
  .btn.gold { background:var(--gold); color:#000; }
  .btn.primary { background:var(--accent); color:#000; }
  .btn.danger { background:var(--danger); color:#fff; }
  .btn.small { padding:5px 10px; font-size:9px; }

  select, input { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.1); padding:10px; border-radius:10px; width:100%; font-size:12px; outline:none; }
  table { width:100%; border-collapse:collapse; }
  th, td { padding:10px; text-align:left; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.05); }
  .hero-img { width:100%; border-radius:20px; margin-bottom:20px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GAMING ZONE</div>
    <div>
        <button id="nav-home" class="btn primary small" onclick="switchView('HOME')">🎮 Play</button>
        <button id="nav-dash" class="btn gold small" onclick="switchView('DASH')">📊 Dashboard</button>
    </div>
  </header>

  <section id="view-HOME">
    <img src="bluffmasters.png" class="hero-img">
    <div class="glass">
      <h2 style="font-size:16px; margin:0 0 15px 0;">Start Game</h2>
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
        <div class="game-box" onclick="launch('28')" style="text-align:center; cursor:pointer; background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; border:1px solid rgba(255,255,255,0.08);">28</div>
        <div class="game-box" onclick="launch('Bluff')" style="text-align:center; cursor:pointer; background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; border:1px solid rgba(255,255,255,0.08);">BLUFF</div>
        <div class="game-box" onclick="launch('UNO')" style="text-align:center; cursor:pointer; background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; border:1px solid rgba(255,255,255,0.08);">UNO</div>
      </div>
    </div>
    
    <div id="pane-entry" style="display:none;" class="glass">
      <h3 id="entry-title">Setup</h3>
      <input type="number" id="pCnt" placeholder="Players (3-10)" oninput="drawInputs()">
      <div id="pInputs"></div>
      <button id="btn-start" class="btn primary" style="width:100%; display:none;" onclick="goRank()">Start Tournament</button>
      
      <div id="pane-rank" style="display:none; margin-top:20px;">
        <div id="lBadge" style="font-size:10px; font-weight:900; color:var(--accent); margin-bottom:10px;"></div>
        <table><tbody id="rank-tbody"></tbody></table>
        <button class="btn primary" style="width:100%; margin-top:15px" onclick="saveMatch()">Finish & Save</button>
      </div>
    </div>
  </section>

  <section id="view-DASH" style="display:none;">
    <div class="tab-bar">
        <div class="tab active" onclick="setDashGame('UNO', this)">UNO</div>
        <div class="tab" onclick="setDashGame('Bluff', this)">BLUFF</div>
        <div class="tab" onclick="setDashGame('28', this)">28 GAME</div>
    </div>

    <div class="podium" id="podium-area"></div>

    <div class="glass">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0; font-size:14px;">Leaderboard</h3>
        <select id="lineup-filter" style="width:auto; padding:5px 10px;" onchange="renderDashboard()">
            <option value="ALL">All Groups</option>
        </select>
      </div>
      <div id="leaderboard-list"></div>
    </div>

    <div class="glass">
      <h3 style="margin:0 0 15px 0; font-size:14px;">⚔️ Rivalry Matrix</h3>
      <div class="h2h">
        <select id="h2h1" onchange="runH2H()"><option value="">Select Player 1</option></select>
        <select id="h2h2" onchange="runH2H()"><option value="">Select Player 2</option></select>
      </div>
      <div id="h2h-res" class="h2h-res">Pick two players to see their history...</div>
    </div>

    <div class="glass">
      <h3 style="margin:0 0 15px 0; font-size:14px;">Recent History</h3>
      <div id="history-log"></div>
      <button class="btn danger small" style="width:100%; margin-top:20px;" onclick="wipeGame()">⚠️ Reset Current Game Data</button>
    </div>
  </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const PLRS = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];
const LINEUPS = {
    "annu-megha-rikku-rohan-roopa-zach": { "UNO": "UNO Legends", "Bluff": "Bluff Legends" },
    "annu-bibin-bimal-megha-rikku-zach": { "UNO": "UNO Masters", "Bluff": "Bluff Masters" }
};

const app = initializeApp(CONF);
const db = getFirestore(app);
const gRef = collection(db, "games");
let allG = [];
window.activeMode = '';
window.dashMode = 'UNO';

window.switchView = (v) => {
    document.getElementById('view-HOME').style.display = (v === 'HOME' ? 'block' : 'none');
    document.getElementById('view-DASH').style.display = (v === 'DASH' ? 'block' : 'none');
    document.getElementById('nav-home').classList.toggle('primary', v==='HOME');
    document.getElementById('nav-dash').classList.toggle('gold', v==='DASH');
    if(v === 'DASH') renderDashboard();
};

window.launch = (m) => {
    activeMode = m;
    document.getElementById('pane-entry').style.display = 'block';
    document.getElementById('entry-title').innerText = m + ' Setup';
    document.getElementById('pCnt').value = "";
    document.getElementById('pInputs').innerHTML = "";
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('pane-rank').style.display = 'none';
};

window.drawInputs = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const container = document.getElementById('pInputs'); container.innerHTML = "";
    if(cnt < 3 || cnt > 10) return;
    for(let i=0; i<cnt; i++) {
        container.innerHTML += `<select id="ps-${i}" onchange="checkDupes()"><option value="" disabled selected>Player ${i+1}</option>${PLRS.map(p=>`<option value="${p}">${p}</option>`).join('')}</select>`;
    }
    document.getElementById('btn-start').style.display = 'block';
};

window.checkDupes = () => {
    const sel = Array.from(document.querySelectorAll('#pInputs select')).map(s => s.value);
    document.querySelectorAll('#pInputs select').forEach(s => {
        Array.from(s.options).forEach(opt => opt.disabled = sel.includes(opt.value) && s.value !== opt.value);
    });
};

window.goRank = () => {
    const names = Array.from(document.querySelectorAll('#pInputs select')).map(s => s.value);
    if(names.some(n=>!n)) return alert("Select all players");
    const key = names.map(n=>n.toLowerCase()).sort().join('-');
    document.getElementById('lBadge').innerText = (LINEUPS[key] && LINEUPS[key][activeMode]) ? LINEUPS[key][activeMode] : "Casual Tournament";
    
    const tbody = document.getElementById('rank-tbody'); tbody.innerHTML = "";
    names.forEach(n => {
        tbody.innerHTML += `<tr><td><b>${n}</b></td><td><select class="r-val" data-name="${n}">
            <option value="99" selected>Other (1 Pt)</option>
            <option value="1">1st (10 Pts)</option><option value="2">2nd (5 Pts)</option>
            ${names.length > 3 ? '<option value="3">3rd (3 Pts)</option>' : ''}
            <option value="0">Last (0 Pts)</option>
        </select></td></tr>`;
    });
    document.getElementById('pane-setup').style.display = 'none';
    document.getElementById('pane-rank').style.display = 'block';
};

window.saveMatch = async () => {
    const players = []; let win = '', last = '';
    document.querySelectorAll('.r-val').forEach(s => {
        const r = parseInt(s.value); const name = s.getAttribute('data-name');
        let pts = 1; if(r===1){pts=10; win=name;} else if(r===2) pts=5; else if(r===3) pts=3; else if(r===0){pts=0; last=name;}
        players.push({name, rank:r, pts});
    });
    if(!win || !last) return alert("Select 1st and Last!");
    const lName = document.getElementById('lBadge').innerText;
    await addDoc(gRef, { gameType: activeMode, lineupName: lName, players, winner: win, last, time: new Date().toISOString(), secret: PASS });
    if(confirm("Saved! Play another match?")) { document.querySelectorAll('.r-val').forEach(s=>s.value="99"); }
    else { switchView('HOME'); }
};

// DASHBOARD CORE
window.setDashGame = (m, el) => {
    dashMode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderDashboard();
};

window.renderDashboard = () => {
    const lFilter = document.getElementById('lineup-filter').value;
    const data = allG.filter(g => (dashMode==='28' ? (!g.gameType || g.gameType==='28') : g.gameType === dashMode) && g.winner);
    
    // Update Lineup Filter Options
    const lineups = [...new Set(data.map(g => g.lineupName))].filter(Boolean);
    const filterEl = document.getElementById('lineup-filter');
    const curVal = filterEl.value;
    filterEl.innerHTML = `<option value="ALL">All Combined</option>` + lineups.map(l => `<option value="${l}" ${l===curVal?'selected':''}>${l}</option>`).join('');

    const filtered = lFilter === 'ALL' ? data : data.filter(g => g.lineupName === lFilter);
    const stats = {};
    filtered.forEach(g => {
        const pList = g.players || [{name: g.winner, pts:10, rank:1}, {name: g.last, pts:0, rank:0}];
        pList.forEach(p => {
            if(!stats[p.name]) stats[p.name] = {pts:0, w:0, t:0};
            stats[p.name].pts += (p.pts || 0); stats[p.name].t++; if(p.rank===1) stats[p.name].w++;
        });
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);
    
    // Render Podium
    const podium = document.getElementById('podium-area');
    podium.innerHTML = "";
    if(sorted.length >= 2) {
        podium.innerHTML = `
            <div class="podium-item">
                <div class="p-rank">#2</div><span class="p-name">${sorted[1]}</span><span class="p-pts">${stats[sorted[1]].pts} Pts</span>
            </div>
            <div class="podium-item first">
                <div class="p-rank">👑 Champion</div><span class="p-name">${sorted[0]}</span><span class="p-pts">${stats[sorted[0]].pts} Pts</span>
            </div>
            <div class="podium-item">
                <div class="p-rank">#3</div><span class="p-name">${sorted[2]||'—'}</span><span class="p-pts">${sorted[2]?stats[sorted[2]].pts:'0'} Pts</span>
            </div>`;
    }

    // Render List
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = sorted.map((n, i) => `
        <div class="leader-row">
            <div class="l-rank">${i+1}</div>
            <div class="l-name">${n}</div>
            <div class="progress"><div class="progress-fill" style="width:${(stats[n].w/stats[n].t)*100}%"></div></div>
            <div class="l-pts">${stats[n].pts}</div>
        </div>`).join('');

    // Update H2H Player Selects
    ['h2h1', 'h2h2'].forEach(id => {
        const s = document.getElementById(id); const val = s.value;
        s.innerHTML = `<option value="">Select Player</option>` + sorted.map(n => `<option value="${n}" ${n===val?'selected':''}>${n}</option>`).join('');
    });

    // History Log
    document.getElementById('history-log').innerHTML = filtered.slice(-5).reverse().map(g => `
        <div class="log-item">
            <div style="font-size:10px;">${new Date(g.time).toLocaleDateString()} - 🏆 ${g.winner}</div>
            <button class="btn danger small" style="padding:2px 5px;" onclick="wipeRound('${g.time}')">🗑️</button>
        </div>`).join('');
};

window.runH2H = () => {
    const p1 = document.getElementById('h2h1').value;
    const p2 = document.getElementById('h2h2').value;
    if(!p1 || !p2 || p1 === p2) return;
    const filtered = allG.filter(g => g.gameType === dashMode);
    let p1W = 0, p2W = 0, p1L = 0, p2L = 0, common = 0;
    filtered.forEach(g => {
        const names = (g.players||[]).map(p=>p.name);
        if(names.includes(p1) && names.includes(p2)) {
            common++; if(g.winner === p1) p1W++; if(g.winner === p2) p2W++;
            if(g.last === p1) p1L++; if(g.last === p2) p2L++;
        }
    });
    document.getElementById('h2h-res').innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="text-align:left;"><b>${p1}</b><br><small>${p1W} Wins | ${p1L} 💩</small></div>
            <div style="font-size:10px; color:var(--muted)">vs<br>${common} Match</div>
            <div style="text-align:right;"><b>${p2}</b><br><small>${p2W} Wins | ${p2L} 💩</small></div>
        </div>`;
};

window.wipeRound = async (t) => {
    if(prompt("Delete Password:") !== PASS) return;
    const snap = await getDocs(query(gRef, where("time", "==", t)));
    snap.forEach(async d => await deleteDoc(d.ref));
};

window.wipeGame = async () => {
    if(prompt("Reset " + dashMode + " Password:") !== PASS) return;
    const snap = await getDocs(query(gRef, where("gameType", "==", dashMode)));
    snap.forEach(async d => await deleteDoc(d.ref));
};

onSnapshot(query(gRef, orderBy("time")), snap => {
    allG = snap.docs.map(d => d.data());
    renderDashboard();
    render28();
});
</script>
</body>
</html>
