<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Game Entry</title>
<style>
  :root { --bg1:#061226; --bg2:#081b31; --card:#0e2336; --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db; }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;}
  .wrap{max-width:800px;margin:15px auto;padding:15px;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:15px}
  .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;}
  h1{margin:0;font-size:16px;flex:1}
  .nav-link { font-size: 10px; font-weight: 800; color: var(--gold); text-decoration: none; text-transform: uppercase; border: 1px solid rgba(255, 211, 109, 0.3); padding: 6px 12px; border-radius: 20px; background: rgba(255, 255, 255, 0.05); }
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:15px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 15px;}
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .game-box { aspect-ratio: 1/1; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
  .game-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:10px 12px; color:#e6eef3; font-weight:700; cursor:pointer; font-size: 11px; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  select, input { background: #fff !important; color: #000 !important; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; border: none; font-size: 13px; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <h1>Gaming Zone</h1>
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
  </header>

  <img src="bluffmasters.png" style="width:100%; border-radius:10px; margin-bottom:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">

  <section id="view-HOME">
    <div class="card">
      <div class="game-grid">
        <div class="game-box" onclick="launch('28')"><img src="28 button.png"><div style="position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.7);font-size:8px;text-align:center;padding:3px 0;">28</div></div>
        <div class="game-box" onclick="launch('Bluff')"><img src="bluff button.png"><div style="position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.7);font-size:8px;text-align:center;padding:3px 0;">BLUFF</div></div>
        <div class="game-box" onclick="launch('UNO')"><img src="uno button.png"><div style="position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.7);font-size:8px;text-align:center;padding:3px 0;">UNO</div></div>
      </div>
    </div>
  </section>

  <section id="view-PLAY" style="display:none;">
    <div class="card" id="pane-setup">
        <h3 id="game-title">Setup</h3>
        <input type="number" id="pCnt" placeholder="Players (3-10)" oninput="draw()">
        <div id="pInputs"></div>
        <button id="btn-start" class="neu-btn primary" style="width:100%; display:none;" onclick="goRank()">Enter Tournament</button>
    </div>
    <div class="card" id="pane-rank" style="display:none;">
        <div id="lBadge" style="background:var(--info); color:#fff; padding:2px 8px; border-radius:4px; font-size:10px; margin-bottom:10px; display:inline-block;"></div>
        <table><tbody id="table-body"></tbody></table>
        <button class="neu-btn primary" style="width:100%; margin-top:15px" onclick="save()">Finish Match</button>
    </div>
    <button class="neu-btn" style="width:100%; margin-top:10px;" onclick="location.reload()">🏠 Cancel</button>
  </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const PLRS = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];
const LINEUPS = { "annu-megha-rikku-rohan-roopa-zach": { "UNO": "UNO Legends", "Bluff": "Bluff Legends" }, "annu-bibin-bimal-megha-rikku-zach": { "UNO": "UNO Masters", "Bluff": "Bluff Masters" } };

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gRef = collection(db, "games");
let activeMode = '';

window.launch = (m) => {
    activeMode = m;
    document.getElementById('view-HOME').style.display = 'none';
    document.getElementById('view-PLAY').style.display = 'block';
    document.getElementById('game-title').innerText = m + ' Setup';
};

window.draw = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const container = document.getElementById('pInputs'); container.innerHTML = "";
    if(cnt < 3 || cnt > 10) return;
    for(let i=0; i<cnt; i++) {
        container.innerHTML += `<select id="ps-${i}"><option value="" disabled selected>Player ${i+1}</option>${PLRS.map(p=>`<option value="${p}">${p}</option>`).join('')}<option value="Custom">Custom</option></select><input type="text" id="pc-${i}" style="display:none" placeholder="Enter Name">`;
        container.lastChild.previousSibling.onchange = (e) => document.getElementById(`pc-${i}`).style.display = e.target.value === 'Custom' ? 'block' : 'none';
    }
    document.getElementById('btn-start').style.display = "block";
};

window.goRank = () => {
    const names = Array.from(document.querySelectorAll('#pInputs select')).map((s,i) => s.value === 'Custom' ? document.getElementById(`pc-${i}`).value : s.value);
    if(names.some(n=>!n)) return alert("Select all players");
    const key = names.map(n=>n.toLowerCase()).sort().join('-');
    document.getElementById('lBadge').innerText = (LINEUPS[key] && LINEUPS[key][activeMode]) ? LINEUPS[key][activeMode] : `${names.length}P ${activeMode} Tourney`;
    const tbody = document.getElementById('table-body'); tbody.innerHTML = "";
    names.forEach(n => {
        tbody.innerHTML += `<tr><td><b>${n}</b></td><td><select class="r-val" data-name="${n}"><option value="99" selected>Other (1 Pt)</option><option value="1">1st (10 Pts)</option><option value="2">2nd (5 Pts)</option>${names.length > 3 ? '<option value="3">3rd (3 Pts)</option>' : ''}<option value="0">Last (0 Pts)</option></select></td></tr>`;
    });
    document.getElementById('pane-setup').style.display = 'none';
    document.getElementById('pane-rank').style.display = 'block';
};

window.save = async () => {
    const players = []; let win = '', last = '';
    document.querySelectorAll('.r-val').forEach(s => {
        const r = parseInt(s.value); const name = s.getAttribute('data-name');
        let pts = 1; if(r===1){pts=10; win=name;} else if(r===2) pts=5; else if(r===3) pts=3; else if(r===0){pts=0; last=name;}
        players.push({ name, rank: r, pts });
    });
    if(!win || !last) return alert("Select 1st and Last!");
    const lName = document.getElementById('lBadge').innerText;
    await addDoc(gRef, { gameType: activeMode, lineupName: lName, players, winner: win, last, time: new Date().toISOString(), secret: PASS });
    if(confirm("Saved! Play another match with this group?")) { document.querySelectorAll('.r-val').forEach(s=>s.value="99"); }
    else { location.reload(); }
};
</script>
</body>
</html>
