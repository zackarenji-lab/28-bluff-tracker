<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:22px auto;padding:20px;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .logo{width:45px;height:45px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;box-shadow:0 4px 15px rgba(0,0,0,0.4)}
  h1{margin:0;font-size:18px}
  
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:20px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 20px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  /* OVERALL DASHBOARD TILES */
  .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
  .tile { background: var(--card); border: 1px solid rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; text-align: center; }
  .tile small { display: block; color: var(--muted); font-size: 8px; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
  .tile .val { font-size: 15px; font-weight: 800; color: var(--gold); }
  .tile.full { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; text-align: left; }

  /* GAME SUMMARY CARDS */
  .game-summary { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.05); }
  .gs-icon { font-size: 20px; background: rgba(0,0,0,0.3); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
  .gs-info { flex: 1; }
  .gs-info h4 { margin: 0; font-size: 12px; color: var(--muted); }
  .gs-info p { margin: 2px 0 0 0; font-size: 13px; font-weight: 700; }

  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
  .game-box { aspect-ratio: 1/1; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
  .game-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
  .game-name-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); color: #fff; font-size: 8px; font-weight: 800; padding: 4px 0; text-transform: uppercase; text-align: center; }

  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:8px 12px; color:#e6eef3; font-weight:700; cursor:pointer; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  
  select, input.custom-input { background: #fff !important; color: #000 !important; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; border: none; font-size: 13px; }
  .score-val { font-size: 28px; font-weight: 800; color: var(--gold); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
  .modal-box { background: #0b1622; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <h1>Gaming Zone</h1>
    <div style="flex:1"></div>
    <button id="globalStatBtn" class="neu-btn small" onclick="launchOverallDashboard()">📊 Overall Stat</button>
    <button id="homeBtn" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; display:none;" onclick="location.reload()">🏠</button>
  </header>

  <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img" id="mainHero"/>

  <section id="homeHub">
    <div class="card">
      <h2 style="margin:0 0 15px 0; font-size:13px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')"><img src="28 button.png" alt="28" onerror="this.src='https://placehold.co/200?text=28'"><div class="game-name-overlay">28 Game</div></div>
        <div class="game-box" onclick="launchGame('Bluff')"><img src="bluff button.png" alt="Bluff" onerror="this.src='https://placehold.co/200?text=Bluff'"><div class="game-name-overlay">Bluff</div></div>
        <div class="game-box" onclick="launchGame('UNO')"><img src="uno button.png" alt="UNO" onerror="this.src='https://placehold.co/200?text=UNO'"><div class="game-name-overlay">UNO</div></div>
      </div>
    </div>
  </section>

  <section id="section28" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; font-size:16px;">Active Series</h2>
        <button class="neu-btn primary small" onclick="startNewSeries()">➕ New Series</button>
      </div>
      <div id="activeList"></div>
      <div id="noActive" style="text-align:center; padding:20px; color:var(--muted); font-size:12px;">No active games.</div>
    </div>
  </section>

  <section id="sectionIndiv" style="display:none;">
    <div class="card" id="indivSetup">
        <h3 id="indivSetupTitle" style="margin:0 0 15px 0; font-size:16px;">Setup</h3>
        <select id="pCount" onchange="updateIndivInputs()"><option value="0" selected>Select Player Count</option><option value="3">3 Players</option><option value="4">4 Players</option><option value="5">5 Players</option></select>
        <div id="pNamesList"></div>
        <button id="startPlayBtn" class="neu-btn primary" style="width:100%; display:none;" onclick="startIndivPlay()">Start Playing</button>
    </div>
    <div class="card" id="indivPlay" style="display:none;">
        <h3 id="indivTitle" style="font-size:16px;">Live Scoring</h3>
        <table><thead><tr><th>Player</th><th>Win 🏆</th><th>Last 💩</th></tr></thead><tbody id="indivTableBody"></tbody></table>
        <button class="neu-btn primary" style="width:100%; margin-top:20px" onclick="submitIndivResult()">Save Result</button>
    </div>
  </section>

  <section id="dashboardSection" style="display:none;">
    <div id="dashboardContent"></div>
    <div class="card" style="display:flex; gap:10px;">
        <button class="neu-btn small" style="flex:1" onclick="location.reload()">🏠 Home</button>
        <button class="neu-btn small" style="flex:1; color:var(--danger)" onclick="resetStats()">⚠️ Reset Data</button>
    </div>
  </section>
</div>

<div id="modalContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const SECRET_KEY = "zachariahrenji";
const TEAM_LIST = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];
const ALL_PLAYER_POOL = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gamesRef = collection(db, "games");
let gameData = { games: [] };
let currentMode = '';

window.launchGame = (mode) => {
    currentMode = mode;
    document.getElementById('homeHub').style.display = 'none';
    document.getElementById('homeBtn').style.display = 'block';
    document.getElementById('globalStatBtn').style.display = 'none';
    if(mode === '28') document.getElementById('section28').style.display = 'block';
    else document.getElementById('sectionIndiv').style.display = 'block';
}

window.launchOverallDashboard = () => {
    document.getElementById('homeHub').style.display = 'none';
    document.getElementById('homeBtn').style.display = 'block';
    document.getElementById('globalStatBtn').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
    renderOverallDashboard();
}

function renderOverallDashboard() {
    const cont = document.getElementById('dashboardContent');
    const allGames = gameData.games.filter(g => g.winner);
    
    // Global KPI Calcs
    const globalStats = {};
    allGames.forEach(g => {
        const win = g.winner; const last = g.last || g.loser;
        if(!globalStats[win]) globalStats[win] = {w:0, l:0};
        if(!globalStats[last]) globalStats[last] = {w:0, l:0};
        globalStats[win].w++; globalStats[last].l++;
    });

    const mvp = Object.keys(globalStats).sort((a,b) => globalStats[b].w - globalStats[a].w)[0] || '—';
    const target = Object.keys(globalStats).sort((a,b) => globalStats[b].l - globalStats[a].l)[0] || '—';

    // Game Specific Summaries
    const bluffWins = allGames.filter(g => g.gameType === 'Bluff');
    const unoWins = allGames.filter(g => g.gameType === 'UNO');
    const series28 = gameData.games.filter(g => !g.gameType || g.gameType === '28');

    cont.innerHTML = `
        <div class="card">
            <h2 style="margin-top:0; font-size:16px;">Overall Dashboard</h2>
            <div class="dash-grid">
                <div class="tile"><small>👑 Global MVP</small><div class="val">${mvp}</div></div>
                <div class="tile"><small>💩 Global Target</small><div class="val">${target}</div></div>
                <div class="tile full"><small>🎮 Total Sessions Recorded</small><div class="val">${allGames.length}</div></div>
            </div>

            <h3 style="font-size:12px; color:var(--muted); text-transform:uppercase; margin:20px 0 10px 0;">Game Breakdowns</h3>
            
            <div class="game-summary">
                <div class="gs-icon">🏏</div>
                <div class="gs-info"><h4>28 Card Game</h4><p>${series28.length} Games played</p></div>
            </div>

            <div class="game-summary">
                <div class="gs-icon">🃏</div>
                <div class="gs-info"><h4>Bluff Game</h4><p>${bluffWins.length} Rounds won</p></div>
            </div>

            <div class="game-summary">
                <div class="gs-icon">🌈</div>
                <div class="gs-info"><h4>UNO Game</h4><p>${unoWins.length} Rounds won</p></div>
            </div>
            
            <button class="neu-btn primary" style="width:100%; margin-top:10px;" onclick="showGlobalHistory()">📜 View Full Game History</button>
        </div>
    `;
}

window.showGlobalHistory = () => {
    const filtered = gameData.games.filter(g => g.winner).slice().reverse();
    let h = `<div class="modal-box"><h3>Global History</h3>`;
    filtered.forEach(g => {
        h += `<div style="border-bottom:1px solid rgba(255,255,255,0.05); padding:8px 0; font-size:11px;">
                <div style="color:var(--muted)">${new Date(g.time).toLocaleString()} | ${(g.gameType||'28').toUpperCase()}</div>
                <div>🏆 Winner: <b>${g.winner}</b> | 💩 Last: ${g.last||g.loser}</div>
              </div>`;
    });
    h += `<button class="neu-btn primary" style="width:100%; margin-top:15px;" onclick="closeModal()">Close</button></div>`;
    showModal(h);
}

// SHARED UTILS
window.updateIndivInputs = () => {
    const count = parseInt(document.getElementById('pCount').value);
    const container = document.getElementById('pNamesList');
    container.innerHTML = ''; if(count === 0) return document.getElementById('startPlayBtn').style.display = "none";
    for(let i=0; i<count; i++) {
        container.innerHTML += `<div style="margin-bottom:10px;"><select id="pS${i}" onchange="refreshDropdowns()"><option value="" disabled selected>Player ${i+1}</option>${ALL_PLAYER_POOL.map(n => `<option value="${n}">${n}</option>`).join('')}<option value="Custom">Custom</option></select><input type="text" id="pO${i}" class="custom-input" style="display:none" placeholder="Name"></div>`;
    }
    document.getElementById('startPlayBtn').style.display = "inline-flex";
}
window.refreshDropdowns = () => {
    const count = parseInt(document.getElementById('pCount').value); const sel = [];
    for(let i=0; i<count; i++) {
        const v = document.getElementById(`pS${i}`).value; if(v && v!=="Custom") sel.push(v);
        document.getElementById(`pO${i}`).style.display = (v === "Custom") ? "block" : "none";
    }
    for(let i=0; i<count; i++) {
        const s = document.getElementById(`pS${i}`);
        Array.from(s.options).forEach(o => { if(o.value && o.value!=="Custom") o.style.display = (sel.includes(o.value) && s.value!==o.value) ? 'none' : 'block'; });
    }
}
window.startIndivPlay = () => {
    const count = parseInt(document.getElementById('pCount').value); const body = document.getElementById('indivTableBody'); body.innerHTML = '';
    for(let i=0; i<count; i++) {
        const sel = document.getElementById(`pS${i}`).value; const name = (sel === 'Custom') ? document.getElementById(`pO${i}`).value.trim() : sel;
        if(!name) return alert("Assign all names"); body.innerHTML += `<tr><td><b>${name}</b></td><td><input type="radio" name="w" value="${name}"></td><td><input type="radio" name="l" value="${name}"></td></tr>`;
    }
    document.getElementById('indivSetup').style.display = 'none'; document.getElementById('indivPlay').style.display = 'block';
}
window.submitIndivResult = async () => {
    const w = document.querySelector('input[name="w"]:checked')?.value; const l = document.querySelector('input[name="l"]:checked')?.value;
    if(!w || !l || w===l) return alert("Select unique Winner & Last!");
    const run = []; document.querySelectorAll('#indivTableBody tr').forEach(r => { const n = r.cells[0].innerText; if(n!==w && n!==l) run.push(n); });
    await addDoc(gamesRef, { gameType: currentMode, winner: w, last: l, runnersUp: run, time: new Date().toISOString(), secret: SECRET_KEY }); location.reload();
}

// 28 ENGINE
function compute28() {
    const seriesMap = {};
    gameData.games.filter(g => !g.gameType || g.gameType === '28').forEach(g => {
        if (!seriesMap[g.seriesId]) seriesMap[g.seriesId] = { id: g.seriesId, target: 5, wins: {}, teamA: g.teamA, teamB: g.teamB };
        const s = seriesMap[g.seriesId]; if (g.isInit) { s.teamA = g.teamA; s.teamB = g.teamB; } else if (g.winner) { s.wins[g.winner] = (s.wins[g.winner] || 0) + 1; }
    });
    return { active: Object.values(seriesMap).filter(s => !Object.values(s.wins).some(w => w >= s.target)) };
}
window.renderUI = () => {
    const { active } = compute28(); const list = document.getElementById("activeList"); if(!list || currentMode !== '28') return;
    list.innerHTML = ""; document.getElementById("noActive").style.display = active.length ? "none" : "block";
    active.forEach(s => {
        const wA = s.wins[s.teamA] || 0, wB = s.wins[s.teamB] || 0;
        list.innerHTML += `<div class="series-card"><div style="display:flex; justify-content:space-between; margin-bottom:10px;"><div><b>${s.teamA}</b><div class="score-val">${wA}</div></div><div><b>${s.teamB}</b><div class="score-val">${wB}</div></div></div><div style="display:flex; gap:8px;"><button class="neu-btn primary" onclick="addWin('${s.id}','${s.teamA}','${s.teamB}')">Win ${s.teamA.split(' ')[0]}</button><button class="neu-btn primary" style="background:var(--gold)" onclick="addWin('${s.id}','${s.teamB}','${s.teamA}')">Win ${s.teamB.split(' ')[0]}</button></div></div>`;
    });
}
window.addWin = async (sId, winner, loser) => { await addDoc(gamesRef, { seriesId: sId, winner, loser, time: new Date().toISOString(), secret: SECRET_KEY }); };
window.startNewSeries = () => { const opts = TEAM_LIST.map(t => `<option value="${t}">${t}</option>`).join(""); showModal(`<div class="modal-box"><h3>New Series</h3><select id="m1" class="custom-input">${opts}</select><select id="m2" class="custom-input">${opts}</select><button class="neu-btn primary" style="width:100%" onclick="confirmStart()">Start</button></div>`); }
window.confirmStart = async () => { const t1 = document.getElementById('m1').value, t2 = document.getElementById('m2').value; await addDoc(gamesRef, { seriesId: "s_"+Date.now(), isInit: true, teamA: t1, teamB: t2, time: new Date().toISOString(), secret: SECRET_KEY }); closeModal(); }
window.showModal = (html) => document.getElementById("modalContainer").innerHTML = `<div class="overlay">${html}</div>`;
window.closeModal = () => document.getElementById("modalContainer").innerHTML = "";
onSnapshot(query(gamesRef, orderBy("time")), snap => { gameData.games = snap.docs.map(d => d.data()); renderUI(); if(document.getElementById('dashboardSection').style.display==='block') renderOverallDashboard(); });
window.resetStats = async () => { if(prompt("Pass:") === SECRET_KEY) { const snap = await getDocs(gamesRef); snap.forEach(d => deleteDoc(d.ref)); location.reload(); } };
</script>
</body>
</html>
