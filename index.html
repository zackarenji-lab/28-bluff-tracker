<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:22px auto;padding:20px;}
  header{display:flex;align-items:center;gap:15px;margin-bottom:18px}
  .logo{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;box-shadow:0 8px 28px rgba(0,0,0,0.6)}
  h1{margin:0;font-size:22px}
  
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:20px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 20px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  /* DASHBOARD TILES */
  .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
  .kpi-tile { background: var(--card); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
  .kpi-tile:active { transform: scale(0.95); background: rgba(255,255,255,0.05); }
  .kpi-tile small { display: block; color: var(--muted); font-size: 9px; text-transform: uppercase; margin-bottom: 4px; }
  .kpi-tile .val { font-size: 16px; font-weight: 800; color: var(--gold); }
  
  /* ANALYTICS */
  .analytics-row { margin-bottom: 12px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; }
  .analytics-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
  .bar-container { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; display: flex; }
  .b-win { height: 100%; background: var(--accent); }
  .b-run { height: 100%; background: var(--info); }
  .b-last { height: 100%; background: var(--danger); }

  /* GAME HUB GRID */
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
  .game-box {
    aspect-ratio: 1 / 1; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; text-align: center; overflow: hidden; position: relative;
  }
  .game-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0.8; }
  .game-name-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: #fff; font-size: 9px; font-weight: 800; padding: 4px 0; text-transform: uppercase; }

  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:10px 14px; color:#e6eef3; font-weight:700; cursor:pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 12px; justify-content: center; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  
  .history-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; font-size: 12px; }
  .history-date { font-size: 10px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
  .modal-box { background: #0b1622; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <div>
      <h1 id="topTitle">Gaming Zone</h1>
      <div id="topSubtitle" style="color:var(--muted); font-size:11px;">Elite Victory Tracking</div>
    </div>
    <div style="flex:1"></div>
    <button id="navBtn" class="neu-btn small" onclick="toggleView()" style="display:none;">📊 Stats</button>
    <button id="homeBtn" style="background:none; border:none; color:white; font-size:24px; cursor:pointer; margin-left:10px; display:none;" onclick="location.reload()">🏠</button>
  </header>

  <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img" id="mainHero"/>

  <section id="homeHub">
    <div class="card">
      <h2 style="margin:0; font-size:16px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')">
            <img src="28 button.png" alt="28" onerror="this.src='https://placehold.co/200?text=28'">
            <div class="game-name-overlay">28 Game</div>
        </div>
        <div class="game-box" onclick="launchGame('Bluff')">
            <img src="bluff button.png" alt="Bluff" onerror="this.src='https://placehold.co/200?text=Bluff'">
            <div class="game-name-overlay">Bluff</div>
        </div>
        <div class="game-box" onclick="launchGame('UNO')">
            <img src="uno button.png" alt="UNO" onerror="this.src='https://placehold.co/200?text=UNO'">
            <div class="game-name-overlay">UNO</div>
        </div>
      </div>
      <button class="neu-btn primary" style="width:100%; margin-top:15px;" onclick="launchGlobalStats()">🌍 Global Dashboard</button>
    </div>
  </section>

  <section id="section28" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; font-size:18px;">Active Series</h2>
        <button class="neu-btn primary small" onclick="startNewSeries()">➕ New Series</button>
      </div>
      <div id="activeList"></div>
      <div id="noActive" style="text-align:center; padding:20px; color:var(--muted);">No active games.</div>
    </div>
  </section>

  <section id="sectionIndiv" style="display:none;">
    <div class="card" id="indivSetup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="indivSetupTitle" style="margin:0">Setup</h3>
            <button class="neu-btn small" onclick="toggleView()">📊 Stats</button>
        </div>
        <select id="pCount" onchange="updateIndivInputs()">
            <option value="0" selected>Select Player Count</option>
            <option value="3">3 Players</option><option value="4">4 Players</option><option value="5">5 Players</option><option value="6">6 Players</option>
        </select>
        <div id="pNamesList"></div>
        <button id="startPlayBtn" class="neu-btn primary" style="width:100%; display:none;" onclick="startIndivPlay()">Start Playing</button>
    </div>
    <div class="card" id="indivPlay" style="display:none;">
        <h3 id="indivTitle">Live Scoring</h3>
        <table>
            <thead><tr><th>Player</th><th>Winner 🏆</th><th>Last 💩</th></tr></thead>
            <tbody id="indivTableBody"></tbody>
        </table>
        <button class="neu-btn primary" style="width:100%; margin-top:20px" onclick="submitIndivResult()">Save Result</button>
    </div>
  </section>

  <section id="statsSection" style="display:none;">
    <div id="statsContent"></div>
    <div class="card">
        <button class="neu-btn small" onclick="promptShare()">📤 Share</button>
        <button class="neu-btn small" style="color:var(--danger)" onclick="resetStats()">⚠️ Reset</button>
    </div>
  </section>
</div>

<div id="modalContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const SECRET_KEY = "zachariahrenji";
const TEAM_LIST = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];
const ALL_PLAYER_POOL = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gamesRef = collection(db, "games");
let gameData = { games: [] };
let currentMode = '';

window.launchGame = (mode) => {
    currentMode = mode;
    document.getElementById('homeHub').style.display = 'none';
    document.getElementById('homeBtn').style.display = 'block';
    document.getElementById('navBtn').style.display = 'inline-flex';
    if(mode === '28') document.getElementById('section28').style.display = 'block';
    else document.getElementById('sectionIndiv').style.display = 'block';
}

window.launchGlobalStats = () => {
    currentMode = 'GLOBAL';
    document.getElementById('homeHub').style.display = 'none';
    document.getElementById('homeBtn').style.display = 'block';
    document.getElementById('navBtn').style.display = 'none';
    document.getElementById('statsSection').style.display = 'block';
    updateStatsPage();
}

window.toggleView = () => {
    const s28 = document.getElementById('section28');
    const sIndiv = document.getElementById('sectionIndiv');
    const stats = document.getElementById('statsSection');
    const isStats = stats.style.display === 'block';
    stats.style.display = isStats ? 'none' : 'block';
    if(currentMode === '28') s28.style.display = isStats ? 'block' : 'none';
    else sIndiv.style.display = isStats ? 'block' : 'none';
    if(!isStats) updateStatsPage();
}

// FORMAT DATE
function fmtDate(iso) {
    if(!iso) return "Unknown";
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' }) + ", " + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

// SHOW HISTORY MODAL
window.showHistory = (mode) => {
    const filtered = gameData.games.filter(g => {
        if(mode === '28') return !g.gameType || g.gameType === '28';
        if(mode === 'GLOBAL') return true;
        return g.gameType === mode;
    }).filter(g => g.winner); // Only show games that finished

    let h = `<div class="modal-box"><h3>Game History (${mode})</h3>`;
    if(filtered.length === 0) h += `<p style="color:var(--muted)">No games recorded yet.</p>`;
    filtered.slice().reverse().forEach(g => {
        const type = g.gameType || '28';
        h += `<div class="history-item">
                <div class="history-date">${fmtDate(g.time)} | ${type.toUpperCase()}</div>
                <div>🏆 Winner: <b>${g.winner}</b></div>
                <div style="color:var(--danger)">💩 Last: ${g.last || g.loser}</div>
              </div>`;
    });
    h += `<button class="neu-btn primary" style="width:100%; margin-top:15px;" onclick="closeModal()">Close</button></div>`;
    showModal(h);
}

function updateStatsPage() {
    const cont = document.getElementById("statsContent");
    const modeData = gameData.games.filter(g => {
        if(currentMode === 'GLOBAL') return true;
        if(currentMode === '28') return !g.gameType || g.gameType === '28';
        return g.gameType === currentMode;
    });

    const st = {};
    modeData.forEach(g => {
        const win = g.winner;
        const lost = g.last || g.loser;
        if(!win) return;
        [win, lost, ...(g.runnersUp || [])].forEach(p => { if(!st[p]) st[p] = {w:0, l:0, r:0, t:0} });
        st[win].w++; st[lost].l++; st[win].t++; st[lost].t++;
        (g.runnersUp || []).forEach(p => { st[p].r++; st[p].t++; });
    });
    
    const sortedW = Object.keys(st).sort((a,b) => st[b].w - st[a].w);
    const mvp = sortedW[0] || '—';
    const target = Object.keys(st).sort((a,b) => st[b].l - st[a].l)[0] || '—';

    let h = `<div class="card"><h2>${currentMode} Analytics</h2>
        <div class="dashboard-grid">
            <div class="kpi-tile"><small>🥇 WIN KING</small><div class="val">${mvp}</div></div>
            <div class="kpi-tile" onclick="showHistory('${currentMode}')"><small>🎮 TOTAL GAMES</small><div class="val">${modeData.filter(g=>g.winner).length} ℹ️</div></div>
        </div>`;
    
    Object.entries(st).sort((a,b) => b[1].w - a[1].w).forEach(([n, d]) => {
        const wP = (d.w / d.t) * 100, rP = (d.r / d.t) * 100, lP = (d.l / d.t) * 100;
        h += `<div class="analytics-row">
            <div class="analytics-meta"><span><b>${n}</b></span><span>${d.w}W - ${d.l}L</span></div>
            <div class="bar-container"><div class="b-win" style="width:${wP}%"></div><div class="b-run" style="width:${rP}%"></div><div class="b-last" style="width:${lP}%"></div></div>
        </div>`;
    });
    cont.innerHTML = h + `</div>`;
}

// SETUP & SUBMIT LOGIC (Simplified)
window.updateIndivInputs = () => {
    const count = parseInt(document.getElementById('pCount').value);
    const container = document.getElementById('pNamesList');
    container.innerHTML = '';
    if(count === 0) return document.getElementById('startPlayBtn').style.display = "none";
    for(let i=0; i<count; i++) {
        container.innerHTML += `<div style="margin-bottom:10px;"><select id="pS${i}" onchange="refreshDropdowns()"><option value="" disabled selected>Player ${i+1}</option>${ALL_PLAYER_POOL.map(n => `<option value="${n}">${n}</option>`).join('')}<option value="Custom">Custom</option></select><input type="text" id="pO${i}" class="custom-input" style="display:none" placeholder="Name"></div>`;
    }
    document.getElementById('startPlayBtn').style.display = "inline-flex";
}
window.refreshDropdowns = () => {
    const count = parseInt(document.getElementById('pCount').value);
    const sel = [];
    for(let i=0; i<count; i++) {
        const v = document.getElementById(`pS${i}`).value; if(v && v!=="Custom") sel.push(v);
        document.getElementById(`pO${i}`).style.display = (v === "Custom") ? "block" : "none";
    }
    for(let i=0; i<count; i++) {
        const s = document.getElementById(`pS${i}`);
        Array.from(s.options).forEach(o => { if(o.value && o.value!=="Custom") o.style.display = (sel.includes(o.value) && s.value!==o.value) ? 'none' : 'block'; });
    }
}
window.startIndivPlay = () => {
    const count = parseInt(document.getElementById('pCount').value);
    const body = document.getElementById('indivTableBody');
    body.innerHTML = '';
    for(let i=0; i<count; i++) {
        const sel = document.getElementById(`pS${i}`).value;
        const name = (sel === 'Custom') ? document.getElementById(`pO${i}`).value.trim() : sel;
        if(!name) return alert("Missing name");
        body.innerHTML += `<tr><td><b>${name}</b></td><td><input type="radio" name="w" value="${name}"></td><td><input type="radio" name="l" value="${name}"></td></tr>`;
    }
    document.getElementById('indivSetup').style.display = 'none';
    document.getElementById('indivPlay').style.display = 'block';
}
window.submitIndivResult = async () => {
    const w = document.querySelector('input
