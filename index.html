<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:22px auto;padding:20px;}
  header{display:flex;align-items:center;gap:15px;margin-bottom:18px}
  .logo{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;box-shadow:0 8px 28px rgba(0,0,0,0.6)}
  h1{margin:0;font-size:22px}
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:20px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 20px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
  .game-box {
    aspect-ratio: 1 / 1; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; text-align: center; padding: 8px;
  }
  .game-box:hover { transform: translateY(-3px); border-color: var(--accent); }
  .game-icon { font-size: 26px; margin-bottom: 6px; }
  .game-name { font-weight: 700; font-size: 10px; color: #fff; text-transform: uppercase; }

  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:10px 14px; color:#e6eef3; font-weight:700; cursor:pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; justify-content: center; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  .neu-btn.small { padding: 6px 12px; font-size: 11px; }
  .neu-btn.stop { color: var(--danger); border: 1px solid rgba(255, 107, 107, 0.3); }
  select, input.custom-input { background: #fff !important; color: #000 !important; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; border: none; }
  
  .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .champion-bar{padding:18px;border-radius:12px;background:linear-gradient(90deg,#3b2b03,#4b2f05);color:#fff;display:flex;align-items:center;gap:12px;}
  .trophy{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#ffd36d,#ffb84d);display:flex;align-items:center;justify-content:center;font-size:20px;}
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); padding: 20px; }
  .confirm-box { background: #0b1622; padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .stat-icon { font-size: 1.2em; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <div>
      <h1 id="topTitle">Gaming Zone</h1>
      <div id="topSubtitle" style="color:var(--muted); font-size:11px;">Elite Victory Tracking</div>
    </div>
    <div style="flex:1"></div>
    <button id="navBtn" class="neu-btn small" onclick="toggleView()" style="display:none;">📊 Stats</button>
    <button id="homeBtn" style="background:none; border:none; color:white; font-size:24px; cursor:pointer; margin-left:10px; display:none;" onclick="location.reload()">🏠</button>
  </header>

  <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img" onerror="this.style.display='none'"/>

  <section id="homeHub">
    <div class="card">
      <h2 style="margin:0; font-size:16px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')"><div class="game-icon">🏏</div><div class="game-name">28 Game</div></div>
        <div class="game-box" onclick="launchGame('Bluff')"><div class="game-icon">🃏</div><div class="game-name">Bluff</div></div>
        <div class="game-box" onclick="launchGame('UNO')"><div class="game-icon">🌈</div><div class="game-name">UNO</div></div>
      </div>
    </div>
  </section>

  <section id="section28" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; font-size:18px;">Active Series</h2>
        <button class="neu-btn primary small" onclick="startNewSeries()">➕ New Series</button>
      </div>
      <div id="activeList"></div>
      <div id="noActive" style="text-align:center; padding:20px; color:var(--muted); font-size: 13px;">No active games.</div>
    </div>
    <div class="champion-bar">
        <div class="trophy">🏆</div>
        <div>
            <div style="font-size:10px; color:var(--gold); text-transform:uppercase; letter-spacing:1px;">Global Champion</div>
            <div id="championText" style="font-size:16px; font-weight:800;">—</div>
        </div>
    </div>
  </section>

  <section id="sectionIndiv" style="display:none;">
    <div class="card" id="indivSetup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="indivSetupTitle" style="margin:0">Game Setup</h3>
            <button class="neu-btn small" onclick="toggleView()">📊 Stats</button>
        </div>
        <label>Players Count</label>
        <select id="pCount" onchange="updateIndivInputs()">
            <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option><option value="6">6</option>
            <option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
        </select>
        <div id="pNamesList"></div>
        <button class="neu-btn primary" style="width:100%" onclick="startIndivPlay()">Start Playing</button>
    </div>
    <div class="card" id="indivPlay" style="display:none;">
        <h3 id="indivTitle">Live Scoring</h3>
        <table>
            <thead><tr><th>Player</th><th>Winner 🏆</th><th>Last (Losser) 💩</th></tr></thead>
            <tbody id="indivTableBody"></tbody>
        </table>
        <button class="neu-btn primary" style="width:100%; margin-top:20px" onclick="submitIndivResult()">Save Result</button>
    </div>
  </section>

  <section id="statsSection" style="display:none;">
    <div class="card">
        <div id="statsContent"></div>
        <div style="margin-top:20px; display:flex; gap:10px; flex-wrap: wrap;">
            <button class="neu-btn small" onclick="promptShare()">📤 Share Stats</button>
            <button class="neu-btn small" style="color:var(--danger)" onclick="resetStats()">⚠️ Reset Data</button>
        </div>
    </div>
  </section>
</div>

<div id="modalContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const SECRET_KEY = "zachariahrenji";
const TEAM_LIST = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];
const ALL_PLAYER_POOL = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gamesRef = collection(db, "games");
let gameData = { games: [] };
let currentMode = '';

window.launchGame = (mode) => {
    currentMode = mode;
    document.getElementById('homeHub').style.display = 'none';
    document.getElementById('homeBtn').style.display = 'block';
    if(mode === '28') {
        document.getElementById('section28').style.display = 'block';
        document.getElementById('navBtn').style.display = 'inline-flex';
    } else {
        document.getElementById('indivSetupTitle').innerText = mode + " Setup";
        document.getElementById('sectionIndiv').style.display = 'block';
        updateIndivInputs();
    }
}

window.toggleView = () => {
    const s28 = document.getElementById('section28');
    const sIndiv = document.getElementById('sectionIndiv');
    const stats = document.getElementById('statsSection');
    const isStats = stats.style.display === 'block';

    stats.style.display = isStats ? 'none' : 'block';
    if(currentMode === '28') s28.style.display = isStats ? 'block' : 'none';
    else sIndiv.style.display = isStats ? 'block' : 'none';
    
    if(!isStats) updateStatsPage();
}

window.updateIndivInputs = () => {
    const count = parseInt(document.getElementById('pCount').value);
    const container = document.getElementById('pNamesList');
    container.innerHTML = '';
    for(let i=0; i<count; i++) {
        container.innerHTML += `
            <div style="margin-bottom:12px;">
                <select id="pS${i}" onchange="refreshDropdowns()">
                    <option value="" disabled selected>Select Player ${i+1}</option>
                    ${ALL_PLAYER_POOL.map(n => `<option value="${n}">${n}</option>`).join('')}
                    <option value="Custom">Custom Name</option>
                </select>
                <input type="text" id="pO${i}" class="custom-input" style="display:none" placeholder="Enter Name">
            </div>`;
    }
}

window.refreshDropdowns = () => {
    const count = parseInt(document.getElementById('pCount').value);
    const selected = [];
    for(let i=0; i<count; i++) {
        const val = document.getElementById(`pS${i}`).value;
        if(val && val !== "Custom") selected.push(val);
        document.getElementById(`pO${i}`).style.display = (val === "Custom") ? "block" : "none";
    }
    for(let i=0; i<count; i++) {
        const select = document.getElementById(`pS${i}`);
        Array.from(select.options).forEach(opt => {
            if(opt.value && opt.value !== "Custom") opt.style.display = (selected.includes(opt.value) && select.value !== opt.value) ? 'none' : 'block';
        });
    }
}

window.startIndivPlay = () => {
    const count = parseInt(document.getElementById('pCount').value);
    const body = document.getElementById('indivTableBody');
    body.innerHTML = '';
    let players = [];
    for(let i=0; i<count; i++) {
        const sel = document.getElementById(`pS${i}`).value;
        const name = (sel === 'Custom') ? document.getElementById(`pO${i}`).value.trim() : sel;
        if(!name) return alert("Assign all names");
        players.push(name);
    }
    players.forEach(p => {
        body.innerHTML += `<tr><td><b>${p}</b></td><td><input type="radio" name="w" value="${p}"></td><td><input type="radio" name="l" value="${p}"></td></tr>`;
    });
    document.getElementById('indivSetup').style.display = 'none';
    document.getElementById('indivPlay').style.display = 'block';
}

window.submitIndivResult = async () => {
    const winner = document.querySelector('input[name="w"]:checked')?.value;
    const last = document.querySelector('input[name="l"]:checked')?.value;
    if(!winner || !last) return alert("Select Winner & Last!");
    if(winner === last) return alert("Winner and Last cannot be the same person!");
    
    const runnersUp = [];
    document.querySelectorAll('#indivTableBody tr').forEach(row => {
        const pName = row.cells[0].innerText;
        if(pName !== winner && pName !== last) runnersUp.push(pName);
    });

    await addDoc(gamesRef, { gameType: currentMode, winner, last, runnersUp, time: new Date().toISOString(), secret: SECRET_KEY });
    alert("Result Saved!");
    location.reload();
}

function updateStatsPage() {
    const cont = document.getElementById("statsContent");
    if(currentMode === '28') {
        const { teamStats } = compute28();
        let h = `<h2>28 Game Stats</h2><h3>Leaderboard</h3>`;
        Object.entries(teamStats).sort((a,b) => b[1].wins - a[1].wins).forEach(([n, d]) => h += `<div class="score-row"><span>${n}</span><span>${d.wins}W - ${d.losses}L</span></div>`);
        cont.innerHTML = h;
    } else {
        const data = gameData.games.filter(g => g.gameType === currentMode);
        const stats = {};
        data.forEach(g => {
            [g.winner, g.last, ...(g.runnersUp || [])].forEach(p => { if(!stats[p]) stats[p] = {w:0, l:0, r:0} });
            stats[g.winner].w++;
            stats[g.last].l++;
            (g.runnersUp || []).forEach(p => stats[p].r++);
        });
        
        const sortedWinners = Object.keys(stats).sort((a,b) => stats[b].w - stats[a].w);
        const sortedLasts = Object.keys(stats).sort((a,b) => stats[b].l - stats[a].l);
        const maxWinner = sortedWinners[0];
        const maxLast = sortedLasts[0];

        let h = `<h2>${currentMode} Stats</h2><p>Total Games: <b>${data.length}</b></p><table><thead><tr><th>Name</th><th>🏆 (Win)</th><th>💩 (Last)</th><th>🏃 (Runner)</th></tr></thead><tbody>`;
        Object.entries(stats).sort((a,b) => b[1].w - a[1].w).forEach(([n, d]) => {
            let icons = '';
            if(n === maxWinner && d.w > 0) icons += ' 🏆';
            if(n === maxLast && d.l > 0) icons += ' 💩';
            h += `<tr><td>${n}${icons}</td><td>${d.w}</td><td>${d.l}</td><td>${d.r}</td></tr>`;
        });
        h += `</tbody></table>`;
        cont.innerHTML = h;
    }
}

window.promptShare = () => {
    showModal(`<div class="confirm-box"><h3>Share Stats</h3><p>Select game to share:</p>
        <button class="neu-btn primary" onclick="share('28')">28 Game</button>
        <button class="neu-btn primary" onclick="share('Bluff')">Bluff</button>
        <button class="neu-btn primary" onclick="share('UNO')">UNO</button>
        <button class="neu-btn small" onclick="closeModal()">Cancel</button></div>`);
}

window.share = (mode) => {
    let msg = `🏆 ${mode} Rankings\n\n`;
    if(mode === '28') {
        const { teamStats } = compute28();
        Object.entries(teamStats).forEach(([n, d]) => msg += `${n}: ${d.wins} Wins\n`);
    } else {
        const data = gameData.games.filter(g => g.gameType === mode);
        const s = {};
        data.forEach(g => { s[g.winner] = (s[g.winner] || 0) + 1; });
        Object.entries(s).sort((a,b)=>b[1]-a[1]).forEach(([n, d]) => msg += `${n}: ${d} Wins\n`);
    }
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, "_blank");
    closeModal();
}

function compute28() {
    const seriesMap = {}, teamStats = {};
    gameData.games.filter(g => !g.gameType || g.gameType === '28').forEach(g => {
        if (!seriesMap[g.seriesId]) seriesMap[g.seriesId] = { id: g.seriesId, target: g.seriesTarget || 5, wins: {}, teamA: g.teamA, teamB: g.teamB, isRandom: false };
        const s = seriesMap[g.seriesId];
        if (g.isInit) { s.teamA = g.teamA; s.teamB = g.teamB; }
        else if (g.manualEnd) s.isRandom = true;
        else {
            s.wins[g.winner] = (s.wins[g.winner] || 0) + 1;
            if(!teamStats[g.winner]) teamStats[g.winner] = { wins: 0, losses: 0 };
            if(!teamStats[g.loser]) teamStats[g.loser] = { wins: 0, losses: 0 };
            teamStats[g.winner].wins++; teamStats[g.loser].losses++;
        }
    });
    const active = [], finished = [];
    Object.values(seriesMap).forEach(s => {
        const reached = Object.values(s.wins).some(w => w >= s.target);
        if (reached || s.isRandom) finished.push(s); else active.push(s);
    });
    return { active, finished, teamStats };
}

window.renderUI = () => {
    const { active, teamStats } = compute28();
    const list = document.getElementById("activeList");
    if(!list) return;
    list.innerHTML = "";
    document.getElementById("noActive").style.display = active.length ? "none" : "block";
    active.forEach(s => {
        const wA = s.wins[s.teamA] || 0, wB = s.wins[s.teamB] || 0;
        list.innerHTML += `<div class="series-card"><div class="score-row"><div class="score-box"><strong>${s.teamA}</strong><div class="score-val">${wA}</div></div><div class="score-box"><strong>${s.teamB}</strong><div class="score-val">${wB}</div></div></div><div style="display:flex; gap:8px;"><button class="neu-btn primary" style="flex:2" onclick="addWin('${s.id}','${s.teamA}','${s.teamB}')">Win ${s.teamA.split(' ')[0]}</button><button class="neu-btn primary" style="flex:2; background:var(--gold)" onclick="addWin('${s.id}','${s.teamB}','${s.teamA}')">Win ${s.teamB.split(' ')[0]}</button><button class="neu-btn stop" onclick="endSeriesEarly('${s.id}')">STOP</button></div></div>`;
    });
    const sorted = Object.keys(teamStats).sort((a,b) => teamStats[b].wins - teamStats[a].wins);
    document.getElementById("championText").innerText = sorted[0] || "—";
}

window.addWin = async (sId, winner, loser) => {
    const s = compute28().active.find(x => x.id === sId);
    await addDoc(gamesRef, { seriesId: sId, winner, loser, seriesTarget: s.target, time: new Date().toISOString(), secret: SECRET_KEY });
};

window.startNewSeries = () => {
    const opts = TEAM_LIST.map(t => `<option value="${t}">${t}</option>`).join("");
    showModal(`<div class="confirm-box"><h3>New Series</h3><select id="mTarget" class="neu-btn"><option value="5">First to 5</option><option value="10">First to 10</option></select><select id="mTeam1" class="neu-btn">${opts}</select><select id="mTeam2" class="neu-btn">${opts}</select><button class="neu-btn primary" style="width:100%" onclick="confirmStart()">Start Game</button></div>`);
}

window.confirmStart = async () => {
    const tA = document.getElementById('mTeam1').value, tB = document.getElementById('mTeam2').value;
    const sId = "s_" + Date.now();
    await addDoc(gamesRef, { seriesId: sId, isInit: true, teamA: tA, teamB: tB, time: new Date().toISOString(), seriesTarget: parseInt(document.getElementById('mTarget').value), secret: SECRET_KEY });
    closeModal();
}

window.endSeriesEarly = async (id) => {
    if(prompt("Password:") === SECRET_KEY) await addDoc(gamesRef, { seriesId: id, manualEnd: true, time: new Date().toISOString(), secret: SECRET_KEY });
}

window.showModal = (html) => document.getElementById("modalContainer").innerHTML = `<div class="overlay">${html}</div>`;
window.closeModal = () => document.getElementById("modalContainer").innerHTML = "";

onSnapshot(query(gamesRef, orderBy("time")), snap => {
  gameData.games = snap.docs.map(d => d.data());
  renderUI();
});

window.resetStats = async () => { if(prompt("Password:") === SECRET_KEY) { const snap = await getDocs(gamesRef); snap.forEach(d => deleteDoc(d.ref)); location.reload(); } };
</script>
</body>
</html>
