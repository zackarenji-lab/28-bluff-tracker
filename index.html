<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:15px auto;padding:15px;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:15px}
  .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;}
  h1{margin:0;font-size:16px;flex:1}
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:15px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 15px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  /* TILES */
  .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
  .tile { background: var(--card); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; text-align: center; }
  .tile small { display: block; color: var(--muted); font-size: 7px; text-transform: uppercase; margin-bottom: 4px; }
  .tile .val { font-size: 13px; font-weight: 800; color: var(--gold); }

  .analytics-row { margin-bottom: 10px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; }
  .bar-container { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; display: flex; margin-top: 5px; }
  .b-win { height: 100%; background: var(--accent); }
  .b-last { height: 100%; background: var(--danger); }

  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:8px 12px; color:#e6eef3; font-weight:700; cursor:pointer; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  .neu-btn.danger { color: var(--danger); border: 1px solid rgba(255,107,107,0.2); }
  .neu-btn.small { padding: 4px 8px; font-size: 9px; }

  select, input { background: #fff !important; color: #000 !important; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; border: none; font-size: 13px; box-sizing: border-box; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
  .modal-box { background: #0b1622; padding: 20px; border-radius: 20px; width: 92%; max-width: 450px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
  
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
  .log-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ffffff10; padding: 8px 0; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <h1>Gaming Zone</h1>
    <button class="neu-btn small" onclick="switchView('OVERALL')">📊 Overall Stat</button>
    <button id="btn-home" class="neu-btn small" style="display:none" onclick="location.reload()">🏠 Home</button>
  </header>

  <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img"/>

  <section id="view-HOME">
    <div class="card">
      <h2 style="margin:0 0 10px 0; font-size:12px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      <div class="game-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
        <div class="game-box" onclick="launchGame('28')" style="aspect-ratio:1/1; background:var(--card); border:1px solid rgba(255,255,255,0.08); border-radius:14px; position:relative; overflow:hidden; cursor:pointer;"><img src="28 button.png" alt="28" style="width:100%"><div class="game-name-overlay">28 Game</div></div>
        <div class="game-box" onclick="launchGame('Bluff')" style="aspect-ratio:1/1; background:var(--card); border:1px solid rgba(255,255,255,0.08); border-radius:14px; position:relative; overflow:hidden; cursor:pointer;"><img src="bluff button.png" alt="Bluff" style="width:100%"><div class="game-name-overlay">Bluff</div></div>
        <div class="game-box" onclick="launchGame('UNO')" style="aspect-ratio:1/1; background:var(--card); border:1px solid rgba(255,255,255,0.08); border-radius:14px; position:relative; overflow:hidden; cursor:pointer;"><img src="uno button.png" alt="UNO" style="width:100%"><div class="game-name-overlay">UNO</div></div>
      </div>
    </div>
  </section>

  <section id="view-28" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size:16px;">Active Series</h2>
        <button class="neu-btn small" onclick="openDeepStats('28')">📊 Stats</button>
      </div>
      <div id="list-28"></div>
      <button class="neu-btn primary" style="width:100%; margin-top:10px;" onclick="newSeries28()">➕ New Series</button>
    </div>
  </section>

  <section id="view-INDIV" style="display:none;">
    <div class="card" id="pane-setup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="indiv-title" style="margin:0; font-size:16px;">Setup</h3>
            <button class="neu-btn small" onclick="openDeepStats(window.activeMode)">📊 Stats</button>
        </div>
        <input type="number" id="pCnt" min="3" max="10" placeholder="Number of players (3-10)" oninput="drawInputs()">
        <div id="pInputs"></div>
        <button id="btn-start" class="neu-btn primary" style="width:100%; display:none; margin-top:10px" onclick="goScoring()">Enter Tournament</button>
    </div>
    <div class="card" id="pane-play" style="display:none;">
        <h3 style="font-size:14px; margin-bottom:10px;">Finish Order</h3>
        <table><thead><tr><th>Player</th><th>Position</th></tr></thead><tbody id="table-score-body"></tbody></table>
        <button class="neu-btn primary" style="width:100%; margin-top:15px" onclick="saveWeightedResult()">Finish Tournament</button>
    </div>
  </section>

  <section id="view-OVERALL" style="display:none;">
    <div class="card">
        <h2 style="margin:0 0 15px 0; font-size:16px; text-align:center;">Analytics Hub</h2>
        <div id="summary-tiles"></div>
        <button class="neu-btn danger" style="width:100%; margin-top:15px" onclick="resetSystem('ALL')">⚠️ Emergency Reset All Data</button>
    </div>
  </section>
</div>

<div id="modal-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, doc, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const PLRS = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];
const TMS = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gRef = collection(db, "games");
let allG = [];
window.activeMode = '';

window.switchView = (v) => {
    ['HOME','28','INDIV','OVERALL'].forEach(id => document.getElementById('view-'+id).style.display = (id === v ? 'block' : 'none'));
    document.getElementById('btn-home').style.display = (v === 'HOME' ? 'none' : 'block');
    if(v === 'OVERALL') renderGlobalTiles();
};

window.launchGame = (m) => { window.activeMode = m; switchView(m==='28'?'28':'INDIV'); if(m!=='28') resetSetup(); };

function resetSetup() {
    document.getElementById('indiv-title').innerText = window.activeMode + ' Setup';
    document.getElementById('pCnt').value = ""; document.getElementById('pInputs').innerHTML = "";
    document.getElementById('btn-start').style.display = "none";
    document.getElementById('pane-setup').style.display = "block";
    document.getElementById('pane-play').style.display = "none";
}

window.drawInputs = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const container = document.getElementById('pInputs'); container.innerHTML = "";
    if(isNaN(cnt) || cnt < 3 || cnt > 10) { document.getElementById('btn-start').style.display="none"; return; }
    for(let i=0; i<cnt; i++) {
        container.innerHTML += `<select id="ps-${i}" onchange="refreshExclusion()"><option value="" selected disabled>Player ${i+1}</option>${PLRS.map(p=>`<option value="${p}">${p}</option>`).join('')}<option value="C">Custom</option></select><input type="text" id="pc-${i}" style="display:none" placeholder="Enter Name">`;
    }
    document.getElementById('btn-start').style.display="block";
};

window.refreshExclusion = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const used = [];
    for(let i=0; i<cnt; i++) {
        const v = document.getElementById(`ps-${i}`).value;
        if(v && v !== "C") used.push(v);
        document.getElementById(`pc-${i}`).style.display = (v === "C" ? "block" : "none");
    }
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`ps-${i}`);
        Array.from(sel.options).forEach(opt => { if(opt.value && opt.value !== "C") opt.disabled = used.includes(opt.value) && sel.value !== opt.value; });
    }
};

window.goScoring = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const body = document.getElementById('table-score-body'); body.innerHTML = "";
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`ps-${i}`).value;
        const name = (sel === 'C' ? document.getElementById(`pc-${i}`).value : sel);
        if(!name) return alert("Fill all player names");
        body.innerHTML += `<tr><td><b>${name}</b></td><td><select class="rank-sel" data-player="${name}">
            <option value="99" selected>Other (1 Pt)</option>
            <option value="1">1st (10 Pts)</option>
            <option value="2">2nd (5 Pts)</option>
            ${cnt > 3 ? '<option value="3">3rd (3 Pts)</option>' : ''}
            <option value="0">Last (0 Pts)</option>
        </select></td></tr>`;
    }
    document.getElementById('pane-setup').style.display="none"; document.getElementById('pane-play').style.display="block";
};

window.saveWeightedResult = async () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const results = [];
    let wName = '', lName = '';
    document.querySelectorAll('.rank-sel').forEach(sel => {
        const rank = parseInt(sel.value);
        const name = sel.getAttribute('data-player');
        let pts = 1;
        if(rank === 1) { pts = 10; wName = name; }
        else if(rank === 2) pts = 5;
        else if(rank === 3) pts = 3;
        else if(rank === 0) { pts = 0; lName = name; }
        results.push({ name, rank, pts });
    });
    if(!wName || !lName) return alert("Pick 1st and Last!");
    await addDoc(gRef, { gameType: activeMode, pCount: cnt, players: results, winner: wName, last: lName, time: new Date().toISOString(), secret: PASS });
    location.reload();
};

window.newSeries28 = () => {
    const o = TMS.map(t => `<option value="${t}">${t}</option>`).join("");
    const h = `<div class="modal-box"><h3>28 Setup</h3>
        <select id="mTarget"><option value="5">First to 5</option><option value="10">First to 10</option></select>
        <select id="mT1" onchange="filterTMS()"><option value="" selected disabled>Team 1</option>${o}</select>
        <select id="mT2"><option value="" selected disabled>Team 2</option>${o}</select>
        <button class="neu-btn primary" style="width:100%; margin-top:10px" onclick="conf28()">Start</button>
        <button class="neu-btn" style="width:100%; margin-top:10px" onclick="closeM()">Close</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
};

window.filterTMS = () => {
    const t1 = document.getElementById('mT1').value;
    Array.from(document.getElementById('mT2').options).forEach(o => { if(o.value) o.disabled = t1.split(' & ').some(m => o.value.includes(m)); });
};

window.conf28 = async () => {
    const t1 = document.getElementById('mT1').value, t2 = document.getElementById('mT2').value, target = document.getElementById('mTarget').value;
    await addDoc(gRef, { seriesId: "s_"+Date.now(), isInit: true, teamA: t1, teamB: t2, seriesTarget: parseInt(target), time: new Date().toISOString(), secret: PASS });
    closeM();
};

window.render28 = () => {
    const seriesMap = {};
    allG.filter(g => !g.gameType || g.gameType === '28').forEach(g => {
        if (!seriesMap[g.seriesId]) seriesMap[g.seriesId] = { id: g.seriesId, target: 5, wins: {}, teamA: '', teamB: '', stop: false };
        if (g.isInit) { seriesMap[g.seriesId].teamA = g.teamA; seriesMap[g.seriesId].teamB = g.teamB; seriesMap[g.seriesId].target = g.seriesTarget; }
        else if (g.manualEnd) seriesMap[g.seriesId].stop = true;
        else if (g.winner) seriesMap[g.seriesId].wins[g.winner] = (seriesMap[g.seriesId].wins[g.winner] || 0) + 1;
    });
    const list = document.getElementById('list-28'); if(!list) return; list.innerHTML = "";
    Object.values(seriesMap).filter(s => s.teamA && !s.stop && !Object.values(s.wins).some(w => w >= s.target)).forEach(s => {
        const wA = s.wins[s.teamA] || 0, wB = s.wins[s.teamB] || 0;
        list.innerHTML += `<div class="card"><div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
            <div style="text-align:center; flex:1"><b>${s.teamA}</b><div class="score-val">${wA}</div></div>
            <div style="font-weight:900; color:var(--muted)">VS</div>
            <div style="text-align:center; flex:1"><b>${s.teamB}</b><div class="score-val">${wB}</div></div></div>
            <div style="display:flex; gap:8px;">
                <button class="neu-btn primary" style="flex:1" onclick="score28('${s.id}','${s.teamA}','${s.teamB}')">Win ${s.teamA.split(' ')[0]}</button>
                <button class="neu-btn primary" style="flex:1; background:var(--gold)" onclick="score28('${s.id}','${s.teamB}','${s.teamA}')">Win ${s.teamB.split(' ')[0]}</button>
                <button class="neu-btn danger" onclick="resetSystem('SERIES', '${s.id}')">STOP</button>
            </div></div>`;
    });
};

window.score28 = async (id, w, l) => { await addDoc(gRef, { seriesId: id, winner: w, loser: l, time: new Date().toISOString(), secret: PASS }); };

// POWER BI STATS & RESET CONTROL
window.openDeepStats = (m, pSize = 'ALL') => {
    const is28 = m === '28';
    let data = allG.filter(g => (is28 ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner);
    if(pSize !== 'ALL') data = data.filter(g => g.pCount === parseInt(pSize));

    const st = {};
    data.forEach(g => {
        if(is28) {
            [g.winner, g.loser].forEach(p => { if(!st[p]) st[p] = {w:0, l:0, pts:0, t:0} });
            st[g.winner].w++; st[g.loser].l++; st[g.winner].t++; st[g.loser].t++;
        } else if(g.players) {
            g.players.forEach(p => {
                if(!st[p.name]) st[p.name] = {w:0, l:0, pts:0, t:0};
                st[p.name].pts += p.pts; st[p.name].t++;
                if(p.rank === 1) st[p.name].w++; if(p.rank === 0) st[p.name].l++;
            });
        }
    });

    const sorted = Object.keys(st).sort((a,b) => is28 ? st[b].w - st[a].w : st[b].pts - st[a].pts);
    const mvp = sorted[0] || '—';
    const tgt = Object.keys(st).sort((a,b) => st[b].l - st[a].l)[0] || '—';

    let h = `<div class="modal-box"><h3>${m} Dashboard</h3>
        <select onchange="openDeepStats('${m}', this.value)" style="margin-bottom:15px">
            <option value="ALL" ${pSize==='ALL'?'selected':''}>Combined All Tourneys</option>
            ${[3,4,5,6,7,8,9,10].map(n => `<option value="${n}" ${pSize==''+n?'selected':''}>${n} Player Tournament</option>`).join('')}
        </select>
        <div class="dash-grid">
            <div class="tile"><small>${is28?'WIN KING':'POINTS KING'}</small><div class="val">${mvp}</div></div>
            <div class="tile"><small>💩 LAST KING</small><div class="val">${tgt}</div></div>
            <div class="tile" style="grid-column: span 2"><small>🎮 GAMES RECORDED</small><div class="val">${data.length}</div></div>
        </div>`;

    sorted.forEach(n => {
        const d = st[n]; const wP = (d.w/d.t)*100, lP = (d.l/d.t)*100;
        h += `<div class="analytics-row"><div style="display:flex; justify-content:space-between; font-size:10px"><b>${n}</b><span>${is28 ? d.w+' Wins' : d.pts+' Pts'}</span></div>
              <div class="bar-container"><div class="b-win" style="width:${wP}%"></div><div class="b-last" style="width:${lP}%"></div></div></div>`;
    });

    h += `<h4 style="margin-top:15px">History (Tap 🗑️ to delete)</h4>`;
    data.slice(-10).reverse().forEach(g => h += `<div class="log-item"><div style="font-size:10px">${new Date(g.time).toLocaleDateString()} - 🏆 ${g.winner}</div><button class="neu-btn small danger" onclick="resetSystem('ROUND', '${g.time}')">🗑️</button></div>`);
    
    h += `<div style="display:flex; gap:10px; margin-top:20px;">
            <button class="neu-btn danger" style="flex:1" onclick="resetSystem('GAME', '${m}')">⚠️ Reset ${m}</button>
            <button class="neu-btn primary" style="flex:1" onclick="closeM()">Close</button>
          </div></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
};

window.renderGlobalTiles = () => {
    const f = (m) => allG.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner).length;
    document.getElementById('summary-tiles').innerHTML = `
        <div class="card" onclick="openDeepStats('28')">🏏 <b>28</b> - ${f('28')} Series</div>
        <div class="card" onclick="openDeepStats('Bluff')">🃏 <b>Bluff</b> - ${f('Bluff')} Rounds</div>
        <div class="card" onclick="openDeepStats('UNO')">🌈 <b>UNO</b> - ${f('UNO')} Rounds</div>`;
};

window.resetSystem = async (type, id = '') => {
    if(prompt(`Enter Password to ${type}:`) !== PASS) return;
    let q;
    if(type === 'ALL') q = query(gRef);
    else if(type === 'GAME') q = query(gRef, where("gameType", "==", id));
    else if(type === 'SERIES') {
        const snap = await getDocs(query(gRef, where("seriesId", "==", id)));
        snap.forEach(async d => await addDoc(gRef, { seriesId: id, manualEnd: true, time: new Date().toISOString(), secret: PASS }));
        return;
    }
    else if(type === 'ROUND') q = query(gRef, where("time", "==", id));
    
    const snap = await getDocs(q);
    snap.forEach(async d => await deleteDoc(d.ref));
    if(type !== 'ROUND') location.reload(); else closeM();
};

window.closeM = () => document.getElementById('modal-container').innerHTML = "";

onSnapshot(query(gRef, orderBy("time")), snap => {
    allG = snap.docs.map(d => d.data());
    render28();
});
</script>
</body>
</html>
