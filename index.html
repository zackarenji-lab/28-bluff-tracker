<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg1:#061226; --bg2:#081b31; --card:#0e2336;
    --muted:#9fb7bf; --accent:#2ecc71; --gold:#ffd36d; --danger:#ff6b6b; --info: #3498db;
  }
  html,body{height:100%;margin:0;font-family:Inter,-apple-system,sans-serif;background:radial-gradient(circle at 10% 10%,var(--bg1),var(--bg2) 60%);color:#e6eef3;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:800px;margin:15px auto;padding:15px;}
  header{display:flex;align-items:center;gap:10px;margin-bottom:15px}
  .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#ffd36d);display:flex;align-items:center;justify-content:center;font-weight:800;color:#07111a;}
  h1{margin:0;font-size:16px;flex:1}
  
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02)); border-radius:14px;padding:15px;box-shadow: 8px 8px 32px rgba(2,6,12,0.6); border:1px solid rgba(255,255,255,0.03); margin-bottom: 15px;}
  .hero-img { width:100%; border-radius:10px; display:block; margin-bottom:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .game-box { aspect-ratio: 1/1; background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
  .game-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
  .game-name-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); color: #fff; font-size: 8px; font-weight: 800; padding: 4px 0; text-transform: uppercase; text-align: center; }

  .analytics-row { margin-bottom: 10px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; }
  .analytics-meta { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; }
  .bar-container { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; display: flex; }
  .b-win { height: 100%; background: var(--accent); }
  .b-run { height: 100%; background: var(--info); }
  .b-last { height: 100%; background: var(--danger); }

  .neu-btn { background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.1)); border-radius:8px; border:none; padding:8px 12px; color:#e6eef3; font-weight:700; cursor:pointer; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
  .neu-btn.primary { background: var(--accent); color: #061226; }
  .neu-btn.danger { color: var(--danger); border: 1px solid rgba(255,107,107,0.2); }

  select, input { background: #fff !important; color: #000 !important; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: 600; border: none; font-size: 13px; }
  .score-val { font-size: 24px; font-weight: 800; color: var(--gold); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
  .modal-box { background: #0b1622; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
  
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">GZ</div>
    <h1>Gaming Zone</h1>
    <button class="neu-btn small" onclick="showView('OVERALL')">📊 Overall Stat</button>
    <button id="btn-home" class="neu-btn small" style="display:none" onclick="location.reload()">🏠 Home</button>
  </header>

  <img src="bluffmasters.png" alt="Bluff Masters" class="hero-img"/>

  <section id="view-HOME">
    <div class="card">
      <h2 style="margin:0 0 10px 0; font-size:12px; text-align:center; color: var(--gold); letter-spacing: 1px;">CHOOSE YOUR GAME</h2>
      <div class="game-grid">
        <div class="game-box" onclick="launchGame('28')"><img src="28 button.png" alt="28"><div class="game-name-overlay">28 Game</div></div>
        <div class="game-box" onclick="launchGame('Bluff')"><img src="bluff button.png" alt="Bluff"><div class="game-name-overlay">Bluff</div></div>
        <div class="game-box" onclick="launchGame('UNO')"><img src="uno button.png" alt="UNO"><div class="game-name-overlay">UNO</div></div>
      </div>
    </div>
  </section>

  <section id="view-28" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size:16px;">28 Active Series</h2>
        <button class="neu-btn small" onclick="openDeepStats('28')">📊 Stats</button>
      </div>
      <div id="list-28"></div>
      <button class="neu-btn primary" style="width:100%; margin-top:10px;" onclick="newSeries28()">➕ New Series</button>
    </div>
  </section>

  <section id="view-INDIV" style="display:none;">
    <div class="card" id="pane-setup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 id="indiv-title" style="margin:0; font-size:16px;">Setup</h3>
            <button class="neu-btn small" onclick="openDeepStats(window.activeMode)">📊 Stats</button>
        </div>
        <select id="pCnt" onchange="drawInputs()"><option value="0">Select Player Count</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
        <div id="pInputs"></div>
        <button id="btn-start" class="neu-btn primary" style="width:100%; display:none;" onclick="goPlay()">Start Playing</button>
    </div>
    <div class="card" id="pane-play" style="display:none;">
        <table><thead><tr><th>Player</th><th>W 🏆</th><th>L 💩</th></tr></thead><tbody id="table-score"></tbody></table>
        <button class="neu-btn primary" style="width:100%; margin-top:15px" onclick="saveIndiv()">Save Result</button>
    </div>
  </section>

  <section id="view-OVERALL" style="display:none;">
    <div class="card">
        <h2 style="margin:0 0 15px 0; font-size:16px; text-align:center;">Analytics Hub</h2>
        <div id="summary-tiles"></div>
        <button class="neu-btn danger" style="width:100%; margin-top:15px" onclick="resetSystem()">⚠️ Emergency Reset (All Data)</button>
    </div>
  </section>
</div>

<div id="modal-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const SEC = "zachariahrenji";
const PLRS = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];
const TMS = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gRef = collection(db, "games");
let allG = [];
window.activeMode = '';

window.showView = (v) => {
    ['HOME','28','INDIV','OVERALL'].forEach(x => document.getElementById('view-'+x).style.display = (x===v?'block':'none'));
    document.getElementById('btn-home').style.display = (v==='HOME'?'none':'block');
    if(v==='OVERALL') renderGlobalDash();
};

window.launchGame = (m) => { window.activeMode = m; showView(m==='28'?'28':'INDIV'); };

// 28 SERIES LOGIC
window.newSeries28 = () => {
    const o = TMS.map(t => `<option value="${t}">${t}</option>`).join("");
    const h = `<div class="modal-box"><h3>28 Series Setup</h3>
               <small>Series Target</small>
               <select id="mTarget"><option value="5">First to 5</option><option value="10">First to 10</option></select>
               <small>Team 1</small>
               <select id="mT1" onchange="filterT2()"><option value="" selected disabled>Select Team 1</option>${o}</select>
               <small>Team 2</small>
               <select id="mT2"><option value="" selected disabled>Select Team 2</option>${o}</select>
               <button class="neu-btn primary" style="width:100%; margin-top:10px" onclick="confirm28()">Start Series</button>
               <button class="neu-btn small" style="width:100%; margin-top:10px" onclick="closeModal()">Cancel</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
};

window.filterT2 = () => {
    const t1 = document.getElementById('mT1').value;
    const t2Sel = document.getElementById('mT2');
    const members = t1.split(' & ');
    Array.from(t2Sel.options).forEach(opt => {
        if(!opt.value) return;
        const isConflict = members.some(m => opt.value.includes(m));
        opt.style.display = isConflict ? 'none' : 'block';
    });
};

window.confirm28 = async () => {
    const t1 = document.getElementById('mT1').value, t2 = document.getElementById('mT2').value, target = document.getElementById('mTarget').value;
    if(!t1 || !t2) return alert("Select both teams");
    await addDoc(gRef, { seriesId: "s_"+Date.now(), isInit: true, teamA: t1, teamB: t2, seriesTarget: parseInt(target), time: new Date().toISOString(), secret: SEC });
    closeModal();
};

window.stopSeries = async (id) => {
    if(prompt("Enter Admin Password to STOP series:") === SEC) {
        await addDoc(gRef, { seriesId: id, manualEnd: true, time: new Date().toISOString(), secret: SEC });
    }
};

window.render28 = () => {
    const series = {};
    allG.filter(g => !g.gameType || g.gameType === '28').forEach(g => {
        if (!series[g.seriesId]) series[g.seriesId] = { id: g.seriesId, target: g.seriesTarget || 5, wins: {}, teamA: g.teamA, teamB: g.teamB, isRandom: false };
        if (g.isInit) { series[g.seriesId].teamA = g.teamA; series[g.seriesId].teamB = g.teamB; series[g.seriesId].target = g.seriesTarget || 5; }
        else if (g.manualEnd) { series[g.seriesId].isRandom = true; }
        else if (g.winner) { series[g.seriesId].wins[g.winner] = (series[g.seriesId].wins[g.winner] || 0) + 1; }
    });
    const active = Object.values(series).filter(s => !Object.values(s.wins).some(w => w >= s.target) && !s.isRandom);
    const container = document.getElementById("list-28"); if(!container) return; container.innerHTML = "";
    active.forEach(s => {
        const wA = s.wins[s.teamA] || 0, wB = s.wins[s.teamB] || 0;
        container.innerHTML += `<div class="card"><div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <div><b>${s.teamA}</b><div class="score-val">${wA}</div></div><div><b>${s.teamB}</b><div class="score-val">${wB}</div></div></div>
            <div style="display:flex; gap:8px;"><button class="neu-btn primary" onclick="win28('${s.id}','${s.teamA}','${s.teamB}')">Win ${s.teamA.split(' ')[0]}</button>
            <button class="neu-btn primary" style="background:var(--gold)" onclick="win28('${s.id}','${s.teamB}','${s.teamA}')">Win ${s.teamB.split(' ')[0]}</button>
            <button class="neu-btn danger small" onclick="stopSeries('${s.id}')">STOP</button></div></div>`;
    });
};
window.win28 = async (id, w, l) => { await addDoc(gRef, { seriesId: id, winner: w, loser: l, time: new Date().toISOString(), secret: SEC }); };

// INDIV/BLUFF/UNO
window.drawInputs = () => {
    const c = parseInt(document.getElementById('pCount').value);
    const container = document.getElementById('pInputs'); container.innerHTML = "";
    if(c < 1) return document.getElementById('btn-start').style.display="none";
    for(let i=0; i<c; i++) container.innerHTML += `<select id="psel-${i}"><option value="" disabled selected>Player ${i+1}</option>${PLRS.map(p=>`<option value="${p}">${p}</option>`).join('')}</select>`;
    document.getElementById('btn-start').style.display="block";
};
window.goPlay = () => {
    const c = parseInt(document.getElementById('pCount').value); const body = document.getElementById('table-score'); body.innerHTML = "";
    for(let i=0; i<c; i++) {
        const name = document.getElementById(`psel-${i}`).value; if(!name) return alert("Select all");
        body.innerHTML += `<tr><td><b>${name}</b></td><td><input type="radio" name="win" value="${name}"></td><td><input type="radio" name="lost" value="${name}"></td></tr>`;
    }
    document.getElementById('pane-setup').style.display="none"; document.getElementById('pane-play').style.display="block";
};
window.saveIndiv = async () => {
    const w = document.querySelector('input[name="win"]:checked')?.value;
    const l = document.querySelector('input[name="lost"]:checked')?.value;
    if(!w || !l || w===l) return alert("Pick Win & Last");
    const run = []; document.querySelectorAll('#table-score tr').forEach(r => { if(r.cells[0].innerText!==w && r.cells[0].innerText!==l) run.push(r.cells[0].innerText); });
    await addDoc(gRef, { gameType: window.activeMode, winner: w, last: l, runnersUp: run, time: new Date().toISOString(), secret: SEC });
    location.reload();
};

// DELETE INDIVIDUAL GAME LOGIC
window.deleteGame = async (gameTime) => {
    if(prompt("Enter Password to DELETE this round:") === SEC) {
        const q = query(gRef, orderBy("time"));
        const snap = await getDocs(q);
        snap.forEach(async (d) => {
            if(d.data().time === gameTime) {
                await deleteDoc(doc(db, "games", d.id));
                alert("Game Deleted");
                closeModal();
            }
        });
    }
};

// STATS
window.openDeepStats = (m) => {
    const filtered = allG.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner);
    const st = {};
    filtered.forEach(g => {
        const w = g.winner, l = g.last || g.loser;
        [w, l, ...(g.runnersUp || [])].forEach(p => { if(!st[p]) st[p] = {w:0, l:0, r:0, t:0} });
        st[w].w++; st[l].l++; st[w].t++; st[l].t++; (g.runnersUp || []).forEach(p => { st[p].r++; st[p].t++; });
    });
    let h = `<div class="modal-box"><h3>${m} Analysis</h3>`;
    Object.entries(st).sort((a,b)=>b[1].w-a[1].w).forEach(([n, d]) => {
        const wP = (d.w/d.t)*100, rP = (d.r/d.t)*100, lP = (d.l/d.t)*100;
        h += `<div class="analytics-row"><div class="analytics-meta"><span><b>${n}</b></span><span>${d.w} Wins</span></div>
              <div class="bar-container"><div class="b-win" style="width:${wP}%"></div><div class="b-run" style="width:${rP}%"></div><div class="b-last" style="width:${lP}%"></div></div></div>`;
    });
    h += `<h4 style="margin:15px 0 5px 0">Match History (Tap to Delete)</h4>`;
    filtered.slice(-15).reverse().forEach(g => h += `<div onclick="deleteGame('${g.time}')" style="font-size:10px; padding:8px 0; border-bottom:1px solid #ffffff10; cursor:pointer">🏆 ${g.winner} | 💩 ${g.last||g.loser} <span style="color:var(--danger)">🗑️</span></div>`);
    h += `<button class="neu-btn primary" style="width:100%; margin-top:15px" onclick="closeModal()">Close</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div class="overlay">${h}</div>`;
};

window.renderGlobalDash = () => {
    const f = (m) => allG.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner).length;
    document.getElementById('summary-tiles').innerHTML = `
        <div class="card" onclick="openDeepStats('28')">🏏 <b>28</b> - ${f('28')} Series Completed</div>
        <div class="card" onclick="openDeepStats('Bluff')">🃏 <b>Bluff</b> - ${f('Bluff')} Rounds Played</div>
        <div class="card" onclick="openDeepStats('UNO')">🌈 <b>UNO</b> - ${f('UNO')} Rounds Played</div>`;
};

window.closeModal = () => document.getElementById('modal-container').innerHTML = "";

onSnapshot(query(gRef, orderBy("time")), snap => {
    allG = snap.docs.map(d => d.data());
    render28();
    if(document.getElementById('view-OVERALL').style.display === 'block') renderGlobalDash();
});

window.resetSystem = async () => { if(prompt("Final Warning! Enter Password to RESET ALL DATA:") === SEC) { const s = await getDocs(gRef); s.forEach(async (d) => await deleteDoc(d.ref)); location.reload(); } };
</script>
</body>
</html>
