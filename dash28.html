<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - 28 Elite Arena</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  :root {
    --bg: #0d0d1a; --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    --neon-green: #3fff3f; --danger: #ff4d4d;
    --grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
  }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .wrap { max-width: 1200px; margin: auto; padding: 20px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .nav-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 10px; border: 1px solid rgba(255,211,109,0.3); padding: 10px 18px; border-radius: 30px; text-transform: uppercase; }

  .game-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
  .g-tab { padding: 16px; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; text-transform: uppercase; background: var(--glass); color: var(--muted); border: 1px solid rgba(255,255,255,0.05); }
  .g-tab.active { background: var(--grad); color: white; box-shadow: 0 10px 20px rgba(61, 61, 255, 0.3); transform: translateY(-4px); }

  .panel { background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.08); }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; outline: none; }

  .top-grid { display: grid; grid-template-columns: 380px 1fr; gap: 25px; margin-bottom: 40px; align-items: stretch; }
  .hof-card { background: linear-gradient(160deg, #111122 0%, #1a1a3a 100%); border-radius: 24px; padding: 30px; border: 1px solid rgba(123, 44, 191, 0.3); text-align: center; }
  .hof-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 10px; }
  
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .k-tile { padding: 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
  .k-tile small { font-size: 8px; font-weight: 900; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 5px; letter-spacing: 1px; }
  .k-tile .val { font-size: 13px; font-weight: 900; color: #fff; text-transform: uppercase; line-height: 1.2; }
  .k-tile .sub { font-size: 10px; color: var(--cyan); margin-top: 4px; font-weight: 800; }

  .rank-row { background: rgba(255, 255, 255, 0.03); margin-bottom: 12px; padding: 20px; border-radius: 20px; display: grid; grid-template-columns: 50px 1fr 100px; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.05); }
  .num { font-weight: 900; color: var(--cyan); font-size: 24px; }
  .p-chart-container { height: 26px; background: rgba(255, 255, 255, 0.05); border-radius: 13px; position: relative; overflow: hidden; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }
  .p-chart-fill { height: 100%; background: linear-gradient(to right, #bc13fe, #3a86ff); width: 0%; transition: width 1s ease; }
  .bubble-wins { position: absolute; right: 5px; top: 3px; background: var(--cyan); color: #000; font-weight: 900; font-size: 11px; padding: 2px 8px; border-radius: 10px; box-shadow: 0 0 10px var(--cyan); }
  
  .neon-stats { display: flex; gap: 15px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
  .n-w { color: var(--neon-green); } .n-l { color: var(--danger); } .n-s2 { color: var(--accent); } .n-s3 { color: #ff00ff; }
  .score-box { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 24px; text-align: center; }

  @media (max-width: 900px) { .top-grid { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <a href="index.html" class="nav-link">🏠 HOME</a>
    <div style="font-weight:900; letter-spacing:2px; color:var(--cyan); font-size: 14px;">28 ELITE COMMAND</div>
    <div class="nav-link" onclick="takeSnapshot()" style="cursor:pointer">📸 SNAPSHOT</div>
  </header>

  <div class="game-tabs">
    <div class="g-tab" onclick="window.location.href='dashboard.html?mode=UNO'">Uno Cards</div>
    <div class="g-tab" onclick="window.location.href='dashboard.html?mode=Bluff'">Bluff Game</div>
    <div class="g-tab active">28 Card</div>
  </div>

  <div class="panel">
    <select id="lineupFilter" onchange="render28()"></select>
  </div>

  <div class="top-grid">
    <div class="hof-card">
      <div style="font-size:35px; margin-bottom:10px;">🏆</div>
      <h3 style="margin:0 0 20px 0; color:var(--accent); letter-spacing:3px; font-size: 14px;">TEAM ELITE HALL</h3>
      <div id="podium-list"></div>
    </div>
    <div class="kpi-grid" id="kpi-container"></div>
  </div>

  <h3 style="text-transform:uppercase; letter-spacing:2px; font-size:14px; margin-bottom:20px; color: var(--muted);">Live Team Rankings</h3>
  <div id="leaderboard-container"></div>
</div>

<script>
  // CONFIG
  const firebaseConfig = { 
    apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", 
    authDomain: "bluff-tracker-7542e.firebaseapp.com", 
    projectId: "bluff-tracker-7542e", 
    storageBucket: "bluff-tracker-7542e.appspot.com", 
    messagingSenderId: "280965687037", 
    appId: "1:280965687037:web:be0b05da36ef653ab68094" 
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  let allData = [];

  window.takeSnapshot = () => {
    html2canvas(document.body, { backgroundColor: "#0d0d1a" }).then(canvas => {
      const link = document.createElement('a');
      link.download = `GZ_28_Elite.png`; link.href = canvas.toDataURL(); link.click();
    });
  };

  window.render28 = () => {
    // UPDATED FILTER: Check seriesId OR gameType '28'
    const matches = allData.filter(g => (g.gameType === '28' || g.seriesId) && g.winner && g.loser);
    
    if (matches.length === 0) {
        document.getElementById('leaderboard-container').innerHTML = "<div style='text-align:center; padding:50px; color:var(--muted); font-weight:900;'>SYNCING DATA... (CHECK CONSOLE F12)</div>";
        return;
    }

    const tourneys = {};
    allData.forEach(g => {
      if(g.seriesId && g.teamA) {
        const type = g.seriesTarget === 10 ? "10s" : "5s";
        tourneys[g.seriesId] = { name: `${g.teamA} VS ${g.teamB}`, type: type };
      }
    });

    const dropdown = document.getElementById('lineupFilter');
    const filter = dropdown.value || "ALL";
    const uniqueIDs = [...new Set(matches.map(m => m.seriesId).filter(i => i))];
    
    dropdown.innerHTML = `<option value="ALL">Total Combined Statistics</option>` + 
      uniqueIDs.map(id => `<option value="${id}" ${id===filter?'selected':''}>[${tourneys[id]?.type || '5s'}] ${tourneys[id]?.name || id}</option>`).join('');

    const filtered = (filter === "ALL" ? matches : matches.filter(m => m.seriesId === filter))
                     .sort((a, b) => (a.time || 0) - (b.time || 0));

    const stats = {};
    let lastWinner = null;
    let streakCount = 0;
    let hatrickCombo = "—";

    filtered.forEach(m => {
      [m.winner, m.loser].forEach(team => {
        if(!stats[team]) stats[team] = { w: 0, l: 0, t: 0, s2: 0, s3: 0, m5: 0, m10: 0 };
      });
      
      stats[m.winner].w++;
      stats[m.loser].l++;
      stats[m.winner].t++;
      stats[m.loser].t++;

      const tType = tourneys[m.seriesId]?.type || "5s";
      if(tType === "10s") { stats[m.winner].m10++; stats[m.loser].m10++; }
      else { stats[m.winner].m5++; stats[m.loser].m5++; }

      if(m.is28Plus2) stats[m.winner].s2++;
      if(m.is28Plus3) stats[m.winner].s3++;

      if(m.winner === lastWinner) {
        streakCount++;
        if(streakCount >= 3) hatrickCombo = m.winner;
      } else {
        lastWinner = m.winner;
        streakCount = 1;
      }
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].w - stats[a].w);
    const lossSorted = [...Object.keys(stats)].sort((a,b) => stats[b].l - stats[a].l);

    const hi = sorted[0] || '—';
    const lo = sorted[sorted.length - 1] || '—';
    const bad = lossSorted[0] || '—';

    // RENDER KPI GRID
    document.getElementById('kpi-container').innerHTML = `
      <div class="k-tile"><small>1. Highest Winners</small><div class="val">${hi}</div><div class="sub">${stats[hi]?.w || 0} Wins (${stats[hi]?.m5 || 0}x5s, ${stats[hi]?.m10 || 0}x10s)</div></div>
      <div class="k-tile"><small>2. Lowest Winners</small><div class="val">${lo}</div><div class="sub">${stats[lo]?.w || 0} Wins</div></div>
      <div class="k-tile"><small>3. Max 28 Streaks</small><div class="val">Team A</div><div class="sub">Count: 00 (Dummy)</div></div>
      <div class="k-tile"><small>4. Highest Combo</small><div class="val">${hi}</div><div class="sub">Dominant pairing</div></div>
      <div class="k-tile"><small>5. Most Losses</small><div class="val">${bad}</div><div class="sub">${stats[bad]?.l || 0} Total Losses</div></div>
      <div class="k-tile" style="border: 1px solid var(--cyan)"><small>6. Hatrick Win</small><div class="val">${hatrickCombo}</div><div class="sub">3 Consecutive Wins</div></div>
    `;

    // ELITE HALL
    document.getElementById('podium-list').innerHTML = sorted.slice(0,3).map((n, i) => `
      <div class="hof-item">
        <b style="color:var(--accent); width:25px;">#${i+1}</b>
        <span style="flex:1; text-align:left; font-size:11px; font-weight:900;">${n}</span>
        <span style="color:var(--cyan); font-weight:900;">${stats[n].w} W</span>
      </div>`).join('');

    // LIVE RANKINGS
    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
      const d = stats[n];
      const winP = d.t > 0 ? ((d.w/d.t)*100).toFixed(0) : 0;
      return `
      <div class="rank-row">
        <div class="num">#${i+1}</div>
        <div>
          <div style="font-weight:900; text-transform:uppercase; font-size:13px; letter-spacing:1px;">${n}</div>
          <div class="p-chart-container">
            <div class="p-chart-fill" style="width:${winP}%"></div>
            <div class="bubble-wins">${d.w} Wins</div>
          </div>
          <div class="neon-stats">
            <span class="n-w">W: ${String(d.w).padStart(2,'0')}</span>
            <span class="n-l">L: ${String(d.l).padStart(2,'0')}</span>
            <span class="n-s2">28(+2): ${String(d.s2).padStart(2,'0')}</span>
            <span class="n-s3">28(+3): ${String(d.s3).padStart(2,'0')}</span>
          </div>
        </div>
        <div class="score-box">${d.w}</div>
      </div>`;
    }).join('');
  };

  // FETCH DATA
  db.collection("games").orderBy("time", "desc").onSnapshot(snap => {
    allData = snap.docs.map(d => d.data());
    console.log("Data loaded:", allData.length, "games found.");
    render28();
  }, err => {
    console.error("Firebase Connection Error:", err);
  });
</script>
</body>
</html>
