<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - 28 Team Dashboard</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0d0d1a; --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    --neon-green: #3fff3f; --danger: #ff4d4d;
    --grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
  }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .wrap { max-width: 1100px; margin: auto; padding: 20px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .nav-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 10px; border: 1px solid rgba(255,211,109,0.3); padding: 10px 18px; border-radius: 30px; text-transform: uppercase; }
  
  .game-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
  .g-tab { padding: 16px; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; text-transform: uppercase; background: var(--glass); color: var(--muted); border: 1px solid rgba(255,255,255,0.05); }
  .g-tab.active { background: var(--grad); color: white; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(61, 61, 255, 0.3); }

  .panel { background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.08); }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; outline: none; }

  .top-grid { display: grid; grid-template-columns: 380px 1fr; gap: 25px; margin-bottom: 40px; align-items: stretch; }
  .hof-card { background: linear-gradient(160deg, #111122 0%, #1a1a3a 100%); border-radius: 24px; padding: 30px; border: 1px solid rgba(123, 44, 191, 0.3); text-align: center; }
  .hof-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 10px; }
  
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .k-tile { padding: 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); display: flex; flex-direction: column; justify-content: center; }
  .k-tile small { font-size: 9px; font-weight: 900; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 8px; }
  .k-tile .val { font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; }

  .rank-row { background: rgba(255, 255, 255, 0.02); margin-bottom: 12px; padding: 20px; border-radius: 20px; display: grid; grid-template-columns: 50px 1fr 100px; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.05); }
  .p-chart-container { height: 26px; background: rgba(255, 255, 255, 0.05); border-radius: 13px; position: relative; overflow: hidden; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }
  .p-chart-fill { height: 100%; background: linear-gradient(to right, #bc13fe, #3a86ff); width: 0%; transition: width 1s ease; }
  .perc-label { position: absolute; right: 8px; top: 4px; font-size: 10px; font-weight: 900; color: #000; background: var(--cyan); padding: 2px 6px; border-radius: 6px; }
  
  .neon-stats { display: flex; gap: 15px; font-size: 11px; font-weight: 900; text-transform: uppercase; }
  .n-w { color: var(--neon-green); } .n-l { color: var(--danger); } .n-28 { color: var(--accent); }
  .score-box { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 24px; text-align: center; }

  @media (max-width: 900px) { .top-grid { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <a href="index.html" class="nav-link">🏠 HOME</a>
    <div style="font-weight:900; letter-spacing:2px; color:var(--cyan)">28 ELITE DASHBOARD</div>
    <div class="share-btn" onclick="takeSnapshot()">📸 SHARE</div>
  </header>

  <div class="game-tabs">
    <div class="g-tab" onclick="window.location.href='dashboard.html?mode=UNO'">Uno Cards</div>
    <div class="g-tab" onclick="window.location.href='dashboard.html?mode=Bluff'">Bluff Game</div>
    <div class="g-tab active">28 Card</div>
  </div>

  <div class="panel">
    <select id="lineupFilter" onchange="render28()"></select>
  </div>

  <div class="top-grid">
    <div class="hof-card">
      <div style="font-size:40px; margin-bottom:10px;">🏆</div>
      <h3 style="margin:0 0 20px 0; color:var(--accent); letter-spacing:2px; font-size: 16px;">28 ELITE HALL</h3>
      <div id="podium-list"></div>
    </div>
    <div class="kpi-grid" id="kpi-container"></div>
  </div>

  <h3 style="text-transform:uppercase; letter-spacing:2px; font-size:14px; margin-bottom:20px; color: var(--muted);">Live Team Rankings</h3>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];

window.takeSnapshot = () => {
    html2canvas(document.querySelector("body"), { backgroundColor: "#0d0d1a" }).then(canvas => {
        const link = document.createElement('a');
        link.download = `GZ_28_Stats.png`; link.href = canvas.toDataURL(); link.click();
    });
};

window.render28 = () => {
    // 1. FILTER: Capture anything that looks like a 28 match (has winner AND loser)
    const matches = allData.filter(g => g.winner && g.loser);
    
    const tournaments = {};
    allData.forEach(g => { if(g.seriesId && g.teamA) tournaments[g.seriesId] = `${g.teamA} vs ${g.teamB}`; });

    const dropdown = document.getElementById('lineupFilter');
    const filter = dropdown.value || "ALL";
    const ids = [...new Set(matches.map(m => m.seriesId).filter(i => i))];
    
    dropdown.innerHTML = `<option value="ALL">Total Combined Statistics</option>` + 
        ids.map(id => `<option value="${id}" ${id===filter?'selected':''}>${tournaments[id] || 'Series: '+id}</option>`).join('');

    const filtered = filter === "ALL" ? matches : matches.filter(m => m.seriesId === filter);

    // 2. COUNT LOGIC: No points, just counting wins and losses
    const stats = {};
    filtered.forEach(m => {
        [m.winner, m.loser].forEach(team => {
            if(!stats[team]) stats[team] = { winCount: 0, lossCount: 0, streakCount: 0, totalMatches: 0 };
        });
        stats[m.winner].winCount++;
        stats[m.winner].totalMatches++;
        stats[m.loser].lossCount++;
        stats[m.loser].totalMatches++;
        
        // Count streaks if they exist in the data
        if(m.streakType && m.streakType !== 'standard') stats[m.winner].streakCount++;
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].winCount - stats[a].winCount);

    // 3. RENDER ELITE HALL
    document.getElementById('podium-list').innerHTML = sorted.length ? sorted.slice(0,3).map((name, i) => `
        <div class="hof-item">
            <b style="color:var(--accent); width:30px; font-size:16px;">#${i+1}</b>
            <span style="flex:1; text-align:left; font-size:13px; font-weight:900; text-transform:uppercase;">${name}</span>
            <span style="color:var(--cyan); font-weight:900;">${stats[name].winCount} Wins</span>
        </div>`).join('') : "<div style='opacity:0.5; padding:20px;'>Awaiting match data...</div>";

    // 4. RENDER KPI TILES
    const leader = sorted[0] || '—';
    const winRate = sorted.length ? ((stats[leader].winCount / stats[leader].totalMatches) * 100).toFixed(0) + '%' : '0%';

    document.getElementById('kpi-container').innerHTML = `
        <div class="k-tile"><small>Matches Analyzed</small><div class="val">${filtered.length}</div></div>
        <div class="k-tile" style="border-color:var(--cyan)"><small>Dominant Team</small><div class="val">${leader}</div></div>
        <div class="k-tile"><small>Leader Win Rate</small><div class="val">${winRate}</div></div>
    `;

    // 5. RENDER RANKING ROWS
    document.getElementById('leaderboard-container').innerHTML = sorted.map((name, i) => {
        const d = stats[name];
        const perc = d.totalMatches > 0 ? ((d.winCount/d.totalMatches)*100).toFixed(0) : 0;
        return `
        <div class="rank-row">
            <div style="font-weight:900; font-size:24px; color:var(--cyan)">#${i+1}</div>
            <div>
                <div style="font-weight:900; text-transform:uppercase; letter-spacing:1px; font-size:14px;">${name}</div>
                <div class="p-chart-container">
                    <div class="p-chart-fill" style="width:${perc}%"></div>
                    <span class="perc-label">${perc}%</span>
                </div>
                <div class="neon-stats">
                    <span class="n-w">W: ${String(d.winCount).padStart(2,'0')}</span>
                    <span class="n-l">L: ${String(d.lossCount).padStart(2,'0')}</span>
                    <span class="n-28">28: ${String(d.streakCount).padStart(2,'0')}</span>
                </div>
            </div>
            <div class="score-box">${d.winCount}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => { 
    allData = snap.docs.map(d => d.data()); 
    render28(); 
});
</script>
</body>
</html>
