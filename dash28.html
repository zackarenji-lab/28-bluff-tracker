<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - 28 Elite Arena</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0d0d1a; --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    --neon-green: #3fff3f; --danger: #ff4d4d;
    --grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
  }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .wrap { max-width: 1450px; margin: auto; padding: 20px; }
  
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; gap: 10px; }
  .header-btns { display: flex; gap: 10px; }
  .nav-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 10px; border: 1px solid rgba(255,211,109,0.3); padding: 10px 18px; border-radius: 30px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; white-space: nowrap; }

  .game-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
  .g-tab { padding: 16px; border-radius: 12px; text-align: center; font-weight: 900; cursor: pointer; text-transform: uppercase; background: var(--glass); color: var(--muted); border: 1px solid rgba(255,255,255,0.05); }
  .g-tab.active { background: var(--grad); color: white; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(61, 61, 255, 0.3); }

  .panel { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.08); }
  .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 15px; border-radius: 10px; color: white; width: 100%; margin-bottom: 10px; outline: none; font-size: 13px; box-sizing: border-box; }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; outline: none; font-size: 14px; }

  .rank-row { background: rgba(255, 255, 255, 0.03); margin-bottom: 15px; padding: 20px 30px; border-radius: 25px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05); gap: 20px; }
  .rank-num { font-weight: 900; color: var(--cyan); font-size: 32px; min-width: 60px; }
  .team-label { font-weight: 900; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; min-width: 220px; color: #fff; }
  
  .progress-wrap { flex-grow: 1; position: relative; height: 34px; background: rgba(255, 255, 255, 0.05); border-radius: 17px; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #8a2be2, #3a86ff); border-radius: 17px; transition: width 1s ease-in-out; }
  .perc-tag { position: absolute; right: 5px; top: 4px; background: var(--cyan); color: #000; font-weight: 900; font-size: 14px; padding: 2px 12px; border-radius: 12px; }
  
  .stats-group { display: flex; gap: 25px; text-align: center; padding: 0 10px; }
  .stat-item { display: flex; flex-direction: column; min-width: 65px; }
  .stat-label { font-size: 11px; font-weight: 900; color: var(--neon-green); margin-bottom: 8px; letter-spacing: 1px; }
  .stat-val { font-size: 22px; font-weight: 900; color: #fff; }
  
  .total-btn { background: linear-gradient(135deg, #ff4d4d, #b30000); color: white; padding: 15px 30px; border-radius: 18px; font-weight: 900; font-size: 32px; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3); min-width: 80px; text-align: center; margin-left: 10px; }

  /* MODAL */
  #detailsModal { display: none; position: fixed; inset: 0; background: rgba(5, 5, 10, 0.95); z-index: 1000; padding: 20px; overflow-y: auto; backdrop-filter: blur(10px); }
  .modal-content { background: #161b22; max-width: 900px; margin: 40px auto; border-radius: 24px; border: 1px solid var(--violet); padding: 30px; position: relative; }
  .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: var(--danger); font-weight: 900; }
  .log-row { display: grid; grid-template-columns: 50px 1.5fr 1.5fr 1fr 50px; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; gap: 15px; }
  .log-head { font-weight: 900; color: var(--cyan); text-transform: uppercase; font-size: 11px; border-bottom: 2px solid var(--violet); margin-bottom: 10px; padding-bottom: 15px; letter-spacing: 1px; }
  .del-btn { color: var(--danger); cursor: pointer; font-size: 18px; text-align: center; }

  @media (max-width: 1200px) { .rank-row { flex-wrap: wrap; height: auto; padding: 20px; } .progress-wrap { width: 100%; order: 3; } }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <a href="index.html" class="nav-link">🏠 HOME</a>
    <div style="font-weight:900; letter-spacing:2px; color:var(--cyan); font-size: 16px;">28 ELITE HUB</div>
    <div class="header-btns">
        <div class="nav-link" onclick="openDetails()" style="color:var(--cyan); border-color:var(--cyan)">📋 Game Details</div>
        <div class="nav-link" onclick="takeSnapshot()">📸 SNAP</div>
    </div>
  </header>

  <div class="game-tabs">
    <div class="g-tab" onclick="window.location.href='dashboard.html?mode=UNO'">Uno Cards</div>
    <div class="g-tab" onclick="window.location.href='dashboard.html?mode=Bluff'">Bluff Game</div>
    <div class="g-tab active">28 Card</div>
  </div>

  <div class="panel">
    <input type="text" id="tourneySearch" class="search-box" placeholder="🔍 Search Team Pairing..." oninput="updateDropdown()">
    <select id="lineupFilter" onchange="render28()"></select>
  </div>

  <div id="leaderboard-container"></div>
</div>

<div id="detailsModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeDetails()">&times;</span>
        <h2 style="color:var(--accent); text-transform:uppercase; letter-spacing:2px; margin-bottom:25px;">Match History Log</h2>
        <div class="log-row log-head">
            <div>#</div><div>Winner</div><div>Loser</div><div>Date</div><div></div>
        </div>
        <div id="modal-list"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];
let tMap = {}; 
let filteredMatches = [];

window.takeSnapshot = () => {
    html2canvas(document.body, { backgroundColor: "#0d0d1a" }).then(canvas => {
        const link = document.createElement('a');
        link.download = `GZ_28_Rankings.png`; link.href = canvas.toDataURL(); link.click();
    });
};

window.openDetails = () => {
    const list = document.getElementById('modal-list');
    list.innerHTML = [...filteredMatches].reverse().map((m, i) => {
        const d = m.time ? new Date(m.time).toLocaleDateString('en-GB', {day:'2-digit', month:'short'}) : '---';
        return `
        <div class="log-row">
            <div>${filteredMatches.length - i}</div>
            <div style="color:var(--neon-green)">${m.winner}</div>
            <div style="color:var(--danger)">${m.loser}</div>
            <div>${d}</div>
            <div class="del-btn" onclick="deleteGame('${m.id}', '${m.seriesId}')">🗑️</div>
        </div>`;
    }).join('');
    document.getElementById('detailsModal').style.display = 'block';
};

window.closeDetails = () => document.getElementById('detailsModal').style.display = 'none';

window.deleteGame = async (id, seriesId) => {
    const pw = prompt("Enter Password to Delete:");
    if(pw === "zachariahrenji") {
        try {
            await deleteDoc(doc(db, "games", id));
            // Find and un-finalize the series record so it reappears in Active List
            const q = query(gRef, where("seriesId", "==", seriesId), where("finalized", "==", true));
            const snap = await getDocs(q);
            snap.forEach(async (d) => {
                await updateDoc(doc(db, "games", d.id), { finalized: false, isReplay: true });
            });
        } catch(e) { console.error(e); }
    }
};

window.updateDropdown = () => {
    const search = document.getElementById('tourneySearch').value.toLowerCase();
    const dropdown = document.getElementById('lineupFilter');
    const savedFilter = dropdown.value;
    const labels10 = new Set();
    const labels5 = new Set();
    allData.forEach(g => {
        if(g.seriesId && g.teamA) {
            const label = `${g.teamA} VS ${g.teamB}`;
            if(label.toLowerCase().includes(search)) {
                if(g.seriesTarget === 10) labels10.add(label);
                else labels5.add(label);
            }
        }
    });
    let html = `<option value="ALL">TOTAL COMBINED STATISTICS</option>`;
    if(labels10.size > 0) {
        html += `<optgroup label="🏆 10-MATCH RIVALRIES">`;
        Array.from(labels10).sort().forEach(l => html += `<option value="${l}_10" ${l+'_10'===savedFilter?'selected':''}>${l}</option>`);
        html += `</optgroup>`;
    }
    if(labels5.size > 0) {
        html += `<optgroup label="⚡ 5-MATCH RIVALRIES">`;
        Array.from(labels5).sort().forEach(l => html += `<option value="${l}_5" ${l+'_5'===savedFilter?'selected':''}>${l}</option>`);
        html += `</optgroup>`;
    }
    dropdown.innerHTML = html;
};

window.render28 = () => {
    const matches = allData.filter(g => g.winner && g.loser);
    const filter = document.getElementById('lineupFilter').value || "ALL";
    filteredMatches = filter === "ALL" ? matches : matches.filter(m => {
        const [label, target] = filter.split('_');
        return tMap[m.seriesId]?.label === label && tMap[m.seriesId]?.target == target;
    });

    const stats = {};
    filteredMatches.forEach(m => {
        [m.winner, m.loser].forEach(team => {
            if(!stats[team]) stats[team] = { w: 0, l: 0, t: 0 };
        });
        stats[m.winner].w += (m.points || 1);
        stats[m.loser].l += (m.points || 1);
        stats[m.winner].t++; stats[m.loser].t++;
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].w - stats[a].w);
    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => {
        const d = stats[n], winP = d.t > 0 ? ((d.w/d.t)*100).toFixed(0) : 0;
        return `
        <div class="rank-row">
            <div class="rank-num">#${i+1}</div>
            <div class="team-label">${n}</div>
            <div class="progress-wrap">
                <div class="progress-fill" style="width: ${winP}%"></div>
                <div class="perc-tag">${winP}%</div>
            </div>
            <div class="stats-group">
                <div class="stat-item"><span class="stat-label">GAMES</span><span class="stat-val">${d.t}</span></div>
                <div class="stat-item"><span class="stat-label" style="color:var(--danger)">LOST</span><span class="stat-val">${d.l}</span></div>
            </div>
            <div class="total-btn">${d.w}</div>
        </div>`;
    }).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => { 
    allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    tMap = {};
    allData.forEach(g => { if(g.seriesId && g.teamA) tMap[g.seriesId] = { label: `${g.teamA} VS ${g.teamB}`, target: g.seriesTarget || 5 }; });
    updateDropdown();
    render28(); 
    if(document.getElementById('detailsModal').style.display === 'block') openDetails();
});
</script>
</body>
</html>
