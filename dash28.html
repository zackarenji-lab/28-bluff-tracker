<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - 28 Team Dashboard</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #0d0d1a 0%, #101026 40%, #05050d 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3;
    --tile-grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
  }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .wrap { max-width: 1200px; margin: auto; padding: 20px; }
  
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .home-link { text-decoration: none; color: var(--accent); font-weight: 900; font-size: 11px; border: 1px solid rgba(255,211,109,0.3); padding: 10px 20px; border-radius: 30px; background: rgba(255,211,109,0.05); text-transform: uppercase; }
  .share-btn { cursor: pointer; background: rgba(0, 245, 255, 0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px 18px; border-radius: 30px; font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }

  .panel { background: var(--glass); border-radius: 20px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
  select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; outline: none; }

  .top-grid { display: grid; grid-template-columns: 420px 1fr; gap: 25px; margin-bottom: 40px; align-items: stretch; }
  @media (max-width: 1000px) { .top-grid { grid-template-columns: 1fr; } }

  .hof-card { background: linear-gradient(160deg, #111122 0%, #1a1a3a 100%); border-radius: 24px; padding: 30px; border: 1px solid rgba(123, 44, 191, 0.3); text-align: center; }
  .cup-icon { width: 55px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,211,109,0.3)); }
  
  .hof-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 15px; }
  .hof-rank { font-weight: 900; color: var(--accent); font-size: 18px; width: 40px; text-align: left; }
  .hof-team-name { text-transform: uppercase; font-size: 11px; font-weight: 900; color: #fff; flex: 1; text-align: left; letter-spacing: 1px; line-height: 1.4; }
  .hof-wins { color: var(--cyan); font-weight: 900; font-size: 20px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; height: 100%; }
  .k-tile { padding: 25px; border-radius: 20px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
  .k-tile small { font-size: 10px; font-weight: 900; color: #fff; margin-bottom: 10px; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
  .k-tile .val { font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; line-height: 1.3; }

  .c1 { background: linear-gradient(135deg, #3d3dff, #a020f0); }
  .c2 { background: linear-gradient(135deg, #00b4d8, #0077b6); }
  .c3 { background: linear-gradient(135deg, #ef476f, #d00000); }
  .c4 { background: linear-gradient(135deg, #06d6a0, #00afb9); }

  .ranking-header { font-weight: 900; font-size: 18px; color: #fff; margin: 30px 0 20px 0; text-transform: uppercase; display: flex; align-items: center; gap: 15px; }
  .ranking-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--blue), transparent); }
  
  .rank-row { background: rgba(255, 255, 255, 0.03); margin-bottom: 12px; padding: 20px; border-radius: 20px; display: grid; grid-template-columns: 60px 1fr 140px; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.05); }
  .num { font-weight: 900; color: var(--cyan); font-size: 24px; }
  .team-txt { font-weight: 800; font-size: 14px; color: #fff; text-transform: uppercase; letter-spacing: 1px; line-height: 1.4; }
  .score-box { background: linear-gradient(135deg, #3a86ff, #7b2cbf); color: white; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 16px; text-align: center; }
</style>
</head>
<body id="capture-area">

<div class="wrap">
  <header>
    <a href="index.html" class="home-link">🏠 HOME</a>
    <div class="share-btn" onclick="takeSnapshot()">📸 Share 28 Stats</div>
  </header>

  <div class="panel">
    <div style="font-size: 10px; font-weight: 900; color: var(--accent); margin-bottom: 10px; text-transform: uppercase;">Head-to-Head Lineups</div>
    <select id="lineupFilter" onchange="render28()"></select>
  </div>

  <div class="top-grid">
    <div class="hof-card">
      <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" class="cup-icon">
      <h4 style="margin:0 0 20px 0; font-size:18px; color: var(--accent); font-weight:900; letter-spacing: 2px;">28 RIVALRY LEADERS</h4>
      <div id="podium-list"></div>
    </div>

    <div class="intel-side">
      <div class="kpi-grid" id="kpi-container"></div>
    </div>
  </div>

  <div class="ranking-header">Head-to-Head Table</div>
  <div id="leaderboard-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const gRef = collection(db, "games");

let allData = [];

window.takeSnapshot = () => {
    html2canvas(document.querySelector("#capture-area"), { backgroundColor: "#0d0d1a", scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = `GZ_28_Rivalry.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
};

window.render28 = () => {
    const rawGames = allData.filter(g => g.winner && g.loser);
    
    // 1. Build Dropdown for Matchups (TeamA & TeamB vs TeamC & TeamD)
    // We need to find where teamA/teamB are stored. Your index.html uses g.teamA and g.teamB in the 'conf28' init.
    // Individual match logs might only have 'winner' and 'loser'. 
    // We map every game to its parent series matchup.
    
    let seriesMatchups = {};
    allData.forEach(g => {
        if(g.seriesId && g.teamA && g.teamB) {
            seriesMatchups[g.seriesId] = [g.teamA, g.teamB].sort().join(" vs ");
        }
    });

    let uniqueLineups = {};
    rawGames.forEach(g => {
        const matchupName = seriesMatchups[g.seriesId];
        if(matchupName) uniqueLineups[matchupName] = true;
    });

    const lSelect = document.getElementById('lineupFilter');
    const saved = lSelect.value;
    lSelect.innerHTML = `<option value="ALL">All Pairings Combined</option>` + 
        Object.keys(uniqueLineups).map(k => `<option value="${k}" ${k===saved?'selected':''}>${k}</option>`).join('');

    const activeKey = lSelect.value || "ALL";
    const filtered = rawGames.filter(g => {
        if(activeKey === "ALL") return true;
        return seriesMatchups[g.seriesId] === activeKey;
    });

    const stats = {};
    filtered.forEach(g => {
        [g.winner, g.loser].forEach(team => {
            if(!stats[team]) stats[team] = { wins: 0, losses: 0, total: 0 };
        });
        stats[g.winner].wins++;
        stats[g.winner].total++;
        stats[g.loser].losses++;
        stats[g.loser].total++;
    });

    const sorted = Object.keys(stats).sort((a,b) => stats[b].wins - stats[a].wins);

    // Elite Hall
    document.getElementById('podium-list').innerHTML = sorted.slice(0,3).map((n, i) => `
        <div class="hof-item">
            <span class="hof-rank">#${i+1}</span>
            <b class="hof-team-name">${n}</b>
            <span class="hof-wins">${stats[n].wins} W</span>
        </div>`).join('');

    // KPI Tiles
    const topTeam = sorted[0] || '—';
    const mostDefeated = Object.keys(stats).sort((a,b)=>stats[b].losses-stats[a].losses)[0] || '—';
    const winRate = (sorted.length && stats[topTeam].total > 0) ? ((stats[topTeam].wins / stats[topTeam].total) * 100).toFixed(0) + '%' : '0%';

    document.getElementById('kpi-container').innerHTML = `
        <div class="k-tile c1"><small>Matches Played</small><div class="val">${filtered.length}</div></div>
        <div class="k-tile c2"><small>Dominant Team</small><div class="val">${topTeam}</div></div>
        <div class="k-tile c3"><small>Struggling Team</small><div class="val">${mostDefeated}</div></div>
        <div class="k-tile c4"><small>Win Rate</small><div class="val">${winRate}</div></div>
    `;

    // Leaderboard
    document.getElementById('leaderboard-container').innerHTML = sorted.map((n, i) => `
        <div class="rank-row">
            <div class="num">#${i+1}</div>
            <div class="team-txt">${n}</div>
            <div class="score-box">${stats[n].wins} Wins</div>
        </div>`).join('');
};

onSnapshot(query(gRef, orderBy("time")), snap => { 
    allData = snap.docs.map(d => d.data()); 
    render28(); 
});
</script>
</body>
</html>
