<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Modern Gaming Zone</title>
<link rel="icon" href="blufffavicon.png" />
<style>
  :root {
    --bg-gradient: radial-gradient(circle at 0% 0%, #0d0d1a 0%, #101026 40%, #05050d 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --violet: #7b2cbf; --blue: #3a86ff; --cyan: #00f5ff;
    --accent: #ffd36d; --text: #e6edf3; --muted: #8b949e;
    --tile-grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
  }

  body { 
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-gradient); 
    background-attachment: fixed; color: var(--text); min-height: 100vh; overflow-x: hidden; 
  }

  .wrap { max-width: 900px; margin: auto; padding: 20px; }
  
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-box { width: 45px; height: 45px; border-radius: 12px; background: var(--tile-grad); display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; box-shadow: 0 0 15px rgba(61, 61, 255, 0.4); }
  h1 { font-size: 18px; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 900; }

  .dash-link {
    text-decoration: none; color: var(--accent); font-weight: 900; font-size: 10px; 
    border: 1px solid rgba(255,211,109,0.3); padding: 10px 18px; border-radius: 30px; 
    background: rgba(255,211,109,0.05); text-transform: uppercase; letter-spacing: 1px;
  }

  .hero-container { position: relative; width: 100%; border-radius: 24px; overflow: hidden; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
  .hero-img { width: 100%; display: block; filter: brightness(0.8); }
  .hero-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px; background: linear-gradient(to top, rgba(13,13,26,1), transparent); text-align: center; }
  .hero-overlay h2 { margin: 0; font-size: 24px; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; }

  /* GAME GRID */
  .section-label { font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; text-align: center; display: block; }
  
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
  .game-box { 
    background: var(--glass); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; 
    overflow: hidden; cursor: pointer; transition: 0.4s; position: relative;
  }
  .game-box:hover { transform: translateY(-8px); border-color: var(--cyan); box-shadow: 0 10px 30px rgba(0, 245, 255, 0.2); }
  .game-box img { width: 100%; aspect-ratio: 1/1; object-fit: cover; opacity: 0.7; transition: 0.4s; }
  .game-box:hover img { opacity: 1; transform: scale(1.05); }
  .game-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 12px 0; font-weight: 900; font-size: 11px; text-transform: uppercase; text-align: center; letter-spacing: 1px; color: var(--cyan); }

  /* OVERALL HUB */
  .analytics-hub { background: var(--glass); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
  .hub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
  .hub-card { 
    background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); 
    text-align: center; cursor: pointer; transition: 0.3s; 
  }
  .hub-card:hover { background: rgba(255,255,255,0.05); }
  .hub-card b { display: block; color: var(--accent); font-size: 16px; margin-bottom: 4px; }
  .hub-card span { font-size: 10px; color: var(--muted); text-transform: uppercase; }

  .neu-btn { 
    background: var(--tile-grad); color: #fff; border: none; padding: 12px 20px; border-radius: 12px; 
    font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s;
  }
  .neu-btn.small { padding: 8px 15px; font-size: 10px; }
  .neu-btn.danger { background: linear-gradient(135deg, #ff4d4d, #b30000); margin-top: 25px; width: 100%; opacity: 0.6; }
  .neu-btn.danger:hover { opacity: 1; }

  /* FORM STYLING */
  input, select { background: #0d1117 !important; color: #fff !important; border: 1px solid #30363d !important; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 12px; font-weight: 600; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

  @media (max-width: 600px) {
    .game-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo-area">
      <div class="logo-box">GZ</div>
      <h1>Gaming Zone</h1>
    </div>
    <a href="dashboard.html" class="dash-link">📊 Statistics</a>
  </header>

  <div class="hero-container">
    <img src="bluffmasters_1.png" class="hero-img" alt="Bluff Masters">
    <div class="hero-overlay">
      <h2>Battle of Wits</h2>
    </div>
  </div>

  <section id="view-HOME">
    <span class="section-label">Select Arena</span>
    <div class="game-grid">
      <div class="game-box" onclick="launchGame('28')">
        <img src="28 button.png" alt="28">
        <div class="game-label">28 Card Game</div>
      </div>
      <div class="game-box" onclick="launchGame('Bluff')">
        <img src="bluff button.png" alt="Bluff">
        <div class="game-label">Bluff Game</div>
      </div>
      <div class="game-box" onclick="launchGame('UNO')">
        <img src="uno button.png" alt="UNO">
        <div class="game-label">Uno Cards</div>
      </div>
    </div>
    
    <div class="hub-header">
        <span class="section-label" style="margin:0">Analytics</span>
        <button class="neu-btn small" onclick="switchView('OVERALL')">View All Hubs</button>
    </div>
  </section>

  <section id="view-28" style="display:none;">
    <div class="analytics-hub">
      <div class="hub-header">
        <h1>Active Series</h1>
        <button class="neu-btn small" onclick="window.location.href='dash28.html'">📊 28 Stats</button>
      </div>
      <div id="list-28"></div>
      <button class="neu-btn" style="width:100%; margin-top:20px;" onclick="newSeries28()">➕ Start New Series</button>
      <button class="neu-btn small" style="background:none; border:1px solid #333; width:100%; margin-top:10px;" onclick="switchView('HOME')">Back to Home</button>
    </div>
  </section>

  <section id="view-INDIV" style="display:none;">
    <div class="analytics-hub" id="pane-setup">
        <div class="hub-header">
            <h1 id="indiv-title">Setup</h1>
            <button class="neu-btn small" onclick="window.location.href='dashboard.html'">📊 Stats</button>
        </div>
        <input type="number" id="pCnt" min="3" max="10" placeholder="Number of Players (3-10)" oninput="drawInputs()">
        <div id="pInputs"></div>
        <button id="btn-start" class="neu-btn" style="width:100%; display:none; margin-top:10px" onclick="goScoring()">Enter Tournament</button>
        <button class="neu-btn small" style="background:none; border:1px solid #333; width:100%; margin-top:15px;" onclick="switchView('HOME')">Cancel</button>
    </div>
    
    <div class="analytics-hub" id="pane-play" style="display:none;">
        <h1 id="play-subtitle" style="font-size:16px; margin-bottom:15px; color:var(--accent);">Record Result</h1>
        <table><tbody id="table-score-body"></tbody></table>
        <button class="neu-btn" style="width:100%; margin-top:20px" onclick="saveWeightedResult()">Finish Match</button>
    </div>
  </section>

  <section id="view-OVERALL" style="display:none;">
    <div class="analytics-hub">
        <h1 style="text-align:center; margin-bottom:25px;">Global Hub</h1>
        <div id="summary-tiles" class="summary-grid"></div>
        <button class="neu-btn danger" onclick="resetSystem('ALL')">⚠️ Emergency Data Reset</button>
        <button class="neu-btn small" style="background:none; border:1px solid #333; width:100%; margin-top:15px;" onclick="switchView('HOME')">Return Home</button>
    </div>
  </section>
</div>

<div id="modal-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const FIREBASE_CONF = { apiKey: "AIzaSyBdAIdEDwfoalevfadgixPTLIoLoEqi8kc", authDomain: "bluff-tracker-7542e.firebaseapp.com", projectId: "bluff-tracker-7542e", storageBucket: "bluff-tracker-7542e.appspot.com", messagingSenderId: "280965687037", appId: "1:280965687037:web:be0b05da36ef653ab68094" };
const PASS = "zachariahrenji";
const PLRS = ["Rohan", "Roopa", "Zach", "Annu", "Rikku", "Megha", "Bibin", "Bimal"];
const TMS = ["Bibin & Zach","Bimal & Annu","Bibin & Annu","Zach & Daddy","Bibin & Bimal","Zach & Rikku","Bibin & Daddy"];

const app = initializeApp(FIREBASE_CONF);
const db = getFirestore(app);
const gRef = collection(db, "games");
let allG = [];
window.activeMode = '';

window.switchView = (v) => {
    ['HOME','28','INDIV','OVERALL'].forEach(x => {
        const el = document.getElementById('view-'+x);
        if(el) el.style.display = (x===v?'block':'none');
    });
    if(v === 'OVERALL') renderGlobalTiles();
};

window.launchGame = (m) => { 
    window.activeMode = m; 
    switchView(m==='28'?'28':'INDIV'); 
    if(m!=='28') {
        document.getElementById('indiv-title').innerText = m + ' Setup';
        document.getElementById('pCnt').value = ""; 
        document.getElementById('pInputs').innerHTML = "";
        document.getElementById('btn-start').style.display = "none";
        document.getElementById('pane-setup').style.display = "block";
        document.getElementById('pane-play').style.display = "none";
    }
};

window.drawInputs = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const container = document.getElementById('pInputs'); 
    container.innerHTML = "";
    if(isNaN(cnt) || cnt < 3 || cnt > 10) { document.getElementById('btn-start').style.display="none"; return; }
    for(let i=0; i<cnt; i++) {
        container.innerHTML += `
            <select id="ps-${i}" onchange="refreshExclusion()">
                <option value="" selected disabled>Select Player ${i+1}</option>
                ${PLRS.map(p=>`<option value="${p}">${p}</option>`).join('')}
                <option value="C">Custom Name</option>
            </select>
            <input type="text" id="pc-${i}" style="display:none" placeholder="Enter Name">`;
    }
    document.getElementById('btn-start').style.display="block";
};

window.refreshExclusion = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const used = [];
    for(let i=0; i<cnt; i++) {
        const v = document.getElementById(`ps-${i}`).value; 
        if(v && v !== "C") used.push(v);
        document.getElementById(`pc-${i}`).style.display = (v === "C" ? "block" : "none");
    }
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`ps-${i}`);
        Array.from(sel.options).forEach(opt => { 
            if(opt.value && opt.value !== "C") opt.disabled = used.includes(opt.value) && sel.value !== opt.value;
        });
    }
};

window.goScoring = () => {
    const cnt = parseInt(document.getElementById('pCnt').value);
    const body = document.getElementById('table-score-body'); body.innerHTML = "";
    for(let i=0; i<cnt; i++) {
        const sel = document.getElementById(`ps-${i}`).value;
        const name = (sel === 'C' ? document.getElementById(`pc-${i}`).value : sel);
        if(!name) return alert("Fill all names");
        body.innerHTML += `<tr><td><b style="color:var(--cyan)">${name}</b></td><td><select class="rank-sel" data-player="${name}">
            <option value="99" selected>Other (1 Pt)</option>
            <option value="1">1st (10 Pts)</option>
            <option value="2">2nd (5 Pts)</option>
            ${cnt > 3 ? '<option value="3">3rd (3 Pts)</option>' : ''}
            <option value="0">Last (0 Pts)</option>
        </select></td></tr>`;
    }
    document.getElementById('pane-setup').style.display="none"; 
    document.getElementById('pane-play').style.display="block";
};

window.saveWeightedResult = async () => {
    const results = [];
    let win = '', lost = '';
    document.querySelectorAll('.rank-sel').forEach(sel => {
        const rank = parseInt(sel.value);
        const name = sel.getAttribute('data-player');
        let pts = 1;
        if(rank === 1) { pts = 10; win = name; }
        else if(rank === 2) pts = 5;
        else if(rank === 3) pts = 3;
        else if(rank === 0) { pts = 0; lost = name; }
        results.push({ name, rank, pts });
    });
    if(!win || !lost) return alert("Identify 1st and Last!");
    await addDoc(gRef, { gameType: window.activeMode, players: results, winner: win, last: lost, time: new Date().toISOString() });
    alert("Saved!");
    location.reload();
};

window.newSeries28 = () => {
    const o = TMS.map(t => `<option value="${t}">${t}</option>`).join("");
    const h = `<div class="analytics-hub" style="max-width:400px; margin:auto;"><h1 style="color:var(--accent)">28 Setup</h1>
        <select id="mTarget"><option value="5">First to 5</option><option value="10">First to 10</option></select>
        <select id="mT1" onchange="filterTMS()"><option value="" selected disabled>Team 1</option>${o}</select>
        <select id="mT2"><option value="" selected disabled>Team 2</option>${o}</select>
        <button class="neu-btn" style="width:100%; margin-top:10px" onclick="conf28()">Start Battle</button>
        <button class="neu-btn small" style="width:100%; margin-top:10px; background:none; border:1px solid #333;" onclick="closeM()">Close</button></div>`;
    document.getElementById('modal-container').innerHTML = `<div style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:99; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(10px);">${h}</div>`;
};

window.filterTMS = () => {
    const t1 = document.getElementById('mT1').value;
    Array.from(document.getElementById('mT2').options).forEach(o => { if(o.value) o.disabled = t1.split(' & ').some(m => o.value.includes(m)); });
};

window.conf28 = async () => {
    const t1 = document.getElementById('mT1').value, t2 = document.getElementById('mT2').value, target = document.getElementById('mTarget').value;
    if(!t1 || !t2) return alert("Select Teams");
    await addDoc(gRef, { seriesId: "s_"+Date.now(), isInit: true, teamA: t1, teamB: t2, seriesTarget: parseInt(target), time: new Date().toISOString() });
    closeM();
};

window.render28 = () => {
    const seriesMap = {};
    allG.filter(g => !g.gameType || g.gameType === '28').forEach(g => {
        if (!seriesMap[g.seriesId]) seriesMap[g.seriesId] = { id: g.seriesId, target: 5, wins: {}, teamA: '', teamB: '', stop: false };
        const s = seriesMap[g.seriesId];
        if (g.isInit) { s.teamA = g.teamA; s.teamB = g.teamB; s.target = g.seriesTarget; }
        else if (g.manualEnd) s.stop = true;
        else if (g.winner) s.wins[g.winner] = (s.wins[g.winner] || 0) + 1;
    });
    const list = document.getElementById('list-28'); if(!list) return; list.innerHTML = "";
    Object.values(seriesMap).filter(s => s.teamA && !s.stop && !Object.values(s.wins).some(w => w >= s.target)).forEach(s => {
        const wA = s.wins[s.teamA] || 0, wB = s.wins[s.teamB] || 0;
        list.innerHTML += `<div class="hub-card" style="margin-bottom:15px; cursor:default; text-align:left;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div style="text-align:center;"><b>${wA}</b><span style="font-size:8px;">${s.teamA}</span></div>
                <div style="color:var(--muted); font-weight:900;">VS</div>
                <div style="text-align:center;"><b>${wB}</b><span style="font-size:8px;">${s.teamB}</span></div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="neu-btn small" style="flex:1" onclick="score28('${s.id}','${s.teamA}','${s.teamB}')">Win T1</button>
                <button class="neu-btn small" style="flex:1" onclick="score28('${s.id}','${s.teamB}','${s.teamA}')">Win T2</button>
                <button class="neu-btn small danger" style="margin:0; width:auto;" onclick="resetSystem('SERIES', '${s.id}')">Stop</button>
            </div>
        </div>`;
    });
};

window.score28 = async (id, w, l) => { await addDoc(gRef, { seriesId: id, winner: w, loser: l, time: new Date().toISOString() }); };

window.renderGlobalTiles = () => {
    const f = (m) => allG.filter(g => (m === '28' ? (!g.gameType || g.gameType === '28') : g.gameType === m) && g.winner).length;
    document.getElementById('summary-tiles').innerHTML = `
        <div class="hub-card" onclick="window.location.href='dash28.html'"><b>28</b><span>${f('28')} Matches</span></div>
        <div class="hub-card" onclick="window.location.href='dashboard.html?mode=Bluff'"><b>Bluff</b><span>${f('Bluff')} Rounds</span></div>
        <div class="hub-card" onclick="window.location.href='dashboard.html?mode=UNO'"><b>UNO</b><span>${f('UNO')} Rounds</span></div>`;
};

window.resetSystem = async (type, id) => {
    if(prompt(`Password:`) !== PASS) return;
    if(type === 'SERIES') {
        await addDoc(gRef, { seriesId: id, manualEnd: true, time: new Date().toISOString() });
        return;
    }
    const snap = await getDocs(type === 'ALL' ? gRef : query(gRef, where("seriesId", "==", id)));
    const ops = []; snap.forEach(d => ops.push(deleteDoc(d.ref))); await Promise.all(ops);
    location.reload();
};

window.closeM = () => document.getElementById('modal-container').innerHTML = "";

onSnapshot(query(gRef, orderBy("time")), snap => {
    allG = snap.docs.map(d => d.data());
    render28();
});
</script>
</body>
</html>
