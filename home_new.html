<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>GZ - Elite Gaming Hub</title>
<link rel="icon" href="blufffavicon.png" />
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05050d;
    --card-bg: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.08);
    --accent: #ffd36d;
    --cyan: #00f5ff;
    --violet: #7b2cbf;
    --grad: linear-gradient(135deg, #3d3dff 0%, #a020f0 100%);
  }

  body { 
    margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
    color: #e6edf3; min-height: 100vh; overflow-x: hidden;
    background-image: radial-gradient(circle at 20% 20%, rgba(61, 61, 255, 0.05) 0%, transparent 40%),
                      radial-gradient(circle at 80% 80%, rgba(160, 32, 240, 0.05) 0%, transparent 40%);
  }

  .wrap { max-width: 1000px; margin: auto; padding: 20px; }

  /* HERO HEADER SECTION */
  header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
  .logo-text { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 4px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .hero-banner { 
    position: relative; width: 100%; height: 300px; border-radius: 30px; 
    overflow: hidden; border: 1px solid var(--border); margin-bottom: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  }
  .hero-banner img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6) contrast(1.1); }
  .hero-content { 
    position: absolute; inset: 0; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; background: linear-gradient(to top, var(--bg), transparent);
  }
  .hero-content h2 { font-family: 'Syncopate', sans-serif; font-size: 28px; margin: 0; color: var(--accent); letter-spacing: 8px; text-transform: uppercase; }
  .hero-content p { font-size: 12px; text-transform: uppercase; letter-spacing: 4px; color: var(--cyan); margin-top: 10px; opacity: 0.8; }

  /* GAME SELECTOR TILES */
  .grid-label { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 25px; display: block; text-align: center; }
  
  .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 50px; }
  
  .game-card { 
    position: relative; background: var(--card-bg); border: 1px solid var(--border); 
    border-radius: 24px; padding: 10px; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(10px);
  }
  .game-card:hover { 
    transform: translateY(-12px) scale(1.02); border-color: var(--cyan);
    box-shadow: 0 15px 40px rgba(0, 245, 255, 0.15);
  }
  .game-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; margin-bottom: 15px; opacity: 0.8; transition: 0.4s; }
  .game-card:hover img { opacity: 1; }
  
  .card-title { font-weight: 900; font-size: 14px; text-align: center; text-transform: uppercase; letter-spacing: 2px; color: #fff; margin-bottom: 10px; }
  
  /* ACTION PANEL (LOGS/SETUP) */
  .glass-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 40px; backdrop-filter: blur(20px); }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .panel-header h3 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; color: var(--cyan); }

  /* BUTTON STYLING */
  .btn { 
    background: var(--grad); color: #fff; border: none; padding: 16px 32px; 
    border-radius: 14px; font-weight: 900; text-transform: uppercase; 
    letter-spacing: 2px; cursor: pointer; font-size: 12px; transition: 0.3s;
    box-shadow: 0 8px 20px rgba(160, 32, 240, 0.3);
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(160, 32, 240, 0.5); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* FORM ELEMENTS */
  input, select { 
    background: #0d1117 !important; color: #fff !important; border: 1px solid var(--border) !important; 
    padding: 18px; border-radius: 16px; width: 100%; margin-bottom: 15px; font-weight: 700; 
  }
  
  /* ANALYTICS HUB */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
  .stat-mini-card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
  .stat-mini-card:hover { border-color: var(--violet); }
  .stat-mini-card b { display: block; color: var(--accent); font-size: 20px; margin-bottom: 5px; }
  .stat-mini-card span { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }

  @media (max-width: 768px) {
    .game-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr; }
    .hero-banner { height: 200px; }
  }
</style>
</head>

<div class="wrap">

    <div class="logo-text">GZONE</div>
    <button class="btn btn-outline" onclick="window.location.href='dashboard.html'" style="font-size: 10px; padding: 10px 20px;">📊 COMMAND CENTER</button>
  </header>

  <div class="hero-banner">
    <img src="bluffmasters_1.png" alt="Hero">
    <div class="hero-content">

  </div>

  <section id="view-HOME">

    <div class="glass-panel" style="padding: 25px; text-align: center;">

      <div id="summary-tiles" class="stats-row"></div>

  <section id="view-28" style="display:none;">
    <div class="glass-panel">
      <div class="panel-header">

        <button class="btn btn-outline" onclick="window.location.href='dash28.html'" style="font-size: 9px; padding: 8px 15px;">📊 28 STATS</button>

  <section id="view-INDIV" style="display:none;">

            <button class="btn btn-outline" onclick="window.location.href='dashboard.html'" style="font-size: 9px; padding: 8px 15px;">📊 STATS</button>
        </div>
        <input type="number" id="pCnt" min="3" max="10" placeholder="Number of Competitors (3-10)" oninput="drawInputs()">
        <div id="pInputs"></div>
        <button id="btn-start" class="btn" style="width:100%; display:none; margin-top:20px" onclick="goScoring()">Launch Arena</button>
        <button class="btn btn-outline" style="width:100%; margin-top:15px;" onclick="switchView('HOME')">Cancel</button>
    </div>
    
    <div class="glass-panel" id="pane-play" style="display:none;">
        <h3 style="color:var(--accent); margin-bottom: 20px;">Rank Final Standings</h3>
        <div id="scoring-container">
            <table style="width: 100%;"><tbody id="table-score-body"></tbody></table>
        </div>
        <button class="btn" style="width:100%; margin-top:30px" onclick="saveWeightedResult()">Log Final Results</button>
    </div>
  </section>
</div>

<div id="modal-container"></div>
